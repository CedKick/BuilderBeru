<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expedition I - Spectateur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a15;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px; background: rgba(15, 15, 30, 0.95);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid #333;
      z-index: 10;
    }
    #header h1 { font-size: 18px; color: #a855f7; }
    #header .stats { display: flex; gap: 20px; font-size: 14px; }
    #header .stat { display: flex; align-items: center; gap: 6px; }
    #header .stat .label { color: #888; }
    #header .stat .value { color: #fff; font-weight: bold; }
    .status-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 12px;
      font-weight: bold; text-transform: uppercase;
    }
    .status-combat { background: #dc2626; color: white; }
    .status-march { background: #2563eb; color: white; }
    .status-campfire { background: #f59e0b; color: #000; }
    .status-loot_roll { background: #a855f7; color: white; }
    .status-registration { background: #6b7280; color: white; }
    .status-finished { background: #22c55e; color: #000; }
    .status-wiped { background: #991b1b; color: white; }

    #canvas-container {
      position: fixed; top: 60px; left: 0; right: 280px; bottom: 120px;
      transition: right 0.3s ease;
    }
    #canvas-container.full-width { right: 0; }
    canvas { width: 100%; height: 100%; display: block; }

    /* ── Stats Panel ── */
    #stats-panel {
      position: fixed; top: 60px; right: 0; bottom: 120px;
      width: 280px; background: rgba(15, 15, 30, 0.98);
      border-left: 1px solid #333;
      display: flex; flex-direction: column;
      z-index: 10;
      transition: transform 0.3s ease;
    }
    #stats-panel.hidden { transform: translateX(100%); }

    #toggle-stats {
      position: fixed; top: 68px; z-index: 20;
      background: rgba(168, 85, 247, 0.3); border: 1px solid #a855f7;
      color: #e0e0e0; padding: 4px 10px; border-radius: 6px;
      cursor: pointer; font-size: 12px;
      transition: right 0.3s ease;
    }
    #toggle-stats.panel-open { right: 286px; }
    #toggle-stats.panel-closed { right: 8px; }

    .stats-tabs {
      display: flex; border-bottom: 1px solid #333;
    }
    .stats-tab {
      flex: 1; padding: 8px 2px; text-align: center;
      font-size: 10px; font-weight: bold; cursor: pointer;
      background: transparent; border: none; color: #888;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .stats-tab.active { color: #a855f7; border-bottom-color: #a855f7; }
    .stats-tab:hover { color: #c084fc; }

    .stats-list {
      flex: 1; overflow-y: auto; padding: 6px 8px;
    }
    .stats-list::-webkit-scrollbar { width: 4px; }
    .stats-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .stat-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0; font-size: 11px;
    }
    .stat-rank {
      width: 16px; text-align: right; color: #555; font-size: 10px;
    }
    .stat-sprite {
      width: 20px; height: 20px; border-radius: 3px;
      object-fit: cover; background: #1a1a2e;
    }
    .stat-name {
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      color: #ccc; font-size: 11px;
    }
    .stat-bar-container {
      width: 60px; height: 10px; background: #1a1a2e;
      border-radius: 3px; overflow: hidden;
    }
    .stat-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease;
    }
    .stat-value {
      width: 48px; text-align: right; font-weight: bold;
      font-size: 11px; color: #fff;
    }

    /* ── Graph Canvas ── */
    #graph-container {
      flex: 1; position: relative; padding: 4px;
      display: none;
    }
    #graph-container.active { display: flex; flex-direction: column; }
    #dps-graph { width: 100%; flex: 1; }

    /* ── Crit Stats ── */
    .crit-card {
      background: rgba(249, 115, 22, 0.08);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 6px; padding: 6px 8px; margin-bottom: 4px;
    }
    .crit-card-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .crit-card-header img { width: 18px; height: 18px; border-radius: 3px; }
    .crit-card-header .name { font-size: 11px; font-weight: bold; color: #f59e0b; }
    .crit-stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; font-size: 10px;
    }
    .crit-stat-label { color: #888; }
    .crit-stat-val { color: #f97316; font-weight: bold; text-align: right; }

    /* ── Event Feed ── */
    #event-feed {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 120px; background: rgba(15, 15, 30, 0.95);
      border-top: 1px solid #333;
      overflow-y: auto; padding: 8px 16px;
      font-size: 13px; line-height: 1.6;
    }
    .event { opacity: 0.9; }
    .event-damage { color: #ef4444; }
    .event-heal { color: #22c55e; }
    .event-kill { color: #f59e0b; }
    .event-death { color: #dc2626; font-weight: bold; }
    .event-boss { color: #a855f7; font-weight: bold; }
    .event-loot { color: #eab308; }
    .event-rez { color: #38bdf8; }
    .event-info { color: #888; }
    .event-buff { color: #60a5fa; }

    #connection-status {
      position: fixed; top: 70px; left: 10px;
      font-size: 12px; padding: 4px 8px; border-radius: 8px;
      z-index: 20;
    }
    .connected { background: #16a34a33; color: #22c55e; }
    .disconnected { background: #dc262633; color: #ef4444; }
  </style>
</head>
<body>
  <div id="header">
    <h1>&#9876; Expedition I</h1>
    <div class="stats">

// ═══════════════════════════════════════════════════════════

// Fallback: map boss definition IDs to indices
const BOSS_ID_TO_INDEX = {
  forest_guardian: 0,
  stone_sentinel: 1,
  shadow_lord: 2,
};

// ═══════════════════════════════════════════════════════════
// Spectator Client
// ═══════════════════════════════════════════════════════════

const basePath = location.pathname.replace(/\/spectator\.?h?t?m?l?$/, '').replace(/\/$/, '');
const wsPath = basePath ? `${basePath}/ws` : '/ws';
const WS_URL = location.protocol === 'https:'
  ? `wss://${location.host}${wsPath}`
  : `ws://${location.host}${wsPath}`;

// ── State ──
let state = null;
let events = [];
const MAX_EVENTS = 50;
const floatingNumbers = [];

// ── Position Interpolation ──
const interpPositions = {}; // { [entityId]: { x: currentSmoothed } }
const LERP_SPEED = 10; // Higher = snappier

// ── Sprite Cache ──
const spriteCache = {};
const spriteLoading = new Set();
const bossSpriteCache = {}; // { [index]: Image }
const mobSpriteCache = {};  // { [templateKey]: Image }

function preloadSprite(hunterId) {
  if (spriteCache[hunterId] || spriteLoading.has(hunterId)) return;
  const url = HUNTER_SPRITES[hunterId];
  if (!url) return;
  spriteLoading.add(hunterId);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { spriteCache[hunterId] = img; spriteLoading.delete(hunterId); };
  img.onerror = () => { spriteLoading.delete(hunterId); };
  img.src = url;
}

function preloadBossSprite(index) {
  if (bossSpriteCache[index] || spriteLoading.has(`boss_${index}`)) return;
  const url = BOSS_SPRITES[index];
  if (!url) return;
  spriteLoading.add(`boss_${index}`);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { bossSpriteCache[index] = img; spriteLoading.delete(`boss_${index}`); };
  img.onerror = () => { spriteLoading.delete(`boss_${index}`); };
  img.src = url;
}

function preloadMobSprite(key) {
  if (mobSpriteCache[key] || spriteLoading.has(`mob_${key}`)) return;
  const url = MOB_SPRITES[key];
  if (!url) return;
  spriteLoading.add(`mob_${key}`);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { mobSpriteCache[key] = img; spriteLoading.delete(`mob_${key}`); };
  img.onerror = () => { spriteLoading.delete(`mob_${key}`); };
  img.src = url;
}

// Preload all sprites upfront
for (const id of Object.keys(HUNTER_SPRITES)) preloadSprite(id);
for (let i = 0; i < BOSS_SPRITES.length; i++) preloadBossSprite(i);
for (const key of Object.keys(MOB_SPRITES)) preloadMobSprite(key);

// ── Animation States ──
const animStates = {};

function triggerAnim(entityId, type, duration) {
  animStates[entityId] = { type, timer: duration };
}

// ── Combat Stats Tracking ──
const combatStats = {};
let activeStatsTab = 'dps';

// ── DPS History (for graph) ──
const dpsHistory = []; // { time, dmg: { [charId]: totalDmgDealt } }
let combatStartTime = 0;
let lastDpsSnapshot = 0;
const DPS_SNAPSHOT_INTERVAL = 2; // seconds

function ensureStats(id) {
  if (!combatStats[id]) {
    const char = state?.characters?.find(c => c.id === id);
    combatStats[id] = {
      name: char?.name || id.split('_').slice(1).join(' '),
      hunterId: char?.hunterId || null,
      element: char?.element || null,
      dmgDealt: 0, dmgReceived: 0,
      healsGiven: 0, healsReceived: 0,
      kills: 0, crits: 0, totalHits: 0,
      maxCrit: 0, totalCritDmg: 0,
    };
  }
  return combatStats[id];
}

function takeDpsSnapshot(elapsedTime) {
  if (elapsedTime - lastDpsSnapshot < DPS_SNAPSHOT_INTERVAL) return;
  lastDpsSnapshot = elapsedTime;
  const dmg = {};
  for (const [id, s] of Object.entries(combatStats)) {
    if (!id.startsWith('mob_') && !id.startsWith('boss_')) {
      dmg[id] = s.dmgDealt;
    }
  }
  dpsHistory.push({ time: elapsedTime, dmg });
  // Keep max 300 snapshots (10 min at 2s interval)
  if (dpsHistory.length > 300) dpsHistory.shift();
}

// ── Canvas ──
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let cameraX = 0;

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

  water: '#3b82f6',

// ── Stats Panel Toggle ──
let statsPanelOpen = true;
const toggleBtn = document.getElementById('toggle-stats');
toggleBtn.addEventListener('click', () => {
  statsPanelOpen = !statsPanelOpen;
  document.getElementById('stats-panel').classList.toggle('hidden', !statsPanelOpen);
  document.getElementById('canvas-container').classList.toggle('full-width', !statsPanelOpen);
  toggleBtn.className = statsPanelOpen ? 'panel-open' : 'panel-closed';
  toggleBtn.innerHTML = statsPanelOpen ? 'Stats &#9664;' : '&#9654; Stats';
  toggleBtn.id = 'toggle-stats';
  setTimeout(resizeCanvas, 310);
});

// ── Stats Tabs ──
document.querySelectorAll('.stats-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.stats-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeStatsTab = tab.dataset.tab;
    // Toggle graph/list visibility
    const graphEl = document.getElementById('graph-container');
    const listEl = document.getElementById('stats-list');
    if (activeStatsTab === 'graph') {
      graphEl.classList.add('active');
      listEl.style.display = 'none';
      renderDpsGraph();
    } else {
      graphEl.classList.remove('active');
      listEl.style.display = '';
      renderStatsPanel();
    }
  });
});

// ── WebSocket ──
let ws = null;
let reconnectTimer = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('connection-status').className = 'connected';
    document.getElementById('connection-status').textContent = 'Connecte';
    addEvent('info', 'Connecte au serveur');
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch (err) {}
  };

  ws.onclose = () => {
    document.getElementById('connection-status').className = 'disconnected';
    document.getElementById('connection-status').textContent = 'Deconnecte';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'expedition_state':
      state = msg;
      updateHeader(msg);

      // Update interpolation targets for characters
      for (const c of msg.characters || []) {
        if (c.hunterId) preloadSprite(c.hunterId);
        if (!interpPositions[c.id]) {
          interpPositions[c.id] = { x: c.x };
        }
        // Target is always the latest server position (stored on c.x)
        if (combatStats[c.id]) {
          combatStats[c.id].name = c.name;
          combatStats[c.id].hunterId = c.hunterId;
          combatStats[c.id].element = c.element;
        }
      }

      // Mob interpolation targets
      for (const m of msg.mobs || []) {
        if (!interpPositions[m.id]) {
          interpPositions[m.id] = { x: m.x };
        }
      }

      // Boss interpolation + sprite preload
      if (msg.boss) {
        if (!interpPositions[msg.boss.id]) {
          interpPositions[msg.boss.id] = { x: msg.boss.x };
        }
        const bossIdx = msg.boss.index ?? BOSS_ID_TO_INDEX[msg.boss.id];
        if (bossIdx != null) preloadBossSprite(bossIdx);
      }

      // DPS snapshot
      if (msg.status === 'combat') {
        if (!combatStartTime) combatStartTime = msg.elapsedTime;
        takeDpsSnapshot(msg.elapsedTime);
      }
      break;

    case 'events_batch':
      for (const ev of msg.events) handleEvent(ev);
      break;

    case 'combat_start':
      combatStartTime = 0; // Reset for new combat
      if (msg.encounterType === 'boss') {
        addEvent('boss', `BOSS: ${msg.bossName} apparait!`);
      } else {
        addEvent('info', `Vague de mobs! (${msg.mobCount} ennemis)`);
      }
      break;

    case 'boss_killed':
      addEvent('boss', `BOSS VAINCU: ${msg.bossName}!`);
      break;

    case 'march_start':
      addEvent('info', `En marche... prochain: ${msg.nextEncounter}`);
      break;

    case 'campfire_start':
      addEvent('info', `Campfire! Repos ${msg.duration}s...`);
      break;

    case 'loot_roll_start':
      for (const r of msg.results || []) {
        if (r.stolen) {
          addEvent('death', `Les monstres ont vole [${r.itemName}]!`);
        } else if (r.winnerUsername) {
          const srTag = r.srWinner ? ' (SR)' : '';
          addEvent('loot', `[${r.itemName}] (${r.rarity}) -> ${r.winnerUsername} (${r.winnerRoll})${srTag}`);
        }
      }
      break;

    case 'rez':
      addEvent('rez', `${msg.healerName} ressuscite ${msg.targetName}!`);
      break;

    case 'expedition_finished':
      addEvent('boss', `EXPEDITION TERMINEE: ${msg.reason} | Boss: ${msg.bossesKilled} | Temps: ${formatTime(msg.elapsedTime)}`);
      break;
  }
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'damage':
    case 'skill_damage': {
      const size = ev.crit ? 20 : 16;
      const color = ev.crit ? '#fbbf24' : '#ef4444';
      const text = ev.crit ? `CRIT ${ev.amount}` : `-${ev.amount}`;
      addFloating(ev.target, text, color, size);
      triggerAnim(ev.target, 'hit', 0.15);
      triggerAnim(ev.source, 'attack', 0.2);
      const src = ensureStats(ev.source);
      src.dmgDealt += ev.amount;
      src.totalHits++;
      if (ev.crit) {
        src.crits++;
        src.totalCritDmg += ev.amount;
        if (ev.amount > src.maxCrit) src.maxCrit = ev.amount;
      }
      const tgt = ensureStats(ev.target);
      tgt.dmgReceived += ev.amount;
      break;
    }
    case 'mob_attack':
    case 'boss_attack':
    case 'pattern_damage': {
      addFloating(ev.target, `-${ev.amount}`, '#ff6b6b', 16);
      triggerAnim(ev.target, 'hit', 0.15);
      const tgt = ensureStats(ev.target);
      tgt.dmgReceived += ev.amount;
      break;
    }
    case 'heal': {
      addFloating(ev.target, `+${ev.amount}`, '#22c55e', 16);
      triggerAnim(ev.target, 'heal', 0.3);
      addEvent('heal', `${ev.source.split('_').slice(1).join(' ')} soigne ${ev.target.split('_').slice(1).join(' ')} (+${ev.amount})`);
      const src = ensureStats(ev.source);
      src.healsGiven += ev.amount;
      const tgt = ensureStats(ev.target);
      tgt.healsReceived += ev.amount;
      break;
    }
    case 'death':
      addEvent('death', `${ev.characterId.split('_').slice(1).join(' ')} est mort!`);
      triggerAnim(ev.characterId, 'death', 1.0);
      break;
    case 'kill': {
      addEvent('kill', `${ev.killer.split('_').slice(1).join(' ')} tue ${ev.targetName}!`);
      const src = ensureStats(ev.killer);
      src.kills++;
      break;
    }
    case 'boss_pattern':
      addEvent('boss', `[${ev.name}] telegraph ${ev.telegraphTime}s!`);
      break;
    case 'buff':
      addEvent('buff', `${ev.source.split('_').slice(1).join(' ')} buff ${ev.buffType} +${ev.value}% sur ${ev.target.split('_').slice(1).join(' ')}`);
      break;
    case 'boss_heal':
      addEvent('info', `Boss soigne +${ev.amount} HP`);
      break;
    case 'summon':
      addEvent('boss', `Boss invoque ${ev.count}x ${ev.mobType}!`);
      break;
  }
}

// ── Floating damage numbers ──
function addFloating(targetId, text, color, size) {
  if (!state) return;
  const entity = findEntity(targetId);
  if (!entity) return;
  const ix = interpPositions[targetId]?.x ?? entity.x;
  floatingNumbers.push({
    x: ix, y: -30 - Math.random() * 20,
    text, color, size: size || 16,
    life: 2.0,
    vy: -50,
  });
}

function findEntity(id) {
  if (!state) return null;
  const c = (state.characters || []).find(c => c.id === id);
  if (c) return c;
  const m = (state.mobs || []).find(m => m.id === id);
  if (m) return m;
  if (state.boss?.id === id) return state.boss;
  return null;
}

// ── UI Updates ──
function updateHeader(s) {
  const badge = document.getElementById('status-badge');
  badge.textContent = s.status;
  badge.className = `status-badge status-${s.status}`;

  document.getElementById('alive-count').textContent = `${s.aliveCount}/${s.totalCount}`;
  document.getElementById('boss-count').textContent = s.bossesKilled;
  document.getElementById('encounter-count').textContent = `${s.encounterIndex + 1}/${s.totalEncounters}`;
  document.getElementById('elapsed-time').textContent = formatTime(s.elapsedTime);
}

function addEvent(type, text) {
  events.push({ type, text, time: Date.now() });
  if (events.length > MAX_EVENTS) events.shift();

  const feed = document.getElementById('event-feed');
  const div = document.createElement('div');
  div.className = `event event-${type}`;
  div.textContent = text;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;

  while (feed.children.length > MAX_EVENTS) {
    feed.removeChild(feed.firstChild);
  }
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}h${String(m).padStart(2, '0')}m`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function formatNumber(n) {
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1) + 'B';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return String(Math.floor(n));
}

// ═══════════════════════════════════════════════════════════
// STATS PANEL RENDERING
// ═══════════════════════════════════════════════════════════

const TAB_COLORS = { dps: '#ef4444', heals: '#22c55e', received: '#f59e0b', crits: '#f97316' };

let statsRenderTimer = null;
function scheduleStatsRender() {
  if (statsRenderTimer) return;
  statsRenderTimer = setTimeout(() => {
    statsRenderTimer = null;
    if (activeStatsTab === 'graph') renderDpsGraph();
    else renderStatsPanel();
  }, 500);
}

function renderStatsPanel() {
  if (!statsPanelOpen || activeStatsTab === 'graph') return;
  const list = document.getElementById('stats-list');

  const entries = Object.entries(combatStats)
    .filter(([id]) => !id.startsWith('mob_') && !id.startsWith('boss_'));

  // ── Crits tab ──
  if (activeStatsTab === 'crits') {
    const sorted = entries.sort((a, b) => b[1].crits - a[1].crits);
    let html = '';
    for (const [id, s] of sorted) {
      if (s.crits === 0 && s.totalHits === 0) continue;
      const spriteUrl = s.hunterId ? HUNTER_SPRITES[s.hunterId] : null;
      const critRate = s.totalHits > 0 ? (s.crits / s.totalHits * 100).toFixed(1) : '0.0';
      const avgCrit = s.crits > 0 ? Math.floor(s.totalCritDmg / s.crits) : 0;

      html += `<div class="crit-card">
        <div class="crit-card-header">
          ${spriteUrl ? `<img src="${spriteUrl}" alt="">` : ''}
          <span class="name">${s.name}</span>
        </div>
        <div class="crit-stats-grid">
          <span class="crit-stat-label">Coups</span><span class="crit-stat-val">${s.totalHits}</span>
          <span class="crit-stat-label">Critiques</span><span class="crit-stat-val" style="color:#f97316">${s.crits}</span>
          <span class="crit-stat-label">Taux crit</span><span class="crit-stat-val" style="color:#fb923c">${critRate}%</span>
          <span class="crit-stat-label">Crit moyen</span><span class="crit-stat-val">${formatNumber(avgCrit)}</span>
          <span class="crit-stat-label">Max crit</span><span class="crit-stat-val" style="color:#fbbf24">${formatNumber(s.maxCrit)}</span>
          <span class="crit-stat-label">Kills</span><span class="crit-stat-val" style="color:#22c55e">${s.kills}</span>
        </div>
      </div>`;
    }
    list.innerHTML = html || '<div style="color:#555;text-align:center;padding:20px">Pas encore de crits</div>';
    return;
  }

  // ── DPS / Heals / Received tabs ──
  let sorted;
  let valueKey;
  switch (activeStatsTab) {
    case 'dps':
      valueKey = 'dmgDealt';
      sorted = entries.sort((a, b) => b[1].dmgDealt - a[1].dmgDealt);
      break;
    case 'heals':
      valueKey = 'healsGiven';
      sorted = entries.sort((a, b) => b[1].healsGiven - a[1].healsGiven);
      break;
    case 'received':
      valueKey = 'dmgReceived';
      sorted = entries.sort((a, b) => b[1].dmgReceived - a[1].dmgReceived);
      break;
  }

  const maxVal = sorted.length > 0 ? sorted[0][1][valueKey] : 1;
  const barColor = TAB_COLORS[activeStatsTab];
  const elapsed = state?.elapsedTime || 1;

  let html = '';
  for (let i = 0; i < sorted.length; i++) {
    const [id, s] = sorted[i];
    const val = s[valueKey];
    if (val === 0) continue;
    const pct = maxVal > 0 ? (val / maxVal * 100) : 0;
    const spriteUrl = s.hunterId ? HUNTER_SPRITES[s.hunterId] : null;
    const elemColor = ELEMENT_COLORS[s.element] || '#888';
    const perSec = activeStatsTab === 'dps' ? ` (${formatNumber(val / elapsed)}/s)` : '';

    html += `<div class="stat-entry">
      <span class="stat-rank">${i + 1}</span>
      ${spriteUrl
        ? `<img class="stat-sprite" src="${spriteUrl}" alt="">`
        : `<span class="stat-sprite" style="background:${elemColor}"></span>`}
      <span class="stat-name" style="color:${elemColor}">${s.name}</span>
      <div class="stat-bar-container">
        <div class="stat-bar" style="width:${pct}%;background:${barColor}"></div>
      </div>
      <span class="stat-value">${formatNumber(val)}<span style="font-size:8px;color:#888">${perSec}</span></span>
    </div>`;
  }

  list.innerHTML = html || '<div style="color:#555;text-align:center;padding:20px">Pas encore de donnees</div>';
}

// ═══════════════════════════════════════════════════════════
// DPS GRAPH (Canvas-based line chart)
// ═══════════════════════════════════════════════════════════

const GRAPH_COLORS = ['#f59e0b', '#3b82f6', '#8b5cf6', '#10b981', '#ef4444', '#06b6d4', '#f97316', '#ec4899'];

function renderDpsGraph() {
  const container = document.getElementById('graph-container');
  if (!container.classList.contains('active')) return;

  const graphCanvas = document.getElementById('dps-graph');
  const gctx = graphCanvas.getContext('2d');
  graphCanvas.width = container.clientWidth - 8;
  graphCanvas.height = container.clientHeight - 8;

  const W = graphCanvas.width;
  const H = graphCanvas.height;
  const PAD = { top: 24, right: 8, bottom: 28, left: 48 };

  gctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = gctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, 'rgba(88, 28, 135, 0.08)');
  bgGrad.addColorStop(1, 'rgba(30, 27, 75, 0.08)');
  gctx.fillStyle = bgGrad;
  gctx.fillRect(0, 0, W, H);

  if (dpsHistory.length < 2) {
    gctx.fillStyle = '#555';
    gctx.font = '12px sans-serif';
    gctx.textAlign = 'center';
    gctx.fillText('En attente de donnees...', W / 2, H / 2);
    return;
  }

  // Find top 8 characters by total damage
  const topChars = Object.entries(combatStats)
    .filter(([id]) => !id.startsWith('mob_') && !id.startsWith('boss_'))
    .sort((a, b) => b[1].dmgDealt - a[1].dmgDealt)
    .slice(0, 8);

  if (topChars.length === 0) return;

  const timeMin = dpsHistory[0].time;
  const timeMax = dpsHistory[dpsHistory.length - 1].time;
  const timeRange = timeMax - timeMin || 1;

  // Calculate max DPS value
  let maxDps = 0;
  for (const snap of dpsHistory) {
    for (const [id] of topChars) {
      const dmg = snap.dmg[id] || 0;
      const dps = snap.time > 0 ? dmg / snap.time : 0;
      if (dps > maxDps) maxDps = dps;
    }
  }
  maxDps = maxDps * 1.15 || 100;

  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  // Grid lines
  gctx.strokeStyle = 'rgba(255,255,255,0.06)';
  gctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + plotH * (1 - i / 4);
    gctx.beginPath();
    gctx.moveTo(PAD.left, y);
    gctx.lineTo(PAD.left + plotW, y);
    gctx.stroke();
    gctx.fillStyle = '#555';
    gctx.font = '9px sans-serif';
    gctx.textAlign = 'right';
    gctx.fillText(formatNumber(maxDps * i / 4) + '/s', PAD.left - 4, y + 3);
  }

  // X axis labels
  const xTicks = Math.min(5, Math.max(2, Math.floor(timeRange / 15) + 1));
  for (let i = 0; i <= xTicks; i++) {
    const t = timeMin + timeRange * i / xTicks;
    const x = PAD.left + plotW * i / xTicks;
    gctx.fillStyle = '#555';
    gctx.font = '9px sans-serif';
    gctx.textAlign = 'center';
    gctx.fillText(formatTime(t), x, H - 6);
  }

  // Draw lines
  for (let ci = 0; ci < topChars.length; ci++) {
    const [charId] = topChars[ci];
    const color = GRAPH_COLORS[ci % GRAPH_COLORS.length];

    gctx.strokeStyle = color;
    gctx.lineWidth = 1.5;
    gctx.lineJoin = 'round';
    gctx.beginPath();

    let first = true;
    for (const snap of dpsHistory) {
      const dmg = snap.dmg[charId] || 0;
      const dps = snap.time > 0 ? dmg / snap.time : 0;
      const x = PAD.left + ((snap.time - timeMin) / timeRange) * plotW;
      const y = PAD.top + plotH * (1 - dps / maxDps);

      if (first) { gctx.moveTo(x, y); first = false; }
      else gctx.lineTo(x, y);
    }
    gctx.stroke();
  }

  // Legend (compact, 2 columns)
  const legendStartY = PAD.top + 2;
  for (let ci = 0; ci < Math.min(topChars.length, 8); ci++) {
    const [, stats] = topChars[ci];
    const color = GRAPH_COLORS[ci % GRAPH_COLORS.length];
    const col = ci % 2;
    const row = Math.floor(ci / 2);
    const x = PAD.left + 4 + col * (plotW / 2);
    const y = legendStartY + row * 11;

    gctx.fillStyle = color;
    gctx.fillRect(x, y, 6, 6);
    gctx.fillStyle = '#aaa';
    gctx.font = '8px sans-serif';
    gctx.textAlign = 'left';
    const name = stats.name.length > 12 ? stats.name.slice(0, 12) + '..' : stats.name;
    const elapsed = state?.elapsedTime || 1;
    const dps = formatNumber(stats.dmgDealt / elapsed);
    gctx.fillText(`${name} ${dps}/s`, x + 9, y + 5);
  }

  // Title
  gctx.fillStyle = '#a855f7';
  gctx.font = 'bold 10px sans-serif';
  gctx.textAlign = 'left';
  gctx.fillText('DPS par hunter', PAD.left, PAD.top - 8);
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════

const GROUND_Y_RATIO = 0.7;
const SCALE = 0.5;
const CHAR_SIZE = 40;
const MOB_SIZE_BASIC = 14;
const MOB_SIZE_ELITE = 22;
const BOSS_SIZE = 80;         // Bigger for sprite

let lastTime = performance.now();

function render() {
  requestAnimationFrame(render);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Update animation states
  for (const id in animStates) {
    animStates[id].timer -= dt;
    if (animStates[id].timer <= 0) delete animStates[id];
  }

  // ── Position interpolation ──
  if (state) {
    for (const c of state.characters || []) {
      const ip = interpPositions[c.id];
      if (ip) ip.x += (c.x - ip.x) * Math.min(1, LERP_SPEED * dt);
    }
    for (const m of state.mobs || []) {
      const ip = interpPositions[m.id];
      if (ip) ip.x += (m.x - ip.x) * Math.min(1, LERP_SPEED * dt);
    }
    if (state.boss) {
      const ip = interpPositions[state.boss.id];
      if (ip) ip.x += (state.boss.x - ip.x) * Math.min(1, LERP_SPEED * dt);
    }
  }

  if (!state) {
    ctx.fillStyle = '#555';
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('En attente de l\'expedition...', canvas.width / 2, canvas.height / 2);
    return;
  }

  const groundY = canvas.height * GROUND_Y_RATIO;

  // Camera follows average X of alive characters (smoothed)
  if (state.characters.length > 0) {
    const aliveChars = state.characters.filter(c => c.alive);
    if (aliveChars.length > 0) {
      const avgX = aliveChars.reduce((s, c) => {
        const ip = interpPositions[c.id];
        return s + (ip ? ip.x : c.x);
      }, 0) / aliveChars.length;
      const targetCam = avgX * SCALE - canvas.width * 0.3;
      cameraX += (targetCam - cameraX) * Math.min(1, 4 * dt);
    }
  }

  // ── Sky gradient ──
  const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
  skyGrad.addColorStop(0, '#0a0a20');
  skyGrad.addColorStop(1, '#1a1a35');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, groundY);

  // ── Ground ──
  ctx.fillStyle = '#2d1810';
  ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

  // Ground detail
  ctx.fillStyle = '#3d2818';
  for (let x = -((cameraX * 0.5) % 40); x < canvas.width; x += 40) {
    ctx.fillRect(x, groundY, 38, 20);
  }
  ctx.fillStyle = '#4d3828';
  for (let x = -((cameraX * 0.5) % 40) + 20; x < canvas.width; x += 40) {
    ctx.fillRect(x, groundY + 20, 38, 20);
  }

  // ── Campfire ──
  if (state.status === 'campfire') {
    const fireX = canvas.width / 2;
    const fireY = groundY - 20;
    const glowGrad = ctx.createRadialGradient(fireX, fireY, 5, fireX, fireY, 100);
    glowGrad.addColorStop(0, 'rgba(255, 150, 50, 0.5)');
    glowGrad.addColorStop(1, 'rgba(255, 150, 50, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(fireX - 100, fireY - 100, 200, 200);
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(fireX, fireY, 10 + Math.sin(Date.now() / 100) * 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.arc(fireX, fireY - 6, 6 + Math.cos(Date.now() / 80) * 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Draw Mobs ──
  for (const mob of (state.mobs || [])) {
    if (!mob.alive) continue;
    const ip = interpPositions[mob.id];
    const sx = (ip ? ip.x : mob.x) * SCALE - cameraX;
    const sy = groundY;
    const spriteSize = mob.elite ? 32 : 24;
    const anim = animStates[mob.id];

    ctx.save();
    if (anim?.type === 'hit') ctx.globalAlpha = 0.6;

    // Try mob sprite
    const mobSprite = mob.templateKey ? mobSpriteCache[mob.templateKey] : null;
    if (mobSprite?.complete) {
      ctx.drawImage(mobSprite, sx - spriteSize / 2, sy - spriteSize, spriteSize, spriteSize);
      // Red tint border for elites
      if (mob.elite) {
        ctx.strokeStyle = '#ff4444';
        ctx.lineWidth = 2;
        ctx.strokeRect(sx - spriteSize / 2, sy - spriteSize, spriteSize, spriteSize);
      }
    } else {
      // Fallback: colored rectangles
      const size = mob.elite ? MOB_SIZE_ELITE : MOB_SIZE_BASIC;
      ctx.fillStyle = mob.caster ? '#9333ea' : mob.elite ? '#991b1b' : '#dc2626';
      ctx.fillRect(sx - size / 2, sy - size, size, size);
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx - size / 4 - 1, sy - size * 0.7, 2, 2);
      ctx.fillRect(sx + size / 4 - 1, sy - size * 0.7, 2, 2);
    }

    ctx.restore();

    drawHpBar(sx, sy - spriteSize - 4, spriteSize + 4, 3, mob.hp / mob.maxHp);

    ctx.fillStyle = '#aaa';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(mob.name, sx, sy - spriteSize - 8);
  }

  // ── Draw Boss ──
  if (state.boss) {
    const b = state.boss;
    const ip = interpPositions[b.id];
    const sx = (ip ? ip.x : b.x) * SCALE - cameraX;
    const sy = groundY;
    const anim = animStates[b.id];

    ctx.save();
    if (anim?.type === 'hit') ctx.globalAlpha = 0.7;

    // Try to draw boss sprite
    const bossIdx = b.index ?? BOSS_ID_TO_INDEX[b.id];
    const bossSprite = bossIdx != null ? bossSpriteCache[bossIdx] : null;

    if (bossSprite?.complete) {
      // Draw boss sprite (large, with border)
      const bsz = BOSS_SIZE;
      ctx.save();
      // Rounded rect clip
      const rx = sx - bsz / 2;
      const ry = sy - bsz;
      const radius = 8;
      ctx.beginPath();
      ctx.moveTo(rx + radius, ry);
      ctx.lineTo(rx + bsz - radius, ry);
      ctx.quadraticCurveTo(rx + bsz, ry, rx + bsz, ry + radius);
      ctx.lineTo(rx + bsz, ry + bsz - radius);
      ctx.quadraticCurveTo(rx + bsz, ry + bsz, rx + bsz - radius, ry + bsz);
      ctx.lineTo(rx + radius, ry + bsz);
      ctx.quadraticCurveTo(rx, ry + bsz, rx, ry + bsz - radius);
      ctx.lineTo(rx, ry + radius);
      ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(bossSprite, rx, ry, bsz, bsz);
      ctx.restore();

      // Border (enraged = red, normal = gold)
      const borderColor = b.enraged ? '#ff0000' : '#eab308';
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(rx + radius, ry);
      ctx.lineTo(rx + bsz - radius, ry);
      ctx.quadraticCurveTo(rx + bsz, ry, rx + bsz, ry + radius);
      ctx.lineTo(rx + bsz, ry + bsz - radius);
      ctx.quadraticCurveTo(rx + bsz, ry + bsz, rx + bsz - radius, ry + bsz);
      ctx.lineTo(rx + radius, ry + bsz);
      ctx.quadraticCurveTo(rx, ry + bsz, rx, ry + bsz - radius);
      ctx.lineTo(rx, ry + radius);
      ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
      ctx.closePath();
      ctx.stroke();

      // Enraged pulsing glow
      if (b.enraged) {
        const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.2;
        const glow = ctx.createRadialGradient(sx, sy - bsz / 2, bsz / 3, sx, sy - bsz / 2, bsz);
        glow.addColorStop(0, `rgba(255, 0, 0, ${pulse})`);
        glow.addColorStop(1, 'rgba(255, 0, 0, 0)');
        ctx.fillStyle = glow;
        ctx.fillRect(sx - bsz, sy - bsz * 1.5, bsz * 2, bsz * 2);
      }
    } else {
      // Fallback: geometric boss
      ctx.fillStyle = b.enraged ? '#ff0000' : '#7c2d12';
      ctx.fillRect(sx - BOSS_SIZE / 2, sy - BOSS_SIZE, BOSS_SIZE, BOSS_SIZE);

      // Crown
      ctx.fillStyle = '#eab308';
      ctx.beginPath();
      ctx.moveTo(sx - 16, sy - BOSS_SIZE);
      ctx.lineTo(sx - 10, sy - BOSS_SIZE - 14);
      ctx.lineTo(sx - 5, sy - BOSS_SIZE - 5);
      ctx.lineTo(sx, sy - BOSS_SIZE - 16);
      ctx.lineTo(sx + 5, sy - BOSS_SIZE - 5);
      ctx.lineTo(sx + 10, sy - BOSS_SIZE - 14);
      ctx.lineTo(sx + 16, sy - BOSS_SIZE);
      ctx.closePath();
      ctx.fill();

      // Eyes
      ctx.fillStyle = b.enraged ? '#fff' : '#ef4444';
      ctx.beginPath();
      ctx.arc(sx - 12, sy - BOSS_SIZE * 0.6, 5, 0, Math.PI * 2);
      ctx.arc(sx + 12, sy - BOSS_SIZE * 0.6, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // HP bar
    drawHpBar(sx, sy - BOSS_SIZE - 20, 140, 8, b.hp / b.maxHp);

    // Name + HP%
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(b.name, sx, sy - BOSS_SIZE - 28);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`${Math.floor(b.hp / b.maxHp * 100)}%`, sx, sy - BOSS_SIZE - 10);
    ctx.shadowBlur = 0;

    // Telegraph indicator
    if (b.patternPhase === 'telegraph' && b.currentPattern) {
      const pulse = Math.sin(Date.now() / 150) * 0.15 + 0.25;
      ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
      const telW = BOSS_SIZE + 100;
      ctx.fillRect(sx - telW / 2, sy - BOSS_SIZE - 5, telW, BOSS_SIZE + 10);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 12px sans-serif';
      ctx.shadowColor = 'rgba(0,0,0,0.8)';
      ctx.shadowBlur = 4;
      ctx.fillText(`!! ${b.currentPattern} !!`, sx, sy - BOSS_SIZE + 30);
      ctx.shadowBlur = 0;
    }
  }

  // ── Draw Characters ──
  for (const char of (state.characters || [])) {
    const ip = interpPositions[char.id];
    const sx = (ip ? ip.x : char.x) * SCALE - cameraX;
    const sy = groundY;
    const anim = animStates[char.id];

    // Dead characters: ghost
    if (!char.alive) {
      if (anim?.type !== 'death') continue;
      ctx.save();
      ctx.globalAlpha = Math.max(0, anim.timer / 1.0) * 0.5;
      const deathOffset = (1.0 - anim.timer) * 15;
      drawCharacter(char, sx, sy + deathOffset);
      ctx.restore();
      continue;
    }

    ctx.save();

    // Animation effects
    if (anim?.type === 'attack') {
      const scale = 1 + 0.15 * (anim.timer / 0.2);
      ctx.translate(sx, sy - CHAR_SIZE / 2);
      ctx.scale(scale, scale);
      ctx.translate(-sx, -(sy - CHAR_SIZE / 2));
    }

    if (anim?.type === 'hit') {
      ctx.globalAlpha = 0.7;
    }

    if (anim?.type === 'heal') {
      const glowAlpha = anim.timer / 0.3 * 0.4;
      const glow = ctx.createRadialGradient(sx, sy - CHAR_SIZE / 2, 5, sx, sy - CHAR_SIZE / 2, 30);
      glow.addColorStop(0, `rgba(34, 197, 94, ${glowAlpha})`);
      glow.addColorStop(1, 'rgba(34, 197, 94, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(sx - 30, sy - CHAR_SIZE - 10, 60, CHAR_SIZE + 20);
    }

    drawCharacter(char, sx, sy);

    ctx.restore();

    // HP bar
    drawHpBar(sx, sy + 2, 36, 4, char.hp / char.maxHp);

    // Mana bar
    if (char.maxMana) {
      const manaRatio = (char.mana || 0) / char.maxMana;
      const barX = sx - 18;
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(barX, sy + 7, 36, 2);
      ctx.fillStyle = '#3b82f6';
      ctx.fillRect(barX, sy + 7, 36 * Math.max(0, manaRatio), 2);
    }

    // Name above character
    const elemColor = ELEMENT_COLORS[char.element] || '#888';
    ctx.fillStyle = elemColor;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 2;
    ctx.fillText(char.name, sx, sy - CHAR_SIZE - 4);
    ctx.shadowBlur = 0;
  }

  // ── Floating Numbers ──
  for (let i = floatingNumbers.length - 1; i >= 0; i--) {
    const f = floatingNumbers[i];
    f.life -= dt;
    f.y += f.vy * dt;
    f.vy *= 0.97;
    if (f.life <= 0) { floatingNumbers.splice(i, 1); continue; }

    const sx = f.x * SCALE - cameraX;
    const sy = GROUND_Y_RATIO * canvas.height + f.y;
    const alpha = Math.min(1, f.life / 0.5);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = f.color;
    ctx.font = `bold ${f.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(f.text, sx, sy);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // ── Phase overlay text ──
  if (state.status === 'march') {
    ctx.fillStyle = 'rgba(37, 99, 235, 0.12)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#60a5fa';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 6;
    ctx.fillText('En marche...', canvas.width / 2, 50);
    ctx.shadowBlur = 0;
  }
  if (state.status === 'loot_roll') {
    ctx.fillStyle = 'rgba(168, 85, 247, 0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#c084fc';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 6;
    ctx.fillText('Distribution du loot...', canvas.width / 2, 50);
    ctx.shadowBlur = 0;
  }

  scheduleStatsRender();
}

function drawCharacter(char, sx, sy) {
  const sprite = char.hunterId ? spriteCache[char.hunterId] : null;

  if (sprite?.complete) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(sx, sy - CHAR_SIZE / 2, CHAR_SIZE / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(sprite, sx - CHAR_SIZE / 2, sy - CHAR_SIZE, CHAR_SIZE, CHAR_SIZE);
    ctx.restore();

    // Border ring
    const elemColor = ELEMENT_COLORS[char.element] || '#888';
    ctx.strokeStyle = elemColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy - CHAR_SIZE / 2, CHAR_SIZE / 2, 0, Math.PI * 2);
    ctx.stroke();
  } else {
    // Fallback: colored shapes
    const color = ELEMENT_COLORS[char.element] || '#888';
    const size = 14;
    ctx.fillStyle = color;

    switch (ROLE_SHAPES[char.role]) {
      case 'circle':
        ctx.beginPath();
        ctx.arc(sx, sy - size / 2, size / 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'triangle':
        ctx.beginPath();
        ctx.moveTo(sx, sy - size);
        ctx.lineTo(sx - size / 2, sy);
        ctx.lineTo(sx + size / 2, sy);
        ctx.closePath();
        ctx.fill();
        break;
      case 'diamond':
        ctx.beginPath();
        ctx.moveTo(sx, sy - size);
        ctx.lineTo(sx + size / 2, sy - size / 2);
        ctx.lineTo(sx, sy);
        ctx.lineTo(sx - size / 2, sy - size / 2);
        ctx.closePath();
        ctx.fill();
        break;
      default:
        ctx.fillRect(sx - size / 2, sy - size, size, size);
    }
  }
}

function drawHpBar(x, y, width, height, ratio) {
  const barX = x - width / 2;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(barX - 1, y - 1, width + 2, height + 2);
  const color = ratio > 0.6 ? '#22c55e' : ratio > 0.3 ? '#f59e0b' : '#ef4444';
  ctx.fillStyle = color;
  ctx.fillRect(barX, y, width * Math.max(0, ratio), height);
}

// ── Start ──
connect();
render();
</script>
