    html += `<div class="wow-stat"><span class="wow-stat-label">Total</span><span class="wow-stat-val" style="color:#f97316">${formatNumber(dmg)}</span></div>`;
    html += `<div class="wow-stat"><span class="wow-stat-label">Moy/hit</span><span class="wow-stat-val" style="color:#fb923c">${formatNumber(avgHit)}</span></div>`;
    html += `<div class="wow-stat"><span class="wow-stat-label">Crit%</span><span class="wow-stat-val" style="color:#fbbf24">${critRate}%</span></div>`;
    html += `<div class="wow-stat"><span class="wow-stat-label">Max crit</span><span class="wow-stat-val" style="color:#fbbf24">${formatNumber(s.maxCrit || 0)}</span></div>`;
    html += `<div class="wow-stat"><span class="wow-stat-label">Kills</span><span class="wow-stat-val" style="color:#22c55e">${s.kills || 0}</span></div>`;
    html += `<div class="wow-stat"><span class="wow-stat-label">Morts</span><span class="wow-stat-val" style="color:#dc2626">${s.deaths || 0}</span></div>`;
    html += '</div></div>';
  }

  // Top Healers
  const sortedHeals = [...entries].sort((a, b) => (b[1].healsGiven || 0) - (a[1].healsGiven || 0)).slice(0, 10);
  const hasHeals = sortedHeals.some(([, s]) => (s.healsGiven || 0) > 0);
  if (hasHeals) {
    html += '<div class="wow-section-title">Top Healers</div>';
    for (let i = 0; i < sortedHeals.length; i++) {
      const [id, s] = sortedHeals[i];
      const heals = s.healsGiven || 0;
      if (heals === 0) continue;
      const hps = heals / combatSec;
      const contrib = totalHeals > 0 ? (heals / totalHeals * 100).toFixed(1) : '0';
      const thumbSrc = s.hunterId ? thumbDataUrls[s.hunterId] : null;
      const elemColor = ELEMENT_COLORS[s.element] || '#888';
      html += `<div style="padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:4px;cursor:pointer" onclick="focusOnCharacter('${id}')">`;
      html += `<span style="color:#555;font-size:9px;width:14px;text-align:right">${i + 1}.</span>`;
      html += thumbSrc ? `<img src="${thumbSrc}" style="width:16px;height:16px;border-radius:3px">` : '';
      html += `<span style="color:${elemColor};font-size:10px;flex:1">${s.name}</span>`;
      html += `<span style="color:#22c55e;font-size:10px;font-weight:bold">${formatNumber(hps)}/s</span>`;
      html += `<span style="color:#888;font-size:8px">${contrib}%</span>`;
      html += '</div>';
    }
  }

  // Damage Taken
  const sortedTaken = [...entries].sort((a, b) => (b[1].dmgReceived || 0) - (a[1].dmgReceived || 0)).slice(0, 10);
  const hasTaken = sortedTaken.some(([, s]) => (s.dmgReceived || 0) > 0);
  if (hasTaken) {
    html += '<div class="wow-section-title">Degats recus (Tanks)</div>';
    for (let i = 0; i < sortedTaken.length; i++) {
      const [id, s] = sortedTaken[i];
      const taken = s.dmgReceived || 0;
      if (taken === 0) continue;
      const dtps = taken / combatSec;
      const thumbSrc = s.hunterId ? thumbDataUrls[s.hunterId] : null;
      const elemColor = ELEMENT_COLORS[s.element] || '#888';
      html += `<div style="padding:3px 8px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:4px;cursor:pointer" onclick="focusOnCharacter('${id}')">`;
      html += `<span style="color:#555;font-size:9px;width:14px;text-align:right">${i + 1}.</span>`;
      html += thumbSrc ? `<img src="${thumbSrc}" style="width:16px;height:16px;border-radius:3px">` : '';
      html += `<span style="color:${elemColor};font-size:10px;flex:1">${s.name}</span>`;
      html += `<span style="color:#f59e0b;font-size:10px;font-weight:bold">${formatNumber(dtps)}/s</span>`;
      html += `<span style="color:#888;font-size:8px">${formatNumber(taken)}</span>`;
      html += '</div>';
    }
  }

  // Deaths list
  const deadEntries = entries.filter(([, s]) => (s.deaths || 0) > 0).sort((a, b) => (b[1].deaths || 0) - (a[1].deaths || 0));
  if (deadEntries.length > 0) {
    html += '<div class="wow-section-title">Morts</div>';
    for (const [id, s] of deadEntries) {
      const thumbSrc = s.hunterId ? thumbDataUrls[s.hunterId] : null;
      const elemColor = ELEMENT_COLORS[s.element] || '#888';
      html += `<div style="padding:3px 8px;display:flex;align-items:center;gap:4px;border-bottom:1px solid rgba(255,255,255,0.03)">`;
      html += thumbSrc ? `<img src="${thumbSrc}" style="width:14px;height:14px;border-radius:3px">` : '';
      html += `<span style="color:${elemColor};font-size:10px;flex:1">${s.name}</span>`;
      html += `<span style="color:#dc2626;font-size:10px;font-weight:bold">${s.deaths}x \u2620</span>`;
      html += '</div>';
    }
  }

  list.innerHTML = html;
}

// DPS Graph
const GRAPH_COLORS = ['#f59e0b', '#3b82f6', '#8b5cf6', '#10b981', '#ef4444', '#06b6d4', '#f97316', '#ec4899'];
function renderDpsGraph() {
  const container = document.getElementById('graph-container');
  if (!container.classList.contains('active')) return;
  const graphCanvas = document.getElementById('dps-graph');
  const gctx = graphCanvas.getContext('2d');
  graphCanvas.width = container.clientWidth - 8;
  graphCanvas.height = container.clientHeight - 8;
  const W = graphCanvas.width, H = graphCanvas.height;
  const PAD = { top: 24, right: 8, bottom: 28, left: 48 };
  gctx.clearRect(0, 0, W, H);
  const bgGrad = gctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, 'rgba(88, 28, 135, 0.08)'); bgGrad.addColorStop(1, 'rgba(30, 27, 75, 0.08)');
  gctx.fillStyle = bgGrad; gctx.fillRect(0, 0, W, H);
  if (dpsHistory.length < 2) { gctx.fillStyle = '#555'; gctx.font = '12px sans-serif'; gctx.textAlign = 'center'; gctx.fillText('En attente de donnees...', W / 2, H / 2); return; }
  const topChars = Object.entries(combatStats).filter(([id]) => !id.startsWith('mob_') && !id.startsWith('boss_')).sort((a, b) => b[1].dmgDealt - a[1].dmgDealt).slice(0, 8);
  if (topChars.length === 0) return;
  const timeMin = dpsHistory[0].time, timeMax = dpsHistory[dpsHistory.length - 1].time, timeRange = timeMax - timeMin || 1;
  let maxDps = 0;
  for (const snap of dpsHistory) for (const [id] of topChars) { const ct = snap.combatTime || snap.time; const dps = ct > 0 ? (snap.dmg[id] || 0) / ct : 0; if (dps > maxDps) maxDps = dps; }
  maxDps = maxDps * 1.15 || 100;
  const plotW = W - PAD.left - PAD.right, plotH = H - PAD.top - PAD.bottom;
  gctx.strokeStyle = 'rgba(255,255,255,0.06)'; gctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) { const y = PAD.top + plotH * (1 - i / 4); gctx.beginPath(); gctx.moveTo(PAD.left, y); gctx.lineTo(PAD.left + plotW, y); gctx.stroke(); gctx.fillStyle = '#555'; gctx.font = '9px sans-serif'; gctx.textAlign = 'right'; gctx.fillText(formatNumber(maxDps * i / 4) + '/s', PAD.left - 4, y + 3); }
  for (let ci = 0; ci < topChars.length; ci++) {
    const [charId] = topChars[ci]; const color = GRAPH_COLORS[ci % GRAPH_COLORS.length];
    gctx.strokeStyle = color; gctx.lineWidth = 1.5; gctx.lineJoin = 'round'; gctx.beginPath();
    let first = true;
    for (const snap of dpsHistory) { const ct = snap.combatTime || snap.time; const dps = ct > 0 ? (snap.dmg[charId] || 0) / ct : 0; const x = PAD.left + ((snap.time - timeMin) / timeRange) * plotW; const y = PAD.top + plotH * (1 - dps / maxDps); if (first) { gctx.moveTo(x, y); first = false; } else gctx.lineTo(x, y); }
    gctx.stroke();
  }
  for (let ci = 0; ci < Math.min(topChars.length, 8); ci++) { const [, stats] = topChars[ci]; const color = GRAPH_COLORS[ci % GRAPH_COLORS.length]; const col = ci % 2; const row = Math.floor(ci / 2); const x = PAD.left + 4 + col * (plotW / 2); const y = PAD.top + 2 + row * 11; gctx.fillStyle = color; gctx.fillRect(x, y, 6, 6); gctx.fillStyle = '#aaa'; gctx.font = '8px sans-serif'; gctx.textAlign = 'left'; const name = stats.name.length > 12 ? stats.name.slice(0, 12) + '..' : stats.name; gctx.fillText(`${name} ${formatNumber(stats.dmgDealt / Math.max(1, combatElapsedTime))}/s`, x + 9, y + 5); }
  gctx.fillStyle = '#a855f7'; gctx.font = 'bold 10px sans-serif'; gctx.textAlign = 'left'; gctx.fillText('DPS par hunter', PAD.left, PAD.top - 8);
}

function renderTimeline() {
  if (!statsPanelOpen || activeStatsTab !== 'timeline') return;
  const list = document.getElementById('stats-list');

  // Collect unique players
  const players = new Set();
  for (const c of (state?.characters || [])) { if (c.username) players.add(c.username); }

  // Build timeline HTML
  let html = '<div style="padding:4px;font-size:10px;">';

  // Player filter
  html += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px;">';
  html += '<span class="tl-filter active" data-player="all" style="padding:1px 6px;border-radius:8px;border:1px solid #555;cursor:pointer;font-size:9px;color:#aaa;background:rgba(168,85,247,0.15);border-color:#a855f7;color:#c084fc">Tous</span>';
  for (const p of players) {
    html += `<span class="tl-filter" data-player="${p}" style="padding:1px 6px;border-radius:8px;border:1px solid #333;cursor:pointer;font-size:9px;color:#888">${p}</span>`;
  }
  html += '</div>';

  // Events in reverse order (newest first)
  const events = [...timelineEvents].reverse().slice(0, 100);
  const typeIcons = { death: '\u{1F480}', kill: '\u2694', loot: '\u{1F381}', phase: '\u{1F3C1}', boss: '\u{1F451}' };
  const typeColors = { death: '#dc2626', kill: '#f59e0b', loot: '#a855f7', phase: '#3b82f6', boss: '#eab308' };

  if (events.length === 0) {
    html += '<div style="color:#555;text-align:center;padding:20px">Aucun evenement</div>';
  } else {
    for (const ev of events) {
      const icon = typeIcons[ev.type] || '\u2022';
      const color = typeColors[ev.type] || '#888';
      let text = '';
      switch (ev.type) {
        case 'death': text = `<span style="color:#dc2626">${ev.name} est mort!</span>`; break;
        case 'kill': text = `<span style="color:#f59e0b">${ev.killer}</span> <span style="color:#888">tue</span> <span style="color:#ccc">${ev.target}</span>`; break;
        case 'loot': text = `<span style="color:${ev.rarityColor || '#888'}">${ev.itemName}</span> → <span style="color:#22c55e">${ev.winner}</span>${ev.stolen ? ' <span style="color:#dc2626">(VOLE!)</span>' : ''}`; break;
        case 'phase': text = `<span style="color:#60a5fa">${ev.text}</span>`; break;
        case 'boss': text = `<span style="color:#eab308">${ev.text}</span>`; break;
        default: text = ev.text || '';
      }
      html += `<div style="display:flex;gap:4px;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.03)"><span style="color:#555;font-family:monospace;font-size:9px;min-width:30px">${formatTime(ev.time)}</span><span style="font-size:11px">${icon}</span><span style="flex:1;font-size:10px">${text}</span></div>`;
    }
  }
  html += '</div>';
  list.innerHTML = html;

  // Filter click handlers
  list.querySelectorAll('.tl-filter').forEach(f => {

      });
      f.style.background = 'rgba(168,85,247,0.15)'; f.style.borderColor = '#a855f7'; f.style.color = '#c084fc';

      // For now just visual feedback
    });
  });
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════

const GROUND_Y_RATIO = 0.52;  // Even more floor space (was 0.62)
const CHAR_SIZE = 48;         // Bigger characters (was 40)
const BOSS_SIZE = 90;         // Bigger boss (was 80)
const CHAR_Y_BASE = 200;     // Push entities further down onto floor (was 150)
function entityScreenY(serverY) { return ((serverY || 0) + CHAR_Y_BASE) * camera.zoom; }

let lastTime = performance.now();

function render() {
  requestAnimationFrame(render);
  if (document.hidden) return;
  const now = performance.now();
  const dt = Math.min(0.1, (now - lastTime) / 1000);
  lastTime = now;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Accumulate combat time only during combat
  if (state?.status === 'combat') {
    combatElapsedTime += dt;
    currentEncounterCombatTime += dt;
  }

  // Update animation states
  for (const id in animStates) { animStates[id].timer -= dt; if (animStates[id].timer <= 0) delete animStates[id]; }

  // Smooth zoom
  camera.zoom += (camera.targetZoom - camera.zoom) * Math.min(1, 8 * dt);

  // Position interpolation: velocity prediction + server correction
  if (state) {
    const allEntities = [
      ...(state.characters || []).map(c => c.id),
      ...(state.mobs || []).map(m => m.id),
      ...(state.boss ? [state.boss.id] : []),
    ];
    for (const id of allEntities) {
      const ip = interpPositions[id];
      if (!ip) continue;
      // Predict: move along velocity
      ip.x += ip.vx * dt;
      ip.y += ip.vy * dt;
      // Correct: blend toward server target position
      const blendFactor = Math.min(1, PREDICT_BLEND * dt);
      ip.x += (ip.targetX - ip.x) * blendFactor;
      ip.y += (ip.targetY - ip.y) * blendFactor;
      // Friction: gradually slow down velocity
      ip.vx *= (1 - 2 * dt);
      ip.vy *= (1 - 2 * dt);
    }
  }

  if (!state) {
    ctx.fillStyle = '#555'; ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText("En attente de l'expedition...", canvas.width / 2, canvas.height / 2);
    return;
  }

  const groundY = canvas.height * GROUND_Y_RATIO;

  // Camera focus-follow (click-to-focus on a specific character)
  if (focusTarget) {
    const fChar = findEntity(focusTarget.charId);
    if (fChar) {
      const ip = interpPositions[focusTarget.charId];
      const targetCam = (ip ? ip.x : fChar.x) * camera.zoom - canvas.width * 0.4;
      camera.x += (targetCam - camera.x) * Math.min(1, 6 * dt);
    }
    focusTarget.timer -= dt;
    if (focusTarget.timer <= 0) { focusTarget = null; camera.autoFollow = true; }
  }
  // Camera auto-follow
  else if (camera.autoFollow && state.characters.length > 0) {
    const aliveChars = state.characters.filter(c => c.alive && !c.resting);
    if (aliveChars.length > 0) {
      const avgX = aliveChars.reduce((s, c) => s + (interpPositions[c.id]?.x ?? c.x), 0) / aliveChars.length;
      const targetCam = avgX * camera.zoom - canvas.width * 0.3;
      camera.x += (targetCam - camera.x) * Math.min(1, 4 * dt);
    }
  }

  // ── PARALLAX BACKGROUND (Phase 3) ──
  drawParallax(groundY);

  // ── CAMPFIRE (Phase 8) ──
  if (state.status === 'campfire') {
    drawCampfire(dt, groundY);
  }

  // ── PHASE ATMOSPHERES (Phase 3) ──
  if (state.status === 'combat') {
    // Red vignette
    const vgrad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.width * 0.3, canvas.width / 2, canvas.height / 2, canvas.width * 0.7);
    vgrad.addColorStop(0, 'rgba(0,0,0,0)');
    vgrad.addColorStop(1, 'rgba(180,0,0,0.08)');
    ctx.fillStyle = vgrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── COLLECT ALL ENTITIES FOR DEPTH SORTING (Phase 4) ──
  const drawCalls = [];

  // Mobs
  for (const mob of (state.mobs || [])) {
    if (!mob.alive) continue;
    const ip = interpPositions[mob.id];
    const sx = (ip ? ip.x : mob.x) * camera.zoom - camera.x;
    const entityY = entityScreenY(ip?.y ?? mob.y ?? 0);
    const sy = groundY + entityY;
    if (sx < -100 || sx > canvas.width + 100) continue;
    drawCalls.push({ sy, fn: () => drawMob(mob, sx, sy) });
  }

  // Boss
  if (state.boss) {
    const b = state.boss;
    const ip = interpPositions[b.id];
    const sx = (ip ? ip.x : b.x) * camera.zoom - camera.x;
    const entityY = entityScreenY(ip?.y ?? b.y ?? 0);
    const sy = groundY + entityY;
    drawCalls.push({ sy, fn: () => drawBoss(b, sx, sy) });
  }

  // Characters
  for (const char of (state.characters || [])) {
    // Skip resting characters during combat (they're at camp)
    if (char.resting && state.status === 'combat') continue;

    const ip = interpPositions[char.id];
    const sx = (ip ? ip.x : char.x) * camera.zoom - camera.x;
    const entityY = entityScreenY(ip?.y ?? char.y ?? 0);
    let sy = groundY + entityY;

    // Campfire override positions
    if (state.status === 'campfire' && campfireLayout?.positions[char.id]) {
      const cp = campfireLayout.positions[char.id];
      if (char.resting) {
        // Resting chars drawn with special indicator
        drawCalls.push({ sy: cp.y, fn: () => drawRestingCharacter(char, cp.x, cp.y, dt) });
      } else {
        drawCalls.push({ sy: cp.y, fn: () => drawCharacterFull(char, cp.x, cp.y, dt) });
      }
      continue;
    }

    if (sx < -100 || sx > canvas.width + 100) continue;
    drawCalls.push({ sy, fn: () => drawCharacterFull(char, sx, sy, dt) });
  }

  // Sort by Y (back to front)
  drawCalls.sort((a, b) => a.sy - b.sy);
  for (const dc of drawCalls) dc.fn();

  // ── Rez Animations (Phase 8) ──
  for (let i = rezAnimations.length - 1; i >= 0; i--) {
    const ra = rezAnimations[i];
    ra.timer -= dt;
    if (ra.timer <= 0) { rezAnimations.splice(i, 1); continue; }
    const entity = findEntity(ra.targetId);
    if (!entity) continue;
    const ip = interpPositions[ra.targetId];
    const sx = (ip ? ip.x : entity.x) * camera.zoom - camera.x;
    const sy = groundY + entityScreenY(ip?.y ?? entity.y ?? 0);
    const progress = 1 - ra.timer / 2.0;
    ctx.save();
    ctx.globalAlpha = 0.5 + progress * 0.3;
    const columnGrad = ctx.createLinearGradient(sx, sy - 80, sx, sy);
    columnGrad.addColorStop(0, 'rgba(255, 215, 0, 0)');
    columnGrad.addColorStop(0.5, `rgba(255, 215, 0, ${0.4 * (1 - progress)})`);
    columnGrad.addColorStop(1, 'rgba(255, 215, 0, 0)');
    ctx.fillStyle = columnGrad;
    ctx.fillRect(sx - 15, sy - 80, 30, 80);
    // Sparkles
    for (let s = 0; s < 4; s++) {
      const sparkX = sx + (Math.random() - 0.5) * 30;
      const sparkY = sy - Math.random() * 70;
      ctx.fillStyle = `rgba(255, 215, 0, ${0.5 + Math.random() * 0.5})`;
      ctx.beginPath(); ctx.arc(sparkX, sparkY, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // ── VFX Particles (spells, impacts, heals) ──
  drawVFX(dt, groundY);

  // ── Character Info Popup ──
  drawCharacterPopup(dt);
  drawBossPopup(dt);

  // ── Speech Bubble (Phase 5) ──
  if (activeBubble) {
    activeBubble.timer -= dt;
    activeBubble.charIndex += dt * 30;
    if (activeBubble.timer <= 0) { activeBubble = null; }
    else drawBubble();
  }

  // ── Floating Numbers ──
  for (let i = floatingNumbers.length - 1; i >= 0; i--) {
    const f = floatingNumbers[i];
    f.life -= dt; f.y += f.vy * dt; f.vy *= 0.97;
    if (f.life <= 0) { floatingNumbers.splice(i, 1); continue; }
    const sx = f.x * camera.zoom - camera.x;
    const entityY = entityScreenY(f.entityY);
    const sy = groundY + entityY + f.y;
    const alpha = Math.min(1, f.life / 0.5);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = f.color; ctx.font = `bold ${f.size}px sans-serif`; ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
    ctx.strokeText(f.text, sx, sy);
    ctx.fillText(f.text, sx, sy);
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
  }

  // ── Loot Roll Overlay (Phase 7) ──
  if (state.status === 'loot_roll' && lootRollState && lootRollState.phase !== 'done') {
    drawLootRoll(dt);
  }

  // ── Narrative Overlay (Phase 9) ──
  if (narrativeOverlay) drawNarrative(dt);

  // ── TV Commentary (Phase 6) ──
  if (tvOverlay) {
    tvOverlay.timer -= dt;
    if (tvOverlay.timer <= 0) { tvOverlay = null; }
    else {
      const alpha = tvOverlay.timer < 0.5 ? tvOverlay.timer / 0.5 : tvOverlay.timer > 2 ? (2.5 - tvOverlay.timer) / 0.5 : 1;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect(ctx, canvas.width / 2 - 200, canvas.height * 0.25 - 20, 400, 40, 8);
      ctx.fill();
      ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
      ctx.fillText(tvOverlay.text, canvas.width / 2, canvas.height * 0.25 + 6);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  // ── March narrative (Phase 9) ──
  if (state.status === 'march' && marchNarrative) {
    marchNarrative.timer -= dt;
    if (marchNarrative.timer <= 0) marchNarrative = null;
    else {
      const alpha = marchNarrative.timer < 1 ? marchNarrative.timer : marchNarrative.timer > 7 ? 8 - marchNarrative.timer : 1;
      ctx.save(); ctx.globalAlpha = alpha * 0.7;
      ctx.fillStyle = '#60a5fa'; ctx.font = 'italic 16px sans-serif'; ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4;
      ctx.fillText(marchNarrative.text, canvas.width / 2, 50);
      ctx.shadowBlur = 0; ctx.restore();
    }
  }

  // ── Phase overlay ──
  if (state.status === 'march') {
    ctx.fillStyle = 'rgba(37, 99, 235, 0.06)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  if (state.status === 'finished') {
    ctx.fillStyle = 'rgba(34, 197, 94, 0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#22c55e'; ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10;
    ctx.fillText('VICTOIRE!', canvas.width / 2, canvas.height / 2 - 20);
    ctx.font = '16px sans-serif'; ctx.fillStyle = '#ccc';
    ctx.fillText(`Boss elimines: ${state.bossesKilled} | Survivants: ${state.aliveCount}/${state.totalCount}`, canvas.width / 2, canvas.height / 2 + 20);
    ctx.shadowBlur = 0;
  }
  if (state.status === 'wiped') {
    ctx.fillStyle = 'rgba(220, 38, 38, 0.1)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#dc2626'; ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10;
    ctx.fillText('DEFAITE...', canvas.width / 2, canvas.height / 2 - 20);
    ctx.font = '16px sans-serif'; ctx.fillStyle = '#999';
    ctx.fillText(`Boss elimines: ${state.bossesKilled} | Temps: ${formatTime(state.elapsedTime)}`, canvas.width / 2, canvas.height / 2 + 20);
    ctx.shadowBlur = 0;
  }

  // ── Campfire dialogues (Phase 8) ──
  if (state.status === 'campfire') {
    campfireDialogueTimer -= dt;
    if (campfireDialogueTimer <= 0 && (!activeBubble || activeBubble.timer <= 0)) {
      campfireDialogueTimer = 5 + Math.random() * 4;
      const alive = state.characters.filter(c => c.alive);
      if (alive.length > 0) {
        const char = alive[Math.floor(Math.random() * alive.length)];
        const pool = CAMPFIRE_DIALOGUES.find(d => d.role === char.role);
        if (pool) {
          activeBubble = { charId: char.id, text: pool.lines[Math.floor(Math.random() * pool.lines.length)], timer: 5.0, charIndex: 0 };
        }
      }
    }
  }

  // ── Party HUD (top-left) ──
  drawPartyHUD();

  // ── Zoom indicator (Phase 2) ──
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(`${Math.round(camera.zoom * 100)}%`, 8, canvas.height - 8);

  scheduleStatsRender();
}

// ═══════════════════════════════════════════════════════════
// DRAW FUNCTIONS
// ═══════════════════════════════════════════════════════════

function drawParallax(groundY) {
  const cw = canvas.width, ch = canvas.height;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, groundY);
  skyGrad.addColorStop(0, '#050510');
  skyGrad.addColorStop(0.5, '#0a0a20');
  skyGrad.addColorStop(1, '#151530');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, cw, groundY);

  // Stars (cached)
  if (!starsCanvas) {
    starsCanvas = document.createElement('canvas');
    starsCanvas.width = cw; starsCanvas.height = groundY;
    const sctx = starsCanvas.getContext('2d');
    for (let i = 0; i < 120; i++) {
      const x = Math.random() * cw, y = Math.random() * groundY * 0.8;
      const r = Math.random() * 1.5 + 0.3;
      const alpha = Math.random() * 0.6 + 0.2;
      sctx.fillStyle = `rgba(255,255,255,${alpha})`;
      sctx.beginPath(); sctx.arc(x, y, r, 0, Math.PI * 2); sctx.fill();
    }
  }
  ctx.drawImage(starsCanvas, 0, 0);

  // Mountains silhouette (parallax 0.15)
  const mtnOffset = camera.x * 0.15;
  ctx.fillStyle = '#121225';
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  for (let x = 0; x <= cw; x += 8) {
    const wx = x + mtnOffset;
    const h = Math.sin(wx * 0.003) * 60 + Math.sin(wx * 0.007) * 30 + Math.sin(wx * 0.015) * 15;
    ctx.lineTo(x, groundY * 0.45 - h);
  }
  ctx.lineTo(cw, groundY);
  ctx.closePath();
  ctx.fill();

  // Trees silhouette (parallax 0.3)
  const treeOffset = camera.x * 0.3;
  ctx.fillStyle = '#1a1a30';
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  for (let x = 0; x <= cw; x += 5) {
    const wx = x + treeOffset;
    const h = Math.sin(wx * 0.008) * 35 + Math.sin(wx * 0.02) * 18 + Math.abs(Math.sin(wx * 0.05)) * 12;
    ctx.lineTo(x, groundY * 0.65 - h);
  }
  ctx.lineTo(cw, groundY);
  ctx.closePath();
  ctx.fill();

  // Ground
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, ch);
  groundGrad.addColorStop(0, '#3d2818');
  groundGrad.addColorStop(0.3, '#2d1810');
  groundGrad.addColorStop(1, '#1a0c08');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, cw, ch - groundY);

  // Ground depth lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let y = groundY + 8; y < ch; y += 12) {
    const offset = (camera.x * (0.5 + (y - groundY) * 0.002)) % 30;
    ctx.beginPath(); ctx.moveTo(-offset, y); ctx.lineTo(cw, y); ctx.stroke();
  }

  // March wind particles
  if (state?.status === 'march') {
    const t = Date.now() / 1000;
    for (let i = 0; i < 15; i++) {
      const px = ((t * 80 + i * 120) % (cw + 100)) - 50;
      const py = groundY * 0.3 + Math.sin(t + i * 2) * groundY * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(px, py, 3, 1);
    }
  }
}

function drawCampfire(dt, groundY) {
  const cx = campfireLayout?.centerX || canvas.width / 2;
  const cy = campfireLayout?.centerY || groundY + (canvas.height - groundY) * 0.4;
  const t = Date.now() / 1000;

  // Warm ambient glow
  const glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 200);
  glowGrad.addColorStop(0, 'rgba(255, 150, 50, 0.3)');
  glowGrad.addColorStop(0.5, 'rgba(255, 100, 30, 0.08)');
  glowGrad.addColorStop(1, 'rgba(255, 50, 10, 0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(cx - 200, cy - 200, 400, 400);

  // Ember particles
  for (let i = 0; i < 10; i++) {
    const cycle = ((t + i * 0.4) % 2.5) / 2.5;
    const px = cx + Math.sin(t * 0.8 + i * 1.7) * (8 + cycle * 20);
    const py = cy - cycle * 70;
    const size = (1 - cycle) * 4;
    const alpha = (1 - cycle) * 0.7;
    ctx.fillStyle = `rgba(255, ${Math.floor(180 - cycle * 120)}, 50, ${alpha})`;
    ctx.beginPath(); ctx.arc(px, py, size, 0, Math.PI * 2); ctx.fill();
  }

  // Core fire
  ctx.fillStyle = '#f59e0b';
  ctx.beginPath(); ctx.arc(cx, cy, 12 + Math.sin(t * 3) * 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ef4444';
  ctx.beginPath(); ctx.arc(cx, cy - 8, 8 + Math.cos(t * 4) * 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fde047';
  ctx.beginPath(); ctx.arc(cx, cy - 4, 4 + Math.sin(t * 5) * 1.5, 0, Math.PI * 2); ctx.fill();

  // Logs
  ctx.fillStyle = '#3d2818';
  ctx.save(); ctx.translate(cx, cy + 6); ctx.rotate(0.3);
  ctx.fillRect(-16, -3, 32, 6); ctx.restore();
  ctx.save(); ctx.translate(cx, cy + 6); ctx.rotate(-0.3);
  ctx.fillRect(-14, -3, 28, 6); ctx.restore();

  // Stats recap at top
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`Boss ${state.bossesKilled}/3 elimines — ${state.aliveCount} survivants`, canvas.width / 2, 45);
}

function drawMob(mob, sx, sy) {
  const spriteSize = mob.elite ? 32 : 24;
  const anim = animStates[mob.id];
  // Mob idle sway
  const mHash = mob.id.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0);
  const mt = Date.now() / 1000;
  sx += Math.sin(mt * 1.5 + mHash) * 2;
  sy += Math.sin(mt * 2.2 + mHash * 0.8) * 1;
  ctx.save();
  if (anim?.type === 'hit') ctx.globalAlpha = 0.6;
  const mobSprite = mob.templateKey ? mobSpriteCache[mob.templateKey] : null;
  if (mobSprite?.complete) {
    ctx.drawImage(mobSprite, sx - spriteSize / 2, sy - spriteSize, spriteSize, spriteSize);
    if (mob.elite) { ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 2; ctx.strokeRect(sx - spriteSize / 2, sy - spriteSize, spriteSize, spriteSize); }
  } else {
    const size = mob.elite ? 22 : 14;
    ctx.fillStyle = mob.caster ? '#9333ea' : mob.elite ? '#991b1b' : '#dc2626';
    ctx.fillRect(sx - size / 2, sy - size, size, size);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx - size / 4 - 1, sy - size * 0.7, 2, 2);
    ctx.fillRect(sx + size / 4 - 1, sy - size * 0.7, 2, 2);
  }
  ctx.restore();
  drawHpBar(sx, sy - spriteSize - 4, spriteSize + 4, 3, mob.hp / mob.maxHp);
  ctx.fillStyle = '#aaa'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(mob.name, sx, sy - spriteSize - 8);
}

function drawBoss(b, sx, sy) {
  const anim = animStates[b.id];
  ctx.save();
  if (anim?.type === 'hit') ctx.globalAlpha = 0.7;
  const bossIdx = b.index ?? BOSS_ID_TO_INDEX[b.id];
  const bossSprite = bossIdx != null ? bossSpriteCache[bossIdx] : null;
  const bsz = BOSS_SIZE;

  if (bossSprite?.complete) {
    ctx.save();
    const rx = sx - bsz / 2, ry = sy - bsz;
    roundRect(ctx, rx, ry, bsz, bsz, 8); ctx.clip();
    ctx.drawImage(bossSprite, rx, ry, bsz, bsz);
    ctx.restore();
    ctx.strokeStyle = b.enraged ? '#ff0000' : '#eab308'; ctx.lineWidth = 3;
    roundRect(ctx, rx, ry, bsz, bsz, 8); ctx.stroke();
    if (b.enraged) {
      const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.2;
      const glow = ctx.createRadialGradient(sx, sy - bsz / 2, bsz / 3, sx, sy - bsz / 2, bsz);
      glow.addColorStop(0, `rgba(255, 0, 0, ${pulse})`); glow.addColorStop(1, 'rgba(255, 0, 0, 0)');
      ctx.fillStyle = glow; ctx.fillRect(sx - bsz, sy - bsz * 1.5, bsz * 2, bsz * 2);
    }
  } else {
    ctx.fillStyle = b.enraged ? '#ff0000' : '#7c2d12';
    ctx.fillRect(sx - bsz / 2, sy - bsz, bsz, bsz);
    ctx.fillStyle = '#eab308';
    ctx.beginPath();
    ctx.moveTo(sx - 16, sy - bsz); ctx.lineTo(sx - 10, sy - bsz - 14); ctx.lineTo(sx - 5, sy - bsz - 5);
    ctx.lineTo(sx, sy - bsz - 16); ctx.lineTo(sx + 5, sy - bsz - 5);
    ctx.lineTo(sx + 10, sy - bsz - 14); ctx.lineTo(sx + 16, sy - bsz);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = b.enraged ? '#fff' : '#ef4444';
    ctx.beginPath(); ctx.arc(sx - 12, sy - bsz * 0.6, 5, 0, Math.PI * 2); ctx.arc(sx + 12, sy - bsz * 0.6, 5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();

  drawHpBar(sx, sy - bsz - 20, 140, 8, b.hp / b.maxHp);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
  ctx.fillText(b.name, sx, sy - bsz - 28);
  ctx.font = '11px sans-serif'; ctx.fillStyle = '#ccc';
  ctx.fillText(`${Math.floor(b.hp / b.maxHp * 100)}%`, sx, sy - bsz - 10);
  ctx.shadowBlur = 0;

  if (b.patternPhase === 'telegraph' && b.currentPattern) {
    const pulse = Math.sin(Date.now() / 150) * 0.15 + 0.25;
    ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
    ctx.fillRect(sx - (bsz + 100) / 2, sy - bsz - 5, bsz + 100, bsz + 10);
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 12px sans-serif';
    ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
    ctx.fillText(`!! ${b.currentPattern} !!`, sx, sy - bsz + 30);
    ctx.shadowBlur = 0;
  }
}

function drawCharacterFull(char, sx, sy, dt) {
  const anim = animStates[char.id];

  if (!char.alive) {
    if (anim?.type === 'death') {
      ctx.save();
      ctx.globalAlpha = Math.max(0, anim.timer / 1.0) * 0.5;
      const deathOffset = (1.0 - anim.timer) * 15;
      drawCharacterSprite(char, sx, sy + deathOffset);
      ctx.restore();
      return;
    }
    // Campfire: ghostly floating spirit (waiting for rez)
    if (state?.status === 'campfire' && campfireLayout?.deadIds?.has(char.id)) {
      drawCampfireGhost(char, sx, sy);
      return;
    }
    // After death animation: show ghost marker
    drawDeadMarker(char, sx, sy);
    return;
  }

  // Idle wobble — each character has unique phase based on ID hash
  const idHash = char.id.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0);
  const t = Date.now() / 1000;
  const wobbleX = Math.sin(t * 1.2 + idHash * 0.7) * 3 + Math.sin(t * 0.5 + idHash) * 1.5;
  const wobbleY = Math.sin(t * 1.8 + idHash * 1.3) * 1.5 + Math.cos(t * 0.7 + idHash * 0.5) * 1;
  const breathScale = 1 + Math.sin(t * 2.5 + idHash * 0.9) * 0.012;  // subtle breathing

  sx += wobbleX;
  sy += wobbleY;

  ctx.save();
  // Breathing scale
  ctx.translate(sx, sy - CHAR_SIZE / 2);
  ctx.scale(breathScale, breathScale);
  ctx.translate(-sx, -(sy - CHAR_SIZE / 2));

  if (anim?.type === 'attack') {
    const scale = 1 + 0.15 * (anim.timer / 0.2);
    ctx.translate(sx, sy - CHAR_SIZE / 2); ctx.scale(scale, scale); ctx.translate(-sx, -(sy - CHAR_SIZE / 2));
  }
  if (anim?.type === 'hit') ctx.globalAlpha = 0.7;
  if (anim?.type === 'heal') {
    const glowAlpha = anim.timer / 0.3 * 0.4;
    const glow = ctx.createRadialGradient(sx, sy - CHAR_SIZE / 2, 5, sx, sy - CHAR_SIZE / 2, 30);
    glow.addColorStop(0, `rgba(34, 197, 94, ${glowAlpha})`); glow.addColorStop(1, 'rgba(34, 197, 94, 0)');
    ctx.fillStyle = glow; ctx.fillRect(sx - 30, sy - CHAR_SIZE - 10, 60, CHAR_SIZE + 20);
  }
  drawCharacterSprite(char, sx, sy);
  ctx.restore();

  // HP bar
  drawHpBar(sx, sy + 2, 36, 4, char.hp / char.maxHp);

  // Mana bar (now works with Phase 1 broadcast)
  if (char.maxMana) {
    const manaRatio = (char.mana || 0) / char.maxMana;
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(sx - 18, sy + 7, 36, 2);
    ctx.fillStyle = '#3b82f6'; ctx.fillRect(sx - 18, sy + 7, 36 * Math.max(0, manaRatio), 2);
  }

  // Name + role icon
  const elemColor = ELEMENT_COLORS[char.element] || '#888';
  ctx.fillStyle = elemColor; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 2;
  const roleIcon = ROLE_ICONS[char.role] || '';
  ctx.fillText(`${roleIcon} ${char.name}`, sx, sy - CHAR_SIZE - 4);
  ctx.shadowBlur = 0;
}

function drawCharacterSprite(char, sx, sy) {
  const sprite = char.hunterId ? spriteCache[char.hunterId] : null;
  // Depth scale
  const depthScale = 1 - (Math.abs(char.y || 0) / 150) * 0.12;
  const charSize = CHAR_SIZE * Math.max(0.85, depthScale);

  if (sprite?.complete) {
    ctx.save();
    ctx.beginPath(); ctx.arc(sx, sy - charSize / 2, charSize / 2, 0, Math.PI * 2); ctx.closePath(); ctx.clip();
    ctx.drawImage(sprite, sx - charSize / 2, sy - charSize, charSize, charSize);
    ctx.restore();
    const elemColor = ELEMENT_COLORS[char.element] || '#888';
    ctx.strokeStyle = elemColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx, sy - charSize / 2, charSize / 2, 0, Math.PI * 2); ctx.stroke();
  } else {
    const color = ELEMENT_COLORS[char.element] || '#888';
    const size = 14 * depthScale;
    ctx.fillStyle = color;
    switch (ROLE_SHAPES[char.role]) {
      case 'circle': ctx.beginPath(); ctx.arc(sx, sy - size / 2, size / 2, 0, Math.PI * 2); ctx.fill(); break;
      case 'triangle': ctx.beginPath(); ctx.moveTo(sx, sy - size); ctx.lineTo(sx - size / 2, sy); ctx.lineTo(sx + size / 2, sy); ctx.closePath(); ctx.fill(); break;
      case 'diamond': ctx.beginPath(); ctx.moveTo(sx, sy - size); ctx.lineTo(sx + size / 2, sy - size / 2); ctx.lineTo(sx, sy); ctx.lineTo(sx - size / 2, sy - size / 2); ctx.closePath(); ctx.fill(); break;
      default: ctx.fillRect(sx - size / 2, sy - size, size, size);
    }
  }
}

function drawBubble() {
  if (!activeBubble) return;
  const char = findEntity(activeBubble.charId);
  if (!char) { activeBubble = null; return; }
  const ip = interpPositions[activeBubble.charId];
  let sx, sy;
  if (state?.status === 'campfire' && campfireLayout?.positions[activeBubble.charId]) {
    const cp = campfireLayout.positions[activeBubble.charId];
    sx = cp.x; sy = cp.y - CHAR_SIZE - 20;
  } else {
    sx = (ip ? ip.x : char.x) * camera.zoom - camera.x;
    sy = canvas.height * GROUND_Y_RATIO + entityScreenY(ip?.y ?? char.y ?? 0) - CHAR_SIZE - 20;
  }

  const charsToShow = Math.min(activeBubble.text.length, Math.floor(activeBubble.charIndex));
  const visibleText = activeBubble.text.substring(0, charsToShow);
  ctx.font = '11px sans-serif';
  const textW = ctx.measureText(activeBubble.text).width;
  const bubbleW = Math.min(200, textW + 20);
  const bubbleH = 30;
  const alpha = activeBubble.timer < 0.5 ? activeBubble.timer / 0.5 : 1;

  ctx.save(); ctx.globalAlpha = alpha * 0.92;

  // Background
  ctx.fillStyle = 'rgba(15, 15, 35, 0.92)';
  roundRect(ctx, sx - bubbleW / 2, sy - bubbleH, bubbleW, bubbleH, 8); ctx.fill();

  // Border
  const elemColor = ELEMENT_COLORS[char.element] || '#888';
  ctx.strokeStyle = elemColor + '80'; ctx.lineWidth = 1;
  roundRect(ctx, sx - bubbleW / 2, sy - bubbleH, bubbleW, bubbleH, 8); ctx.stroke();

  // Triangle
  ctx.fillStyle = 'rgba(15, 15, 35, 0.92)';
  ctx.beginPath(); ctx.moveTo(sx - 5, sy); ctx.lineTo(sx + 5, sy); ctx.lineTo(sx, sy + 6); ctx.closePath(); ctx.fill();

  // Text
  ctx.fillStyle = '#e0e0e0'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(visibleText, sx, sy - bubbleH / 2 + 4);
  ctx.restore();
}

function drawLootRoll(dt) {
  if (!lootRollState) return;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  lootRollState.revealTimer -= dt;
  if (lootRollState.revealTimer <= 0 && lootRollState.phase !== 'done') {
    lootRollState.currentIndex++;
    if (lootRollState.currentIndex >= lootRollState.results.length) { lootRollState.phase = 'done'; return; }
    lootRollState.phase = 'revealing';
    lootRollState.revealTimer = 6;
  }

  if (lootRollState.phase === 'revealing' && lootRollState.currentIndex >= 0) {
    const item = lootRollState.results[lootRollState.currentIndex];
    const elapsed = 6 - lootRollState.revealTimer;
    drawLootCard(item, elapsed);
  }

  // Mini cards for already revealed items
  for (let i = 0; i < lootRollState.currentIndex; i++) {
    const item = lootRollState.results[i];
    const x = 20 + i * 45;
    const RARITY_COLORS = { common: '#9ca3af', uncommon: '#22c55e', rare: '#3b82f6', epic: '#a855f7', legendary: '#eab308', mythique: '#ff4500' };
    ctx.fillStyle = 'rgba(20, 15, 40, 0.9)';
    roundRect(ctx, x, canvas.height - 200, 40, 36, 4); ctx.fill();
    ctx.strokeStyle = RARITY_COLORS[item.rarity] || '#888'; ctx.lineWidth = item.stolen ? 1 : 1.5;
    roundRect(ctx, x, canvas.height - 200, 40, 36, 4); ctx.stroke();
    ctx.fillStyle = item.stolen ? '#666' : '#ccc'; ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(item.itemName?.substring(0, 6) || '?', x + 20, canvas.height - 185);
    // Winner name under mini card
    if (item.winnerUsername) {
      ctx.fillStyle = item.srWinner ? '#fbbf24' : '#9ca3af'; ctx.font = '6px sans-serif';
      ctx.fillText(item.winnerUsername.substring(0, 6), x + 20, canvas.height - 174);
    } else if (item.stolen) {
      ctx.fillStyle = '#dc2626'; ctx.font = '6px sans-serif';
      ctx.fillText('VOLE', x + 20, canvas.height - 174);
    }
  }

  // Title
  ctx.fillStyle = '#c084fc'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 6;
  ctx.fillText('Distribution du loot...', canvas.width / 2, 40);
  ctx.shadowBlur = 0;
}

function drawLootCard(item, elapsed) {
  const cx = canvas.width / 2, cy = canvas.height / 2 - 40;
  const isEpicMoment = item.narrative?.type === 'epic_moment';
  const cardW = isEpicMoment ? 280 : 220, cardH = isEpicMoment ? 170 : 140;
  const RARITY_COLORS = { common: '#9ca3af', uncommon: '#22c55e', rare: '#3b82f6', epic: '#a855f7', legendary: '#eab308', mythique: '#ff4500' };
  const rarityColor = RARITY_COLORS[item.rarity] || '#888';

  ctx.save();
  if (elapsed < 0.8) {
    const t = elapsed / 0.8;
    ctx.translate(cx, cy); ctx.scale(t * t, t * t); ctx.rotate((1 - t) * Math.PI); ctx.translate(-cx, -cy);
  }

  // Mythique/legendary shimmer background
  if (isEpicMoment && elapsed > 0.8) {
    const shimmer = Math.sin(elapsed * 3) * 0.15 + 0.85;
    ctx.fillStyle = `rgba(${item.rarity === 'mythique' ? '80, 20, 0' : '60, 40, 0'}, ${0.3 * shimmer})`;
    roundRect(ctx, cx - cardW / 2 - 6, cy - cardH / 2 - 6, cardW + 12, cardH + 12, 16); ctx.fill();
  }

  // Card bg
  ctx.fillStyle = 'rgba(20, 12, 40, 0.95)';
  roundRect(ctx, cx - cardW / 2, cy - cardH / 2, cardW, cardH, 12); ctx.fill();

  // Rarity border glow
  if (elapsed > 0.8) {
    ctx.shadowColor = rarityColor; ctx.shadowBlur = isEpicMoment ? 25 : 15;
  }
  ctx.strokeStyle = rarityColor; ctx.lineWidth = isEpicMoment ? 4 : 3;
  roundRect(ctx, cx - cardW / 2, cy - cardH / 2, cardW, cardH, 12); ctx.stroke();
  ctx.shadowBlur = 0;

  // Item name
  if (elapsed > 0.8) {
    ctx.fillStyle = rarityColor; ctx.font = `bold ${isEpicMoment ? 18 : 16}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText(item.itemName || '???', cx, cy - 30);
    ctx.fillStyle = '#888'; ctx.font = '11px sans-serif';
    const rarityLabel = (item.rarity || '').toUpperCase();
    const srTag = item.srWinner ? ' | SR' : '';
    ctx.fillText(rarityLabel + srTag, cx, cy - 13);
  }

  // Roll animation
  if (elapsed > 2.0 && !item.stolen) {
    const rollElapsed = elapsed - 2.0;
    const displayRoll = rollElapsed > 1.5 ? item.winnerRoll : Math.floor(Math.random() * 100);
    const rollSettled = rollElapsed > 1.5;
    // Color roll by value when settled
    if (rollSettled && item.winnerRoll >= 90) ctx.fillStyle = '#fbbf24';
    else if (rollSettled && item.winnerRoll <= 15) ctx.fillStyle = '#ef4444';
    else ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(displayRoll, cx, cy + 15);
  }

  // Winner
  if (elapsed > 4.0 && item.winnerUsername) {
    ctx.fillStyle = item.srWinner ? '#fbbf24' : '#22c55e'; ctx.font = 'bold 14px sans-serif';
    ctx.fillText(`${item.winnerUsername}${item.srWinner ? ' (SR!)' : ''}`, cx, cy + 40);
  }

  // Stolen
  if (item.stolen && elapsed > 2.0) {
    ctx.fillStyle = '#dc2626'; ctx.font = 'bold 16px sans-serif';
    ctx.fillText('VOLE PAR LES MONSTRES!', cx, cy + 15);
  }

  // Narrative reaction text (appears after winner reveal)
  if (elapsed > 4.8 && item.narrative?.reactions?.length > 0) {
    const reactions = item.narrative.reactions;
    let ny = cy + cardH / 2 + 20;
    for (let i = 0; i < Math.min(reactions.length, 2); i++) {
      const r = reactions[i];
      if (!r.text) continue;
      const fadeIn = Math.min(1, (elapsed - 4.8 - i * 0.8) * 2);
      if (fadeIn <= 0) continue;
      ctx.globalAlpha = fadeIn;
      const reactionColors = { ecstatic: '#fbbf24', lucky: '#22c55e', sr_win: '#fbbf24', win: '#a3e635', salty: '#f87171', sr_lost: '#fb923c', jealous: '#94a3b8', group: '#c084fc', stolen: '#dc2626' };
      ctx.fillStyle = reactionColors[r.type] || '#ccc';
      ctx.font = r.type === 'group' ? 'italic 11px sans-serif' : '11px sans-serif';
      ctx.textAlign = 'center';
      // Truncate long text
      const maxW = canvas.width - 40;
      let text = r.text;
      ctx.font = '11px sans-serif';
      while (ctx.measureText(text).width > maxW && text.length > 20) text = text.slice(0, -4) + '...';
      ctx.fillText(text, cx, ny);
      ny += 16;
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawNarrative(dt) {
  if (!narrativeOverlay) return;
  const no = narrativeOverlay;
  const line = no.lines[no.currentLine];
  if (!line) { narrativeOverlay = null; return; }

  // Dim background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Typewriter
  no.charIndex += dt * 25;
  const charsToShow = Math.min(line.length, Math.floor(no.charIndex));
  const visibleText = line.substring(0, charsToShow);
  const isLastLine = no.currentLine === no.lines.length - 1;

  ctx.fillStyle = isLastLine ? '#fbbf24' : '#e0e0e0';
  ctx.font = isLastLine ? 'bold 24px sans-serif' : '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 8;
  ctx.fillText(visibleText, canvas.width / 2, canvas.height / 2);
  ctx.shadowBlur = 0;

  // Subtitle
  if (no.subtitle) {
    ctx.fillStyle = '#888'; ctx.font = '12px sans-serif';
    ctx.fillText(no.subtitle, canvas.width / 2, canvas.height / 2 + 35);
  }

  // Auto-advance
  if (charsToShow >= line.length) {
    no.lineTimer += dt;
    if (no.lineTimer > 1.5) {
      no.currentLine++;
      no.charIndex = 0;
      no.lineTimer = 0;
      if (no.currentLine >= no.lines.length) {
        setTimeout(() => { if (narrativeOverlay === no) narrativeOverlay = null; }, 1500);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// PARTY HUD — compact HP/mana overview (top-left corner)
// ═══════════════════════════════════════════════════════════
function drawPartyHUD() {
  if (!state || !state.characters || state.characters.length === 0) return;

  const roleOrder = { frontline: 0, frontline_dps: 1, backline_dps: 2, backline_heal: 3 };

  // Group characters by username
  const playerGroups = new Map();
  for (const char of state.characters) {
    const user = char.username || 'Unknown';
    if (!playerGroups.has(user)) playerGroups.set(user, []);
    playerGroups.get(user).push(char);
  }
  // Sort each player's characters: alive first, then by role
  for (const [, chars] of playerGroups) {
    chars.sort((a, b) => {
      if (a.alive !== b.alive) return a.alive ? -1 : 1;
      return (roleOrder[a.role] ?? 9) - (roleOrder[b.role] ?? 9);
    });
  }
  // Sort players by alive count desc, then alphabetical
  const sortedPlayers = [...playerGroups.entries()].sort((a, b) => {
    const aliveA = a[1].filter(c => c.alive).length;
    const aliveB = b[1].filter(c => c.alive).length;
    if (aliveA !== aliveB) return aliveB - aliveA;
    return a[0].localeCompare(b[0]);
  });

  const startX = 8;
  const startY = 95;
  const rowH = 17;
  const headerH = 16;
  const barW = 52;
  const barH = 6;
  const manaH = 3;
  const panelW = 195;
  const pad = 4;

  // Calculate total content height
  let contentH = pad;
  for (const [, chars] of sortedPlayers) {
    contentH += headerH; // player header
    contentH += chars.length * rowH; // character rows
    contentH += 4; // gap between groups
  }
  contentH += pad;

  // Clamp scroll
  const maxVisibleH = canvas.height - startY - 160; // leave space for combat log
  const panelH = Math.min(contentH, maxVisibleH);
  const maxScroll = Math.max(0, contentH - panelH);
  hudScrollOffset = Math.min(hudScrollOffset, maxScroll);

  ctx.save();

  // Background panel
  ctx.fillStyle = 'rgba(8, 8, 20, 0.85)';
  roundRect(ctx, startX, startY, panelW, panelH, 5);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  roundRect(ctx, startX, startY, panelW, panelH, 5);
  ctx.stroke();

  // Clip to panel bounds for scrolling
  ctx.beginPath();
  ctx.rect(startX, startY, panelW, panelH);
  ctx.clip();

  hudEntryRects = [];
  let cy = startY + pad - hudScrollOffset;

  for (const [username, chars] of sortedPlayers) {
    const aliveCount = chars.filter(c => c.alive).length;

    // Player header
    if (cy + headerH > startY && cy < startY + panelH) {
      // Header background
      ctx.fillStyle = 'rgba(168, 85, 247, 0.08)';
      ctx.fillRect(startX + 2, cy, panelW - 4, headerH - 1);
      // Username
      ctx.fillStyle = '#c084fc';
      ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(username, startX + 6, cy + 11);
      // Alive count
      ctx.fillStyle = aliveCount === chars.length ? '#22c55e' : aliveCount > 0 ? '#f59e0b' : '#dc2626';
      ctx.font = '8px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(`${aliveCount}/${chars.length}`, startX + panelW - 6, cy + 11);
    }
    cy += headerH;

    // Character rows
    for (const char of chars) {
      if (cy + rowH > startY && cy < startY + panelH) {
        const elemColor = ELEMENT_COLORS[char.element] || '#888';
        const isFocused = focusTarget?.charId === char.id;

        // Focused highlight
        if (isFocused) {
          ctx.fillStyle = 'rgba(168, 85, 247, 0.15)';
          ctx.fillRect(startX + 2, cy, panelW - 4, rowH - 1);
          ctx.strokeStyle = '#a855f7';
          ctx.lineWidth = 1;
          ctx.strokeRect(startX + 2, cy, panelW - 4, rowH - 1);
        }

        // Element dot
        ctx.fillStyle = char.alive ? elemColor : '#555';
        ctx.beginPath();
        ctx.arc(startX + 10, cy + 6, 3, 0, Math.PI * 2);
        ctx.fill();

        // Dead skull overlay
        if (!char.alive) {
          ctx.fillStyle = '#dc2626';
          ctx.font = '6px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText('\u2620', startX + 10, cy + 8);
        }

        // Name (truncated)
        ctx.fillStyle = char.alive ? '#ccc' : '#666';
        ctx.font = '8px sans-serif'; ctx.textAlign = 'left';
        const displayName = char.name.length > 11 ? char.name.slice(0, 10) + '..' : char.name;
        ctx.fillText(displayName, startX + 17, cy + 9);

        // HP bar
        const hpX = startX + panelW - barW - 26;
        const hpRatio = Math.max(0, char.hp / char.maxHp);
        // Bar background with border
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(hpX, cy + 2, barW, barH);
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(hpX, cy + 2, barW, barH);
        // HP fill
        const hpColor = hpRatio > 0.6 ? '#22c55e' : hpRatio > 0.3 ? '#f59e0b' : '#ef4444';
        ctx.fillStyle = char.alive ? hpColor : '#2a1515';
        ctx.fillRect(hpX, cy + 2, barW * hpRatio, barH);

        // Mana bar
        if (char.maxMana) {
          const manaRatio = Math.max(0, (char.mana || 0) / char.maxMana);
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.fillRect(hpX, cy + barH + 3, barW, manaH);
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.strokeRect(hpX, cy + barH + 3, barW, manaH);
          ctx.fillStyle = char.alive ? '#3b82f6' : '#1a1a2e';
          ctx.fillRect(hpX, cy + barH + 3, barW * manaRatio, manaH);
        }

        // HP percentage
        ctx.fillStyle = char.alive ? '#888' : '#444';
        ctx.font = '7px sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(`${Math.floor(hpRatio * 100)}%`, startX + panelW - 5, cy + 9);

        // Store hit rect for click detection
        hudEntryRects.push({ charId: char.id, x: startX, y: cy, w: panelW, h: rowH });
      }
      cy += rowH;
    }
    cy += 4; // gap between player groups
  }

  // Scroll indicator if content overflows
  if (maxScroll > 0) {
    const scrollRatio = hudScrollOffset / maxScroll;
    const thumbH = Math.max(20, panelH * (panelH / contentH));
    const thumbY = startY + scrollRatio * (panelH - thumbH);
    ctx.fillStyle = 'rgba(168, 85, 247, 0.3)';
    roundRect(ctx, startX + panelW - 4, thumbY, 3, thumbH, 1.5);
    ctx.fill();
  }

  ctx.restore();
}

function drawHpBar(x, y, width, height, ratio) {
  const barX = x - width / 2;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(barX - 1, y - 1, width + 2, height + 2);
  const color = ratio > 0.6 ? '#22c55e' : ratio > 0.3 ? '#f59e0b' : '#ef4444';
  ctx.fillStyle = color;
  ctx.fillRect(barX, y, width * Math.max(0, ratio), height);
}

// ═══════════════════════════════════════════════════════════
// LOOT INDEX OVERLAY
// ═══════════════════════════════════════════════════════════

function toggleLootIndex() {
  const overlay = document.getElementById('loot-index-overlay');
  if (overlay.classList.contains('visible')) {
    overlay.classList.remove('visible');
    overlay.innerHTML = '';
    return;
  }
  renderLootIndex();
  overlay.classList.add('visible');
}

function renderLootIndex() {
  const overlay = document.getElementById('loot-index-overlay');

  function renderLootTable(items) {
    return items.map(item => {
      const rc = `rarity-${item.rarity}`;
      let tagHtml = '';
      if (item.tag === 'SET') tagHtml = '<span class="set-tag">SET</span>';
      else if (item.tag === 'ARME') tagHtml = '<span class="weapon-tag">ARME</span>';
      else if (item.tag === 'CURR') tagHtml = '<span class="currency-tag">CURR</span>';
      const chanceColor = item.dropChance < 1 ? 'rarity-legendary' : item.dropChance <= 5 ? 'rarity-epic' : '';
      return `<div class="loot-row">
        <div class="loot-name ${rc}">${tagHtml}${item.name}</div>
        <div class="loot-chance ${chanceColor || rc}">${item.dropChance}%</div>
      </div>`;
    }).join('');
  }

  function renderBossSection(idx) {
    const info = BOSS_INFO[idx];
    const loot = BOSS_LOOT_TABLES[idx] || [];
    return `<div class="loot-source">
      <div class="loot-source-header">
        <span class="zone-badge zone-${info.zone}">${info.zone.toUpperCase()}</span>
        <span class="boss-name">Boss ${idx + 1}: ${info.name}</span>
        <span class="boss-hp">${info.hp} HP</span>
      </div>
      <div class="loot-table-grid">${renderLootTable(loot)}</div>
    </div>`;
  }

  function renderMobSection(tierName) {
    const loot = MOB_LOOT_TABLES[tierName] || [];
    return `<div class="loot-source">
      <div class="loot-source-header">
        <span class="zone-badge zone-trashmob">MOBS</span>
        <span class="boss-name">${tierName}</span>
      </div>
      <div class="loot-table-grid">${renderLootTable(loot)}</div>
    </div>`;
  }

  const tabs = [
    { id: 'foret', label: 'Foret (Boss 1-5)', indices: [0,1,2,3,4] },
    { id: 'abysses', label: 'Abysses (Boss 6-10)', indices: [5,6,7,8,9] },
    { id: 'neant', label: 'Neant (Boss 11-15)', indices: [10,11,12,13,14] },
    { id: 'trashmob', label: 'Trashmobs' },
  ];

  overlay.innerHTML = `
    <div class="loot-idx-header">
      <h2>&#128176; Loot Index — Expedition I</h2>
      <button class="loot-idx-close" onclick="toggleLootIndex()">&#10005; Fermer</button>
    </div>
    <div class="loot-idx-tabs">
      ${tabs.map((t, i) => `<button class="loot-idx-tab ${i === 0 ? 'active' : ''}" data-loot-tab="${t.id}">${t.label}</button>`).join('')}
    </div>
    <div class="loot-idx-content" id="loot-idx-content"></div>
  `;

  function showTab(tabId) {
    const content = document.getElementById('loot-idx-content');
    const tab = tabs.find(t => t.id === tabId);
    if (!tab) return;

    overlay.querySelectorAll('.loot-idx-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lootTab === tabId);
    });

    if (tabId === 'trashmob') {
      content.innerHTML = Object.keys(MOB_LOOT_TABLES).map(k => renderMobSection(k)).join('');
    } else {
      content.innerHTML = tab.indices.map(idx => renderBossSection(idx)).join('');
    }
  }

  overlay.querySelectorAll('.loot-idx-tab').forEach(btn => {
    btn.addEventListener('click', () => showTab(btn.dataset.lootTab));
  });

  showTab('foret');
}

// ── Start ──
connect();
render();
</script>
