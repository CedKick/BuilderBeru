<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expedition I - Spectateur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a15;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px; background: rgba(15, 15, 30, 0.95);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid #333;
      z-index: 10;
    }
    #header h1 { font-size: 18px; color: #a855f7; }
    #header .stats { display: flex; gap: 20px; font-size: 14px; }
    #header .stat { display: flex; align-items: center; gap: 6px; }
    #header .stat .label { color: #888; }
    #header .stat .value { color: #fff; font-weight: bold; }
    .status-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 12px;
      font-weight: bold; text-transform: uppercase;
    }
    .status-combat { background: #dc2626; color: white; }
    .status-march { background: #2563eb; color: white; }
    .status-campfire { background: #f59e0b; color: #000; }
    .status-loot_roll { background: #a855f7; color: white; }
    .status-registration { background: #6b7280; color: white; }
    .status-finished { background: #22c55e; color: #000; }
    .status-wiped { background: #991b1b; color: white; }

    #canvas-container {
      position: fixed; top: 60px; left: 0; right: 280px; bottom: 150px;
      transition: right 0.3s ease;
    }
    #canvas-container.full-width { right: 0; }
    canvas { width: 100%; height: 100%; display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    /* ── Stats Panel ── */
    #stats-panel {
      position: fixed; top: 60px; right: 0; bottom: 150px;
      width: 280px; background: rgba(15, 15, 30, 0.98);
      border-left: 1px solid #333;
      display: flex; flex-direction: column;
      z-index: 10;
      transition: transform 0.3s ease;
    }
    #stats-panel.hidden { transform: translateX(100%); }

    #toggle-stats {
      position: fixed; top: 68px; z-index: 20;
      background: rgba(168, 85, 247, 0.3); border: 1px solid #a855f7;
      color: #e0e0e0; padding: 4px 10px; border-radius: 6px;
      cursor: pointer; font-size: 12px;
      transition: right 0.3s ease;
    }
    #toggle-stats.panel-open { right: 286px; transition: right 0.3s ease; }
    #toggle-stats.panel-closed { right: 8px; transition: right 0.3s ease; }

    .stats-tabs {
      display: flex; border-bottom: 1px solid #333;
    }
    .stats-tab {
      flex: 1; padding: 8px 2px; text-align: center;
      font-size: 10px; font-weight: bold; cursor: pointer;
      background: transparent; border: none; color: #888;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .stats-tab.active { color: #a855f7; border-bottom-color: #a855f7; }
    .stats-tab:hover { color: #c084fc; }

    .stats-list {
      flex: 1; overflow-y: auto; padding: 6px 8px;
    }
    .stats-list::-webkit-scrollbar { width: 4px; }
    .stats-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .stat-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0; font-size: 11px;
    }
    .stat-rank {
      width: 16px; text-align: right; color: #555; font-size: 10px;
    }
    .stat-sprite {
      width: 20px; height: 20px; border-radius: 3px;
      object-fit: cover; background: #1a1a2e;
    }
    .stat-name {
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      color: #ccc; font-size: 11px;
    }
    .stat-bar-container {
      width: 60px; height: 10px; background: #1a1a2e;
      border-radius: 3px; overflow: hidden;
    }
    .stat-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease;
    }
    .stat-value {
      width: 48px; text-align: right; font-weight: bold;
      font-size: 11px; color: #fff;
    }

    /* ── Graph Canvas ── */
    #graph-container {
      flex: 1; position: relative; padding: 4px;
      display: none;
    }
    #graph-container.active { display: flex; flex-direction: column; }
    #dps-graph { width: 100%; flex: 1; }

    /* ── Crit Stats ── */
    .crit-card {
      background: rgba(249, 115, 22, 0.08);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 6px; padding: 6px 8px; margin-bottom: 4px;
    }
    .crit-card-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .crit-card-header img { width: 18px; height: 18px; border-radius: 3px; }
    .crit-card-header .name { font-size: 11px; font-weight: bold; color: #f59e0b; }
    .crit-stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; font-size: 10px;
    }
    .crit-stat-label { color: #888; }
    .crit-stat-val { color: #f97316; font-weight: bold; text-align: right; }

    /* ── Combat Log (Warlogs-style) ── */
    #combat-log {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 150px; background: rgba(10, 10, 20, 0.97);
      border-top: 1px solid #333;
      display: flex; flex-direction: column;
      z-index: 10;
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px; border-bottom: 1px solid #222;
      background: rgba(20, 20, 35, 0.9);
    }
    .log-filters { display: flex; gap: 4px; }
    .log-filter {
      padding: 2px 8px; border-radius: 10px; font-size: 10px;
      border: 1px solid #333; background: transparent; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .log-filter.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #c084fc; }
    .log-filter:hover { color: #ccc; }
    .log-counter { font-size: 10px; color: #555; }
    #log-entries {
      flex: 1; overflow-y: auto; padding: 4px 12px;
      font-size: 12px; line-height: 1.5;
    }
    #log-entries::-webkit-scrollbar { width: 4px; }
    #log-entries::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .log-entry { display: flex; gap: 6px; align-items: baseline; opacity: 0.9; }
    .log-time { color: #555; font-size: 10px; min-width: 36px; font-family: monospace; }
    .log-icon { font-size: 12px; }
    .log-text { flex: 1; }
    .log-crit { background: #fbbf24; color: #000; font-size: 9px; padding: 0 4px; border-radius: 3px; font-weight: bold; }
    .log-damage .log-text { color: #ef4444; }
    .log-heal .log-text { color: #22c55e; }
    .log-kill .log-text { color: #f59e0b; }
    .log-death .log-text { color: #dc2626; font-weight: bold; }
    .log-boss .log-text { color: #a855f7; font-weight: bold; }
    .log-loot .log-text { color: #eab308; }
    .log-rez .log-text { color: #38bdf8; }
    .log-info .log-text { color: #888; }
    .log-buff .log-text { color: #60a5fa; }

    /* ── Panel Resize Handle ── */
    #panel-resize {
      position: absolute; left: -4px; top: 0; bottom: 0; width: 8px;
      cursor: col-resize; z-index: 15;
    }
    #panel-resize:hover, #panel-resize.active {
      background: rgba(168, 85, 247, 0.3);
    }

    #connection-status {
      position: fixed; top: 70px; left: 10px;
      font-size: 12px; padding: 4px 8px; border-radius: 8px;
      z-index: 20;
    }
    .connected { background: #16a34a33; color: #22c55e; }
    .disconnected { background: #dc262633; color: #ef4444; }
  </style>
</head>

const BOSS_ID_TO_INDEX = { forest_guardian: 0, stone_sentinel: 1, shadow_lord: 2 };

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const basePath = location.pathname.replace(/\/spectator\.?h?t?m?l?$/, '').replace(/\/$/, '');
const wsPath = basePath ? `${basePath}/ws` : '/ws';
const WS_URL = location.protocol === 'https:'
  ? `wss://${location.host}${wsPath}`
  : `ws://${location.host}${wsPath}`;

let state = null;
const floatingNumbers = [];
const interpPositions = {};
const LERP_SPEED = 10;

// Camera (Phase 2)
const camera = { x: 0, y: 0, zoom: 0.5, targetZoom: 0.5, minZoom: 0.15, maxZoom: 2.5, autoFollow: true };
let isPanning = false, panStart = { x: 0, y: 0 };

// Speech bubbles (Phase 5)
let activeBubble = null;

// Loot roll animation (Phase 7)
let lootRollState = null;

// Campfire (Phase 8)
let campfireLayout = null;
let campfireDialogueTimer = 0;
let rezAnimations = [];

// Narrative overlays (Phase 9)
let narrativeOverlay = null;
let tvOverlay = null;
let marchNarrative = null;

// Combat log (Phase 6)
let logEntries = [];
let activeLogFilter = 'all';
let logEventCount = 0;

// VFX particles (spell effects, projectiles, impacts)
const vfxParticles = [];

// Character info popup (click to see stats)
let selectedCharInfo = null;

// Timeline events
const timelineEvents = [];

// Stats panel resize
let statsPanelWidth = 280;
let isResizingPanel = false;

// Dead character tracking
const deadCharTimers = {};  // id -> deathTime

// Stars canvas cache (Phase 3)
let starsCanvas = null;

// Sprite caches
const spriteCache = {};
const spriteLoading = new Set();
const bossSpriteCache = {};
const mobSpriteCache = {};

function preloadSprite(hunterId) {
  if (spriteCache[hunterId] || spriteLoading.has(hunterId)) return;
  const url = HUNTER_SPRITES[hunterId];
  if (!url) return;
  spriteLoading.add(hunterId);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { spriteCache[hunterId] = img; spriteLoading.delete(hunterId); };
  img.onerror = () => { spriteLoading.delete(hunterId); };
  img.src = url;
}
function preloadBossSprite(index) {
  if (bossSpriteCache[index] || spriteLoading.has(`boss_${index}`)) return;
  const url = BOSS_SPRITES[index];
  if (!url) return;
  spriteLoading.add(`boss_${index}`);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { bossSpriteCache[index] = img; spriteLoading.delete(`boss_${index}`); };
  img.onerror = () => { spriteLoading.delete(`boss_${index}`); };
  img.src = url;
}
function preloadMobSprite(key) {
  if (mobSpriteCache[key] || spriteLoading.has(`mob_${key}`)) return;
  const url = MOB_SPRITES[key];
  if (!url) return;
  spriteLoading.add(`mob_${key}`);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { mobSpriteCache[key] = img; spriteLoading.delete(`mob_${key}`); };
  img.onerror = () => { spriteLoading.delete(`mob_${key}`); };
  img.src = url;
}
for (const id of Object.keys(HUNTER_SPRITES)) preloadSprite(id);
for (let i = 0; i < BOSS_SPRITES.length; i++) preloadBossSprite(i);
for (const key of Object.keys(MOB_SPRITES)) preloadMobSprite(key);

// Animation states
const animStates = {};
function triggerAnim(entityId, type, duration) {
  animStates[entityId] = { type, timer: duration };
}

// Combat Stats Tracking
const combatStats = {};
let activeStatsTab = 'dps';
const dpsHistory = [];
let combatStartTime = 0;
let lastDpsSnapshot = 0;
const DPS_SNAPSHOT_INTERVAL = 2;

function ensureStats(id) {
  if (!combatStats[id]) {
    const char = state?.characters?.find(c => c.id === id);
    combatStats[id] = {
      name: char?.name || id.split('_').slice(1).join(' '),
      hunterId: char?.hunterId || null,
      element: char?.element || null,
      dmgDealt: 0, dmgReceived: 0,
      healsGiven: 0, healsReceived: 0,
      kills: 0, crits: 0, totalHits: 0,
      maxCrit: 0, totalCritDmg: 0,
    };
  }
  return combatStats[id];
}
function takeDpsSnapshot(elapsedTime) {
  if (elapsedTime - lastDpsSnapshot < DPS_SNAPSHOT_INTERVAL) return;
  lastDpsSnapshot = elapsedTime;
  const dmg = {};
  for (const [id, s] of Object.entries(combatStats)) {
    if (!id.startsWith('mob_') && !id.startsWith('boss_')) dmg[id] = s.dmgDealt;
  }
  dpsHistory.push({ time: elapsedTime, dmg });
  if (dpsHistory.length > 300) dpsHistory.shift();
}

// Click on character for speech bubble (Phase 5)
canvas.addEventListener('click', (e) => {
  if (!state || isPanning) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const groundY = canvas.height * GROUND_Y_RATIO;

  let closest = null, closestDist = Infinity;
  for (const char of (state.characters || [])) {
    if (!char.alive) continue;
    const ip = interpPositions[char.id];
    const sx = (ip ? ip.x : char.x) * camera.zoom - camera.x;
    const charY = (char.y || 0) * camera.zoom + CHAR_Y_OFFSET;
    const sy = groundY + charY;
    const dist = Math.sqrt((mx - sx) ** 2 + (my - (sy - 20)) ** 2);
    if (dist < 30 && dist < closestDist) {
      closestDist = dist;
      closest = char;
    }
  }

  if (closest) {
    // Toggle: if already selected, deselect. Otherwise show popup + bubble
    if (selectedCharInfo?.charId === closest.id) {
      selectedCharInfo = null;
    } else {
      selectedCharInfo = { charId: closest.id, timer: 15 };
      showBubble(closest);
    }
  } else {
    activeBubble = null;
    selectedCharInfo = null;
  }
});

function showBubble(char) {
  const pool = DIALOGUES[char.role];
  if (!pool) return;
  const hpRatio = char.hp / char.maxHp;
  let category = state?.status === 'campfire' ? 'idle' : 'combat';
  if (hpRatio < 0.3) category = 'low_hp';
  const lines = pool[category] || pool.idle;
  if (!lines || !lines.length) return;
  activeBubble = {
    charId: char.id,
    text: lines[Math.floor(Math.random() * lines.length)],
    timer: 4.0,
    charIndex: 0,
  };
}

function maybeAutoQuip(evType, charId) {
  if (Math.random() > 0.03) return;
  if (activeBubble && activeBubble.timer > 1) return;
  const char = findEntity(charId);
  if (!char || !char.role) return;
  showBubble(char);
}

let ws = null;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('connection-status').className = 'connected';
    document.getElementById('connection-status').textContent = 'Connecte';
    addLogEntry('info', 'Connecte au serveur');
  };
  ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch(err) {} };
  ws.onclose = () => {
    document.getElementById('connection-status').className = 'disconnected';
    document.getElementById('connection-status').textContent = 'Deconnecte';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'expedition_state':
      state = msg;
      updateHeader(msg);
      for (const c of msg.characters || []) {
        if (c.hunterId) preloadSprite(c.hunterId);
        if (!interpPositions[c.id]) interpPositions[c.id] = { x: c.x, y: c.y || 0 };
        if (combatStats[c.id]) {
          combatStats[c.id].name = c.name;
          combatStats[c.id].hunterId = c.hunterId;
          combatStats[c.id].element = c.element;
        }
      }
      for (const m of msg.mobs || []) {
        if (!interpPositions[m.id]) interpPositions[m.id] = { x: m.x, y: m.y || 0 };
      }
      if (msg.boss) {
        if (!interpPositions[msg.boss.id]) interpPositions[msg.boss.id] = { x: msg.boss.x, y: msg.boss.y || 0 };
        const bossIdx = msg.boss.index ?? BOSS_ID_TO_INDEX[msg.boss.id];
        if (bossIdx != null) preloadBossSprite(bossIdx);
      }
      if (msg.status === 'combat') {
        if (!combatStartTime) combatStartTime = msg.elapsedTime;
        takeDpsSnapshot(msg.elapsedTime);
      }
      if (msg.status === 'campfire' && !campfireLayout) setupCampfireLayout();
      if (msg.status !== 'campfire') campfireLayout = null;
      break;

    case 'events_batch':
      for (const ev of msg.events) handleEvent(ev);
      break;

    case 'combat_start':
      combatStartTime = 0;
      if (msg.encounterType === 'boss') {
        addLogEntry('boss', `BOSS: ${msg.bossName} apparait!`);
        startBossIntro(msg.bossName);
        showTvCommentary('boss_appear');
        addTimelineEvent('boss', null, { text: `Boss: ${msg.bossName}` });
      } else {
        addLogEntry('info', `Vague de mobs! (${msg.mobCount} ennemis)`);
        showTvCommentary('combat_start');
        addTimelineEvent('phase', null, { text: `Combat — ${msg.mobCount} mobs` });
      }
      break;

    case 'boss_killed':
      addLogEntry('boss', `BOSS VAINCU: ${msg.bossName}!`);
      showTvCommentary('victory');
      addTimelineEvent('kill', null, { killer: 'Equipe', target: msg.bossName });
      break;

    case 'march_start':
      addLogEntry('info', `En marche... prochain: ${msg.nextEncounter}`);
      marchNarrative = { text: MARCH_NARRATIVES[Math.floor(Math.random() * MARCH_NARRATIVES.length)], timer: 8 };
      break;

    case 'campfire_start':
      addLogEntry('info', `Campfire! Repos ${msg.duration}s...`);
      campfireDialogueTimer = 3;
      break;

    case 'loot_roll_start':
      lootRollState = { results: msg.results || [], currentIndex: -1, revealTimer: 2.5, phase: 'waiting' };
      for (const r of msg.results || []) {
        const RARITY_COLORS = { common: '#9ca3af', uncommon: '#22c55e', rare: '#3b82f6', epic: '#a855f7', legendary: '#eab308' };
        if (r.stolen) {
          addLogEntry('death', `Les monstres ont vole [${r.itemName}]!`);
          addTimelineEvent('loot', null, { itemName: r.itemName, winner: 'Monstres', stolen: true, rarityColor: RARITY_COLORS[r.rarity] });
        } else if (r.winnerUsername) {
          const srTag = r.srWinner ? ' (SR)' : '';
          addLogEntry('loot', `[${r.itemName}] (${r.rarity}) -> ${r.winnerUsername} (${r.winnerRoll})${srTag}`);
          addTimelineEvent('loot', null, { itemName: r.itemName, winner: r.winnerUsername, stolen: false, rarityColor: RARITY_COLORS[r.rarity] });
        }
      }
      break;

    case 'rez':
      addLogEntry('rez', `${msg.healerName} ressuscite ${msg.targetName}!`);
      rezAnimations.push({ targetId: msg.target, timer: 2.0 });
      break;

    case 'expedition_finished':
      addLogEntry('boss', `EXPEDITION TERMINEE: ${msg.reason} | Boss: ${msg.bossesKilled} | Temps: ${formatTime(msg.elapsedTime)}`);
      break;
  }
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'damage':
    case 'skill_damage': {
      const size = ev.crit ? 22 : 16;
      const color = ev.crit ? '#fbbf24' : '#ef4444';
      const text = ev.crit ? `CRIT ${ev.amount}` : `-${ev.amount}`;
      addFloating(ev.target, text, color, size);
      triggerAnim(ev.target, 'hit', 0.15);
      triggerAnim(ev.source, 'attack', 0.2);
      // VFX
      if (ev.type === 'skill_damage') {
        spawnVFX('magic', ev.source, ev.target, { color: ELEMENT_COLORS[findEntity(ev.source)?.element] || '#a855f7' });
      } else {
        spawnVFX('projectile', ev.source, ev.target);
      }
      if (ev.crit) spawnVFX('crit_burst', ev.source, ev.target);
      const src = ensureStats(ev.source);
      src.dmgDealt += ev.amount;
      src.totalHits++;
      if (ev.crit) {
        src.crits++;
        src.totalCritDmg += ev.amount;
        if (ev.amount > src.maxCrit) src.maxCrit = ev.amount;
        if (ev.amount > 50000) showTvCommentary('crit_big');
      }
      ensureStats(ev.target).dmgReceived += ev.amount;
      maybeAutoQuip('damage', ev.source);
      break;
    }
    case 'mob_attack':
    case 'boss_attack':
    case 'pattern_damage': {
      addFloating(ev.target, `-${ev.amount}`, '#ff6b6b', 16);
      triggerAnim(ev.target, 'hit', 0.15);
      if (ev.type === 'pattern_damage') spawnVFX('boss_aoe', ev.source || '', ev.target);
      else spawnVFX('impact', ev.source || '', ev.target, { color: '#ff4444' });
      ensureStats(ev.target).dmgReceived += ev.amount;
      maybeAutoQuip('hit', ev.target);
      // Wipe check
      if (state) {
        const alive = state.characters.filter(c => c.alive).length;
        if (alive <= 3 && alive > 0) showTvCommentary('wipe_near');
      }
      break;
    }
    case 'heal': {
      addFloating(ev.target, `+${ev.amount}`, '#22c55e', 16);
      triggerAnim(ev.target, 'heal', 0.3);
      spawnVFX('heal', ev.source, ev.target);
      addLogEntry('heal', `${getName(ev.source)} soigne ${getName(ev.target)} (+${formatNumber(ev.amount)})`);
      ensureStats(ev.source).healsGiven += ev.amount;
      ensureStats(ev.target).healsReceived += ev.amount;
      break;
    }
    case 'death':
      addLogEntry('death', `${getName(ev.characterId)} est mort!`);
      triggerAnim(ev.characterId, 'death', 1.0);
      addTimelineEvent('death', null, { name: getName(ev.characterId), charId: ev.characterId });
      break;
    case 'kill':
      addLogEntry('kill', `${getName(ev.killer)} tue ${ev.targetName}!`);
      ensureStats(ev.killer).kills++;
      addTimelineEvent('kill', null, { killer: getName(ev.killer), target: ev.targetName });
      break;
    case 'boss_pattern':
      addLogEntry('boss', `[${ev.name}] telegraph ${ev.telegraphTime}s!`);
      break;
    case 'buff':
      addLogEntry('buff', `${getName(ev.source)} buff ${ev.buffType} +${ev.value}% sur ${getName(ev.target)}`);
      break;
    case 'boss_heal':
      addLogEntry('info', `Boss soigne +${formatNumber(ev.amount)} HP`);
      break;
    case 'summon':
      addLogEntry('boss', `Boss invoque ${ev.count}x ${ev.mobType}!`);
      break;
  }
}

// ═══════════════════════════════════════════════════════════

function addFloating(targetId, text, color, size) {
  if (!state) return;
  const entity = findEntity(targetId);
  if (!entity) return;
  const ip = interpPositions[targetId];
  floatingNumbers.push({
    x: ip?.x ?? entity.x, y: -30 - Math.random() * 20,
    entityY: ip?.y ?? entity.y ?? 0,
    text, color, size: size || 16,
    life: 2.0, vy: -50,
  });
}

function findEntity(id) {
  if (!state) return null;
  const c = (state.characters || []).find(c => c.id === id);
  if (c) return c;
  const m = (state.mobs || []).find(m => m.id === id);
  if (m) return m;
  if (state.boss?.id === id) return state.boss;
  return null;
}

function getName(id) {
  if (!id) return '???';
  return id.split('_').slice(1).join(' ');
}

function updateHeader(s) {
  const badge = document.getElementById('status-badge');
  badge.textContent = s.status;
  badge.className = `status-badge status-${s.status}`;
  document.getElementById('alive-count').textContent = `${s.aliveCount}/${s.totalCount}`;
  document.getElementById('boss-count').textContent = s.bossesKilled;
  document.getElementById('encounter-count').textContent = `${s.encounterIndex + 1}/${s.totalEncounters}`;
  document.getElementById('elapsed-time').textContent = formatTime(s.elapsedTime);
}

const LOG_ICONS = { damage: '\u2694', heal: '\u2764', kill: '\u{1F480}', death: '\u{1F480}', boss: '\u{1F451}', loot: '\u{1F381}', rez: '\u2728', info: '\u2139', buff: '\u2B06' };

function createLogElement(entry) {
  const el = document.createElement('div');
  el.className = `log-entry log-${entry.type}`;
  el.innerHTML = `<span class="log-time">${formatTime(entry.time)}</span><span class="log-icon">${LOG_ICONS[entry.type] || ''}</span><span class="log-text">${entry.text}</span>${entry.crit ? '<span class="log-crit">CRIT</span>' : ''}`;
  return el;
}

function addLogEntry(type, text, extra = {}) {
  const entry = { type, text, time: state?.elapsedTime || 0, crit: extra.crit || false };
  logEntries.push(entry);
  if (logEntries.length > 200) logEntries.shift();
  logEventCount++;
  document.getElementById('log-counter').textContent = `${logEventCount} events`;

  if (activeLogFilter !== 'all' && activeLogFilter !== type) return;
  const container = document.getElementById('log-entries');
  container.appendChild(createLogElement(entry));
  container.scrollTop = container.scrollHeight;
  while (container.children.length > 80) container.removeChild(container.firstChild);
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}h${String(m).padStart(2, '0')}m`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function formatNumber(n) {
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1) + 'B';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return String(Math.floor(n));
}

// ═══════════════════════════════════════════════════════════
// VFX SYSTEM — Projectiles, magic circles, impacts, heals
// ═══════════════════════════════════════════════════════════
function spawnVFX(type, sourceId, targetId, options = {}) {
  if (!state) return;
  const srcIp = interpPositions[sourceId];
  const tgtIp = interpPositions[targetId];
  const src = findEntity(sourceId);
  const tgt = findEntity(targetId);
  const sx = srcIp?.x ?? src?.x ?? 0;
  const sy = srcIp?.y ?? src?.y ?? 0;
  const tx = tgtIp?.x ?? tgt?.x ?? 0;
  const ty = tgtIp?.y ?? tgt?.y ?? 0;

  switch (type) {
    case 'projectile': {
      vfxParticles.push({ type: 'projectile', x: sx, y: sy, tx, ty, color: options.color || '#ef4444', size: options.size || 5, trail: [], life: 0.35, maxLife: 0.35 });
      break;
    }
    case 'magic': {
      vfxParticles.push({ type: 'magic_circle', x: tx, y: ty, color: options.color || '#a855f7', life: 0.5, maxLife: 0.5 });
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * (80 + Math.random() * 50), vy: Math.sin(a) * (50 + Math.random() * 30), color: options.color || '#a855f7', size: 2 + Math.random() * 2, life: 0.4 + Math.random() * 0.2, maxLife: 0.6 });
      }
      break;
    }
    case 'heal': {
      for (let i = 0; i < 6; i++) {
        vfxParticles.push({ type: 'rise', x: tx + (Math.random() - 0.5) * 25, y: ty, vy: -(25 + Math.random() * 35), color: '#22c55e', size: 2.5 + Math.random() * 2, life: 0.7 + Math.random() * 0.3, maxLife: 1.0 });
      }
      vfxParticles.push({ type: 'heal_ring', x: tx, y: ty, color: '#22c55e', life: 0.4, maxLife: 0.4 });
      break;
    }
    case 'impact': {
      for (let i = 0; i < 5; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 40 + Math.random() * 70;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd * 0.6, color: options.color || '#ef4444', size: 2 + Math.random() * 2, life: 0.25 + Math.random() * 0.2, maxLife: 0.45 });
      }
      break;
    }
    case 'crit_burst': {
      vfxParticles.push({ type: 'shockwave', x: tx, y: ty, color: '#fbbf24', life: 0.45, maxLife: 0.45 });
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 80 + Math.random() * 100;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd * 0.5 - 20, color: Math.random() > 0.5 ? '#fbbf24' : '#fff', size: 2.5 + Math.random() * 3, life: 0.4 + Math.random() * 0.3, maxLife: 0.7 });
      }
      break;
    }
    case 'boss_aoe': {
      vfxParticles.push({ type: 'shockwave', x: tx, y: ty, color: '#dc2626', life: 0.6, maxLife: 0.6 });
      for (let i = 0; i < 15; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 60 + Math.random() * 120;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd * 0.4 - 30, color: '#ff4444', size: 3 + Math.random() * 3, life: 0.4 + Math.random() * 0.3, maxLife: 0.7 });
      }
      break;
    }
  }
}

function drawVFX(dt, groundY) {
  for (let i = vfxParticles.length - 1; i >= 0; i--) {
    const p = vfxParticles[i];
    p.life -= dt;
    if (p.life <= 0) { vfxParticles.splice(i, 1); continue; }
    const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    const progress = 1 - p.life / p.maxLife;

    switch (p.type) {
      case 'projectile': {
        const t = progress / 1;
        const px = p.x + (p.tx - p.x) * t;
        const py = p.y + (p.ty - p.y) * t;
        const sx = px * camera.zoom - camera.x;
        const sy = groundY + py * camera.zoom + CHAR_Y_OFFSET;
        // Trail
        p.trail.push({ x: sx, y: sy, a: 1 });
        if (p.trail.length > 6) p.trail.shift();
        ctx.save();
        for (let j = 0; j < p.trail.length; j++) {
          const tp = p.trail[j];
          tp.a *= 0.7;
          ctx.globalAlpha = tp.a * 0.5;
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(tp.x, tp.y, p.size * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(sx, sy, p.size * 0.4, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
        break;
      }
      case 'magic_circle': {
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + p.y * camera.zoom + CHAR_Y_OFFSET;
        const r = 20 + progress * 25;
        ctx.save(); ctx.globalAlpha = alpha * 0.5;
        ctx.strokeStyle = p.color; ctx.lineWidth = 2;
        ctx.shadowColor = p.color; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(sx, sy - 15, r, 0, Math.PI * 2); ctx.stroke();
        // Inner rotating lines
        for (let j = 0; j < 4; j++) {
          const a = (j / 4) * Math.PI * 2 + progress * Math.PI * 3;
          ctx.beginPath();
          ctx.moveTo(sx + Math.cos(a) * r * 0.3, sy - 15 + Math.sin(a) * r * 0.3);
          ctx.lineTo(sx + Math.cos(a) * r * 0.9, sy - 15 + Math.sin(a) * r * 0.9);
          ctx.stroke();
        }
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'spark': {
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 80 * dt; // gravity
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + p.y * camera.zoom + CHAR_Y_OFFSET;
        ctx.save(); ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(sx, sy, p.size * (0.5 + alpha * 0.5), 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'rise': {
        p.y += p.vy * dt;
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + p.y * camera.zoom + CHAR_Y_OFFSET;
        ctx.save(); ctx.globalAlpha = alpha * 0.7;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'heal_ring': {
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + p.y * camera.zoom + CHAR_Y_OFFSET;
        const r = 10 + progress * 30;
        ctx.save(); ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = p.color; ctx.lineWidth = 2;
        ctx.shadowColor = p.color; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(sx, sy - 15, r, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'shockwave': {
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + p.y * camera.zoom + CHAR_Y_OFFSET;
        const r = progress * 60;
        ctx.save(); ctx.globalAlpha = alpha * 0.35;
        ctx.strokeStyle = p.color; ctx.lineWidth = 3;
        ctx.shadowColor = p.color; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.arc(sx, sy - 15, r, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
    }
  }
  // Cap VFX pool
  if (vfxParticles.length > 150) vfxParticles.splice(0, vfxParticles.length - 150);
}

// ═══════════════════════════════════════════════════════════
// DEAD CHARACTER MARKER
// ═══════════════════════════════════════════════════════════
function drawDeadMarker(char, sx, sy) {
  ctx.save();
  ctx.globalAlpha = 0.3;
  drawCharacterSprite(char, sx, sy);
  ctx.globalAlpha = 0.6;
  // Red X over character
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2.5;
  const s = CHAR_SIZE * 0.35;
  ctx.beginPath();
  ctx.moveTo(sx - s, sy - CHAR_SIZE * 0.7 - s); ctx.lineTo(sx + s, sy - CHAR_SIZE * 0.7 + s);
  ctx.moveTo(sx + s, sy - CHAR_SIZE * 0.7 - s); ctx.lineTo(sx - s, sy - CHAR_SIZE * 0.7 + s);
  ctx.stroke();
  // Skull emoji
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#dc2626';
  ctx.fillText('\u{1F480}', sx, sy - CHAR_SIZE - 6);
  ctx.restore();
  // Name
  ctx.fillStyle = '#555'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(char.name, sx, sy - CHAR_SIZE - 18);
}

// ═══════════════════════════════════════════════════════════
// CHARACTER INFO POPUP (click to see live stats)
// ═══════════════════════════════════════════════════════════
function drawCharacterPopup(dt) {
  if (!selectedCharInfo) return;
  const char = findEntity(selectedCharInfo.charId);
  if (!char) { selectedCharInfo = null; return; }

  selectedCharInfo.timer -= dt;
  if (selectedCharInfo.timer <= 0) { selectedCharInfo = null; return; }

  const ip = interpPositions[selectedCharInfo.charId];
  const groundY = canvas.height * GROUND_Y_RATIO;
  let sx, sy;
  if (state?.status === 'campfire' && campfireLayout?.positions[selectedCharInfo.charId]) {
    const cp = campfireLayout.positions[selectedCharInfo.charId];
    sx = cp.x; sy = cp.y;
  } else {
    sx = (ip ? ip.x : char.x) * camera.zoom - camera.x;
    sy = groundY + ((ip?.y ?? char.y ?? 0) * camera.zoom) + CHAR_Y_OFFSET;
  }

  const stats = charStats[selectedCharInfo.charId];
  const popW = 180, popH = 130;
  const px = Math.max(5, Math.min(canvas.width - popW - 5, sx - popW / 2));
  const py = sy - CHAR_SIZE - popH - 25;

  const alpha = selectedCharInfo.timer < 0.5 ? selectedCharInfo.timer / 0.5 : 1;
  ctx.save(); ctx.globalAlpha = alpha * 0.95;

  // Background
  ctx.fillStyle = 'rgba(10, 10, 25, 0.93)';
  roundRect(ctx, px, py, popW, popH, 10); ctx.fill();
  const elemColor = ELEMENT_COLORS[char.element] || '#888';
  ctx.strokeStyle = elemColor; ctx.lineWidth = 1.5;
  roundRect(ctx, px, py, popW, popH, 10); ctx.stroke();

  // Header
  ctx.fillStyle = elemColor; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
  const roleLabel = { frontline: 'Tank', frontline_dps: 'Fighter', backline_dps: 'Mage', backline_heal: 'Healer' };
  ctx.fillText(`${char.name} (${roleLabel[char.role] || char.role})`, px + 8, py + 16);
  ctx.fillStyle = '#888'; ctx.font = '9px sans-serif';
  ctx.fillText(`${char.username || ''}`, px + 8, py + 28);

  // HP/Mana bars
  const barY = py + 34;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(px + 8, barY, popW - 16, 6);
  const hpRatio = char.alive ? Math.max(0, char.hp / char.maxHp) : 0;
  ctx.fillStyle = hpRatio > 0.6 ? '#22c55e' : hpRatio > 0.3 ? '#f59e0b' : '#ef4444';
  ctx.fillRect(px + 8, barY, (popW - 16) * hpRatio, 6);
  ctx.fillStyle = '#aaa'; ctx.font = '8px sans-serif';
  ctx.fillText(`HP ${formatNumber(char.hp)}/${formatNumber(char.maxHp)}`, px + 8, barY + 14);

  if (char.maxMana) {
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(px + popW / 2, barY + 8, popW / 2 - 8, 4);
    ctx.fillStyle = '#3b82f6'; ctx.fillRect(px + popW / 2, barY + 8, (popW / 2 - 8) * Math.max(0, (char.mana || 0) / char.maxMana), 4);
    ctx.fillStyle = '#6b8fcc'; ctx.font = '8px sans-serif';
    ctx.fillText(`MP ${Math.floor(char.mana || 0)}`, px + popW / 2, barY + 22);
  }

  // Stats
  const lineY = barY + 30;
  ctx.font = '9px sans-serif';
  const dps = stats ? (stats.dmgDealt / Math.max(1, (state?.elapsedTime || 1))) : 0;
  const lines = [
    { l: 'DPS', v: formatNumber(dps) + '/s', c: '#ef4444' },
    { l: 'Degats', v: formatNumber(stats?.dmgDealt || 0), c: '#ff8888' },
    { l: 'Soins', v: formatNumber(stats?.healsGiven || 0), c: '#22c55e' },
    { l: 'Kills', v: String(stats?.kills || 0), c: '#f59e0b' },
    { l: 'Crits', v: `${stats?.crits || 0} (max: ${formatNumber(stats?.maxCrit || 0)})`, c: '#fbbf24' },
  ];
  for (let i = 0; i < lines.length; i++) {
    ctx.fillStyle = '#666'; ctx.textAlign = 'left';
    ctx.fillText(lines[i].l, px + 8, lineY + i * 13);
    ctx.fillStyle = lines[i].c; ctx.textAlign = 'right';
    ctx.fillText(lines[i].v, px + popW - 8, lineY + i * 13);
  }

  // Arrow pointing down
  ctx.fillStyle = 'rgba(10, 10, 25, 0.93)';
  ctx.beginPath();
  ctx.moveTo(sx - 6, py + popH); ctx.lineTo(sx + 6, py + popH); ctx.lineTo(sx, py + popH + 8);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

function addTimelineEvent(type, time, data) {

  if (timelineEvents.length > 500) timelineEvents.shift();
}

function showTvCommentary(category) {
  const pool = TV_COMMENTARY[category];
  if (!pool) return;
  if (tvOverlay && tvOverlay.timer > 1) return;
  tvOverlay = { text: pool[Math.floor(Math.random() * pool.length)], timer: 2.5 };

function startBossIntro(bossName) {
  const intro = BOSS_INTROS[bossName];
  if (!intro) return;
  narrativeOverlay = { lines: intro.lines, subtitle: intro.subtitle, currentLine: 0, charIndex: 0, lineTimer: 0 };
}

function setupCampfireLayout() {
  if (!state) return;
  const aliveChars = state.characters.filter(c => c.alive);
  const centerX = canvas.width / 2;
  const centerY = canvas.height * GROUND_Y_RATIO + 15;
  const radius = Math.min(180, 40 + aliveChars.length * 6);
  campfireLayout = { positions: {}, centerX, centerY };
  aliveChars.forEach((c, i) => {
    const angle = (i / aliveChars.length) * Math.PI * 2 - Math.PI / 2;
    campfireLayout.positions[c.id] = {
      x: centerX + Math.cos(angle) * radius,
      y: centerY + Math.sin(angle) * radius * 0.4,
    };
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// STATS PANEL (unchanged from original)
