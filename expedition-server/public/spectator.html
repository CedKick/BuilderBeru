<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expedition I - Spectateur</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a15;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      overflow: hidden;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 60px; background: rgba(15, 15, 30, 0.95);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid #333;
      z-index: 10;
    }
    #header h1 { font-size: 18px; color: #a855f7; }
    #header .stats { display: flex; gap: 20px; font-size: 14px; }
    #header .stat { display: flex; align-items: center; gap: 6px; }
    #header .stat .label { color: #888; }
    #header .stat .value { color: #fff; font-weight: bold; }
    .status-badge {
      padding: 3px 10px; border-radius: 12px; font-size: 12px;
      font-weight: bold; text-transform: uppercase;
    }
    .status-combat { background: #dc2626; color: white; }
    .status-march { background: #2563eb; color: white; }
    .status-campfire { background: #f59e0b; color: #000; }
    .status-loot_roll { background: #a855f7; color: white; }
    .status-registration { background: #6b7280; color: white; }
    .status-finished { background: #22c55e; color: #000; }
    .status-wiped { background: #991b1b; color: white; }

    #canvas-container {
      position: fixed; top: 60px; left: 0; right: 280px; bottom: 150px;
      transition: right 0.3s ease;
    }
    #canvas-container.full-width { right: 0; }
    canvas { width: 100%; height: 100%; display: block; cursor: grab; }
    canvas:active { cursor: grabbing; }

    /* ── Stats Panel ── */
    #stats-panel {
      position: fixed; top: 60px; right: 0; bottom: 150px;
      width: 280px; background: rgba(15, 15, 30, 0.98);
      border-left: 1px solid #333;
      display: flex; flex-direction: column;
      z-index: 10;
      transition: transform 0.3s ease;
    }
    #stats-panel.hidden { transform: translateX(100%); }

    #toggle-stats {
      position: fixed; top: 68px; z-index: 20;
      background: rgba(168, 85, 247, 0.3); border: 1px solid #a855f7;
      color: #e0e0e0; padding: 4px 10px; border-radius: 6px;
      cursor: pointer; font-size: 12px;
      transition: right 0.3s ease;
    }
    #toggle-stats.panel-open { right: 286px; transition: right 0.3s ease; }
    #toggle-stats.panel-closed { right: 8px; transition: right 0.3s ease; }

    .stats-tabs {
      display: flex; border-bottom: 1px solid #333;
    }
    .stats-tab {
      flex: 1; padding: 8px 2px; text-align: center;
      font-size: 10px; font-weight: bold; cursor: pointer;
      background: transparent; border: none; color: #888;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .stats-tab.active { color: #a855f7; border-bottom-color: #a855f7; }
    .stats-tab:hover { color: #c084fc; }

    .stats-list {
      flex: 1; overflow-y: auto; padding: 6px 8px;
    }
    .stats-list::-webkit-scrollbar { width: 4px; }
    .stats-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .stat-entry {
      display: flex; align-items: center; gap: 6px;
      padding: 3px 0; font-size: 11px;
    }
    .stat-rank {
      width: 16px; text-align: right; color: #555; font-size: 10px;
    }
    .stat-sprite {
      width: 20px; height: 20px; border-radius: 3px;
      object-fit: cover; background: #1a1a2e;
    }
    .stat-name {
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      color: #ccc; font-size: 11px;
    }
    .stat-bar-container {
      width: 60px; height: 10px; background: #1a1a2e;
      border-radius: 3px; overflow: hidden;
    }
    .stat-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.3s ease;
    }
    .stat-value {
      width: 48px; text-align: right; font-weight: bold;
      font-size: 11px; color: #fff;
    }

    /* ── Graph Canvas ── */
    #graph-container {
      flex: 1; position: relative; padding: 4px;
      display: none;
    }
    #graph-container.active { display: flex; flex-direction: column; }
    #dps-graph { width: 100%; flex: 1; }

    /* ── Crit Stats ── */
    .crit-card {
      background: rgba(249, 115, 22, 0.08);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 6px; padding: 6px 8px; margin-bottom: 4px;
    }
    .crit-card-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .crit-card-header img { width: 18px; height: 18px; border-radius: 3px; }
    .crit-card-header .name { font-size: 11px; font-weight: bold; color: #f59e0b; }
    .crit-stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px; font-size: 10px;
    }
    .crit-stat-label { color: #888; }
    .crit-stat-val { color: #f97316; font-weight: bold; text-align: right; }

    /* ── Combat Log (Warlogs-style) ── */
    #combat-log {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 150px; background: rgba(10, 10, 20, 0.97);
      border-top: 1px solid #333;
      display: flex; flex-direction: column;
      z-index: 10;
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 12px; border-bottom: 1px solid #222;
      background: rgba(20, 20, 35, 0.9);
    }
    .log-filters { display: flex; gap: 4px; }
    .log-filter {
      padding: 2px 8px; border-radius: 10px; font-size: 10px;
      border: 1px solid #333; background: transparent; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .log-filter.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #c084fc; }
    .log-filter:hover { color: #ccc; }
    .log-counter { font-size: 10px; color: #555; }
    #log-entries {
      flex: 1; overflow-y: auto; padding: 4px 12px;
      font-size: 12px; line-height: 1.5;
    }
    #log-entries::-webkit-scrollbar { width: 4px; }
    #log-entries::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .log-entry { display: flex; gap: 6px; align-items: baseline; opacity: 0.9; }
    .log-time { color: #555; font-size: 10px; min-width: 36px; font-family: monospace; }
    .log-icon { font-size: 12px; }
    .log-text { flex: 1; }
    .log-crit { background: #fbbf24; color: #000; font-size: 9px; padding: 0 4px; border-radius: 3px; font-weight: bold; }
    .log-damage .log-text { color: #ef4444; }
    .log-heal .log-text { color: #22c55e; }
    .log-kill .log-text { color: #f59e0b; }
    .log-death .log-text { color: #dc2626; font-weight: bold; }
    .log-boss .log-text { color: #a855f7; font-weight: bold; }
    .log-loot .log-text { color: #eab308; }
    .log-rez .log-text { color: #38bdf8; }
    .log-info .log-text { color: #888; }
    .log-buff .log-text { color: #60a5fa; }

    /* ── DPS Summary Bar ── */
    .dps-summary {
      display: flex; gap: 6px; padding: 4px 8px;
      background: rgba(20, 20, 35, 0.9);
      border-bottom: 1px solid #222; font-size: 9px; flex-wrap: wrap;
    }
    .dps-summary .dps-item { display: flex; align-items: center; gap: 3px; }
    .dps-summary .dps-label { color: #555; }
    .dps-summary .dps-val { font-weight: bold; font-family: monospace; }

    /* ── Boss Selector ── */
    .boss-selector {
      display: flex; gap: 2px; padding: 4px 6px;
      border-bottom: 1px solid #222;
      overflow-x: auto; flex-wrap: nowrap;
    }
    .boss-selector::-webkit-scrollbar { height: 3px; }
    .boss-selector::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .boss-sel-btn {
      padding: 2px 7px; border-radius: 5px; font-size: 8px; font-weight: bold;
      background: transparent; border: 1px solid #333; color: #666;
      cursor: pointer; white-space: nowrap; transition: all 0.2s; flex-shrink: 0;
    }
    .boss-sel-btn.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #c084fc; }
    .boss-sel-btn:hover { color: #aaa; }

    /* ── WoW-style Detail Stats ── */
    .wow-stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px 6px;
      padding: 6px 8px; font-size: 10px;
    }
    .wow-stat { display: flex; justify-content: space-between; padding: 2px 4px; border-radius: 3px; }
    .wow-stat:hover { background: rgba(255,255,255,0.03); }
    .wow-stat-label { color: #666; }
    .wow-stat-val { font-weight: bold; font-family: monospace; }
    .wow-section-title {
      font-size: 9px; font-weight: bold; color: #a855f7;
      padding: 6px 8px 2px; text-transform: uppercase; letter-spacing: 0.5px;
      border-top: 1px solid #222; margin-top: 4px;
    }
    .wow-section-title:first-child { border-top: none; margin-top: 0; }
    .wow-player-header {
      display: flex; align-items: center; gap: 6px; padding: 6px 8px;
      background: rgba(30, 30, 50, 0.6); border-bottom: 1px solid #222;
    }
    .wow-player-header img { width: 24px; height: 24px; border-radius: 4px; }

    /* ── Panel Resize Handle ── */
    #panel-resize {
      position: absolute; left: -4px; top: 0; bottom: 0; width: 8px;
      cursor: col-resize; z-index: 15;
    }
    #panel-resize:hover, #panel-resize.active {
      background: rgba(168, 85, 247, 0.3);
    }

    #connection-status {
      position: fixed; top: 70px; left: 10px;
      font-size: 12px; padding: 4px 8px; border-radius: 8px;
      z-index: 20;
    }
    .connected { background: #16a34a33; color: #22c55e; }
    .disconnected { background: #dc262633; color: #ef4444; }

    /* ── Loot Index Overlay ── */
    #loot-index-btn {
      padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: bold;
      background: rgba(234, 179, 8, 0.15); border: 1px solid #eab308;
      color: #eab308; cursor: pointer; transition: all 0.2s;
    }
    #loot-index-btn:hover { background: rgba(234, 179, 8, 0.3); }
    #loot-index-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(5, 5, 15, 0.97);
      overflow-y: auto;
    }
    #loot-index-overlay.visible { display: block; }
    .loot-idx-header {
      position: sticky; top: 0; z-index: 5;
      background: rgba(15, 15, 30, 0.98);
      border-bottom: 1px solid #333;
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .loot-idx-header h2 { color: #eab308; font-size: 20px; }
    .loot-idx-close {
      background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .loot-idx-close:hover { background: rgba(239, 68, 68, 0.4); }
    .loot-idx-tabs {
      position: sticky; top: 56px; z-index: 4;
      background: rgba(15, 15, 30, 0.98);
      display: flex; gap: 4px; padding: 8px 24px;
      border-bottom: 1px solid #222;
    }
    .loot-idx-tab {
      padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: bold;
      background: transparent; border: 1px solid #333; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .loot-idx-tab.active { background: rgba(168, 85, 247, 0.2); border-color: #a855f7; color: #c084fc; }
    .loot-idx-tab:hover { color: #ccc; }
    .loot-idx-content { padding: 16px 24px 40px; }
    .loot-source {
      margin-bottom: 20px; background: rgba(20, 20, 40, 0.6);
      border: 1px solid #2a2a4a; border-radius: 10px; overflow: hidden;
    }
    .loot-source-header {
      padding: 10px 16px; background: rgba(30, 30, 55, 0.8);
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    .loot-source-header .boss-name { font-size: 15px; font-weight: bold; color: #eab308; }
    .loot-source-header .boss-hp { font-size: 11px; color: #888; }
    .loot-source-header .zone-badge {
      font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold;
    }
    .zone-foret { background: rgba(34, 197, 94, 0.15); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.3); }
    .zone-abysses { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
    .zone-neant { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.3); }
    .zone-trashmob { background: rgba(107, 114, 128, 0.15); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.3); }
    .loot-table-grid {
      display: grid; grid-template-columns: 1fr auto; gap: 0;
      padding: 4px 0;
    }
    .loot-row {
      display: contents;
    }
    .loot-row:hover .loot-name, .loot-row:hover .loot-chance {
      background: rgba(255, 255, 255, 0.03);
    }
    .loot-name {
      padding: 4px 16px; font-size: 12px; display: flex; align-items: center; gap: 6px;
    }
    .loot-name .set-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      background: rgba(168, 85, 247, 0.15); color: #a855f7; font-weight: bold;
    }
    .loot-name .weapon-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      background: rgba(234, 179, 8, 0.15); color: #eab308; font-weight: bold;
    }
    .loot-name .currency-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      background: rgba(59, 130, 246, 0.15); color: #3b82f6; font-weight: bold;
    }
    .loot-chance {
      padding: 4px 16px; font-size: 12px; text-align: right; font-weight: bold; font-family: monospace;
    }
    .rarity-common { color: #9ca3af; }
    .rarity-uncommon { color: #22c55e; }
    .rarity-rare { color: #3b82f6; }
    .rarity-epic { color: #a855f7; }
    .rarity-legendary { color: #eab308; }
    .rarity-mythique { color: #ef4444; }
  </style>
</head>
<body>
  <div id="header">
    <h1>&#9876; Expedition I</h1>
    <div class="stats">
      <div class="stat"><span class="label">Status:</span><span id="status-badge" class="status-badge status-registration">--</span></div>
      <div class="stat"><span class="label">Vivants:</span><span id="alive-count" class="value">0/0</span></div>
      <div class="stat"><span class="label">Boss tues:</span><span id="boss-count" class="value">0</span></div>
      <div class="stat"><span class="label">Encounter:</span><span id="encounter-count" class="value">0/0</span></div>
      <div class="stat"><span class="label">Temps:</span><span id="elapsed-time" class="value">00:00</span></div>
      <div class="stat"><span class="label">Restant:</span><span id="remaining-time" class="value" style="color:#f59e0b">12:00:00</span></div>
      <button id="loot-index-btn" onclick="toggleLootIndex()">&#128176; Loot Index</button>
    </div>
  </div>

  <div id="loot-index-overlay"></div>

  <div id="connection-status" class="disconnected">Deconnecte</div>
  <button id="toggle-stats" class="panel-open">Stats &#9664;</button>

  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="stats-panel">
    <div id="panel-resize"></div>
    <div class="dps-summary" id="dps-summary">
      <div class="dps-item"><span class="dps-label">Boss:</span><span class="dps-val" id="boss-dps" style="color:#ef4444">--</span></div>
      <div class="dps-item"><span class="dps-label">Global:</span><span class="dps-val" id="global-dps" style="color:#f59e0b">--</span></div>
      <div class="dps-item"><span class="dps-label">Combat:</span><span class="dps-val" id="combat-time-display" style="color:#a855f7">0:00</span></div>
      <div class="dps-item"><span class="dps-label">Boss:</span><span class="dps-val" id="boss-combat-time" style="color:#c084fc">0:00</span></div>
    </div>
    <div class="boss-selector" id="boss-selector">
      <button class="boss-sel-btn active" data-view="global">Global</button>
      <button class="boss-sel-btn" data-view="current">Boss actuel</button>
    </div>
    <div class="stats-tabs">
      <button class="stats-tab active" data-tab="dps">DPS</button>
      <button class="stats-tab" data-tab="heals">Heals</button>
      <button class="stats-tab" data-tab="received">Recus</button>
      <button class="stats-tab" data-tab="crits">Crits</button>
      <button class="stats-tab" data-tab="details">Details</button>
      <button class="stats-tab" data-tab="graph">Graphe</button>
      <button class="stats-tab" data-tab="timeline">Timeline</button>
    </div>
    <div class="stats-list" id="stats-list"></div>
    <div id="graph-container">
      <canvas id="dps-graph"></canvas>
    </div>
  </div>

  <div id="combat-log">
    <div class="log-header">
      <div class="log-filters">
        <button class="log-filter active" data-filter="all">Tout</button>
        <button class="log-filter" data-filter="damage">Degats</button>
        <button class="log-filter" data-filter="heal">Soins</button>
        <button class="log-filter" data-filter="kill">Kills</button>
        <button class="log-filter" data-filter="boss">Boss</button>
        <button class="log-filter" data-filter="loot">Loot</button>
      </div>
      <span class="log-counter" id="log-counter">0 events</span>
    </div>
    <div id="log-entries"></div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// CLOUDINARY IMAGE TRANSFORMS (reduce bandwidth!)
// ═══════════════════════════════════════════════════════════
// Canvas sprites: 96px (2x for retina at CHAR_SIZE=48)
function spriteUrl(url) {
  return url.replace('/upload/', '/upload/c_fill,w_96,h_96,q_auto,f_webp/');
}
// Stats panel thumbnails: 40px
function thumbUrl(url) {
  return url.replace('/upload/', '/upload/c_fill,w_40,h_40,q_auto,f_webp/');
}
// Boss sprites: larger (160px for BOSS_SIZE=90)
function bossSpriteUrl(url) {
  return url.replace('/upload/', '/upload/c_fill,w_160,h_160,q_auto,f_webp/');
}

// Called when server sends new position data — compute velocity for prediction
function updateInterpPosition(id, serverX, serverY) {
  const ip = interpPositions[id];
  if (!ip) {
    interpPositions[id] = { x: serverX, y: serverY, vx: 0, vy: 0, targetX: serverX, targetY: serverY };
    return;
  }
  // Compute velocity from old target → new target (server tick interval ~500ms)
  const dx = serverX - ip.targetX;
  const dy = serverY - ip.targetY;
  // Only update velocity if entity actually moved (avoid jitter on stationary)
  if (Math.abs(dx) > 2) ip.vx = dx * 2;  // *2 because server sends at 2Hz
  else ip.vx *= 0.5;  // Decelerate if stopped
  if (Math.abs(dy) > 1) ip.vy = dy * 2;
  else ip.vy *= 0.5;
  ip.targetX = serverX;
  ip.targetY = serverY;
}

// Generate a tiny data URL from a loaded Image (for stats panel)
function generateThumbDataUrl(hunterId, img) {
  try {
    const s = 36;  // tiny thumbnail
    const oc = document.createElement('canvas');
    oc.width = s; oc.height = s;
    const octx = oc.getContext('2d');
    octx.beginPath(); octx.arc(s/2, s/2, s/2, 0, Math.PI * 2); octx.clip();
    octx.drawImage(img, 0, 0, s, s);
    thumbDataUrls[hunterId] = oc.toDataURL('image/webp', 0.7);
  } catch(e) { /* crossOrigin issue, ignore */ }
}

function preloadSprite(hunterId) {
  if (spriteCache[hunterId] || spriteLoading.has(hunterId)) return;
  const url = HUNTER_SPRITES[hunterId];
  if (!url) return;
  spriteLoading.add(hunterId);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    spriteCache[hunterId] = img;
    spriteLoading.delete(hunterId);
    generateThumbDataUrl(hunterId, img);
  };
  img.onerror = () => { spriteLoading.delete(hunterId); };
  img.src = spriteUrl(url);
}
function preloadBossSprite(index) {
  if (bossSpriteCache[index] || spriteLoading.has(`boss_${index}`)) return;
  const url = BOSS_SPRITES[index];
  if (!url) return;
  spriteLoading.add(`boss_${index}`);
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { bossSpriteCache[index] = img; spriteLoading.delete(`boss_${index}`); };
  img.onerror = () => { spriteLoading.delete(`boss_${index}`); };
  img.src = bossSpriteUrl(url);
}
function preloadMobSprite(key) {
  if (mobSpriteCache[key] || spriteLoading.has(`mob_${key}`)) return;
  const url = MOB_SPRITES[key];
  if (!url) return;

  img.src = spriteUrl(url);
}

function ensureStats(id) {
  if (!combatStats[id]) {
    const char = state?.characters?.find(c => c.id === id);
    combatStats[id] = {
      name: char?.name || id.split('_').slice(1).join(' '),
      hunterId: char?.hunterId || null,
      element: char?.element || null,
      username: char?.username || '',
      dmgDealt: 0, dmgReceived: 0,
      healsGiven: 0, healsReceived: 0,
      kills: 0, deaths: 0, crits: 0, totalHits: 0,
      maxCrit: 0, totalCritDmg: 0,
    };
  }
  return combatStats[id];
}
function takeDpsSnapshot(elapsedTime) {
  if (elapsedTime - lastDpsSnapshot < DPS_SNAPSHOT_INTERVAL) return;
  lastDpsSnapshot = elapsedTime;
  const dmg = {};
  for (const [id, s] of Object.entries(combatStats)) {
    if (!id.startsWith('mob_') && !id.startsWith('boss_')) dmg[id] = s.dmgDealt;
  }
  dpsHistory.push({ time: elapsedTime, combatTime: combatElapsedTime, dmg });
  if (dpsHistory.length > 300) dpsHistory.shift();
}

function updateDpsSummary() {
  // Global DPS
  let totalDmg = 0;
  for (const [id, s] of Object.entries(combatStats)) {
    if (!id.startsWith('mob_') && !id.startsWith('boss_')) totalDmg += s.dmgDealt;
  }
  const globalDps = combatElapsedTime > 0 ? totalDmg / combatElapsedTime : 0;
  document.getElementById('global-dps').textContent = formatNumber(globalDps) + '/s';
  // Current boss DPS
  if (currentEncounterType === 'boss' && currentEncounterCombatTime > 1) {
    let bossDmg = 0;
    for (const [id, s] of Object.entries(combatStats)) {
      if (id.startsWith('mob_') || id.startsWith('boss_')) continue;
      const bl = currentEncounterBaseline[id];
      bossDmg += bl ? s.dmgDealt - bl.dmgDealt : s.dmgDealt;
    }
    document.getElementById('boss-dps').textContent = formatNumber(bossDmg / currentEncounterCombatTime) + '/s';
  } else {
    document.getElementById('boss-dps').textContent = '--';
  }
  document.getElementById('combat-time-display').textContent = formatTime(combatElapsedTime);
  document.getElementById('boss-combat-time').textContent = currentEncounterCombatTime > 0 ? formatTime(currentEncounterCombatTime) : '--';
}

// Get stats filtered by the selected boss view
// Returns { stats: { [id]: {...} }, combatTime: number }
function getFilteredStats() {
  if (selectedStatsView === 'global') {
    return { stats: combatStats, combatTime: combatElapsedTime };
  }
  if (selectedStatsView === 'current') {
    // Delta between current combatStats and baseline
    const filtered = {};
    for (const [id, s] of Object.entries(combatStats)) {
      if (id.startsWith('mob_') || id.startsWith('boss_')) continue;
      const bl = currentEncounterBaseline[id] || {};
      const delta = {
        name: s.name, hunterId: s.hunterId, element: s.element, username: s.username,
        dmgDealt: s.dmgDealt - (bl.dmgDealt || 0),
        healsGiven: s.healsGiven - (bl.healsGiven || 0),
        dmgReceived: s.dmgReceived - (bl.dmgReceived || 0),
        kills: s.kills - (bl.kills || 0),
        deaths: s.deaths - (bl.deaths || 0),
        crits: s.crits - (bl.crits || 0),
        totalHits: s.totalHits - (bl.totalHits || 0),
        totalCritDmg: s.totalCritDmg - (bl.totalCritDmg || 0),
        maxCrit: s.maxCrit || 0,
        healsReceived: (s.healsReceived || 0) - (bl.healsReceived || 0),
      };
      if (delta.dmgDealt > 0 || delta.healsGiven > 0 || delta.deaths > 0 || delta.dmgReceived > 0) {
        filtered[id] = delta;
      }
    }
    return { stats: filtered, combatTime: currentEncounterCombatTime };
  }
  // Historical boss by index
  const bossData = bossEncounterHistory[selectedStatsView];
  if (!bossData) return { stats: {}, combatTime: 0 };
  // Convert server charStats format (dmg/heals) to client format (dmgDealt/healsGiven)
  const mapped = {};
  for (const [id, cs] of Object.entries(bossData.charStats)) {
    mapped[id] = {
      name: cs.name || id.split('_').slice(1).join(' '),
      hunterId: cs.hunterId || null, element: cs.element || null, username: cs.username || '',
      dmgDealt: cs.dmg || cs.dmgDealt || 0,
      healsGiven: cs.heals || cs.healsGiven || 0,
      dmgReceived: cs.dmgReceived || 0,
      kills: cs.kills || 0, deaths: cs.deaths || 0,
      crits: cs.crits || 0, totalHits: cs.totalHits || 0,
      totalCritDmg: cs.totalCritDmg || 0, maxCrit: cs.maxCrit || 0,
      healsReceived: cs.healsReceived || 0,
    };
  }
  return { stats: mapped, combatTime: bossData.combatTime };
}

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  // Check if mouse is over the Party HUD — scroll HUD instead of zoom
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (mx >= 8 && mx <= 8 + 195 && my >= 95 && hudEntryRects.length > 0) {
    const lastRect = hudEntryRects[hudEntryRects.length - 1];
    const hudBottom = lastRect.y + lastRect.h + 8;
    if (my <= hudBottom || hudScrollOffset > 0) {
      hudScrollOffset = Math.max(0, hudScrollOffset + (e.deltaY > 0 ? 30 : -30));
      return;
    }
  }
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  camera.targetZoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.targetZoom + delta));
}, { passive: false });

let dragStartPos = { x: 0, y: 0 };
let wasDragging = false;

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0 || e.button === 1) {
    e.preventDefault();
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    dragStartPos = { x: e.clientX, y: e.clientY };
    wasDragging = false;
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (isPanning) {
    camera.x += (panStart.x - e.clientX);
    camera.y += (panStart.y - e.clientY);
    panStart = { x: e.clientX, y: e.clientY };
    const totalDrag = Math.abs(e.clientX - dragStartPos.x) + Math.abs(e.clientY - dragStartPos.y);
    if (totalDrag > 5) {
      wasDragging = true;
      camera.autoFollow = false;
    }
  }
});
canvas.addEventListener('mouseup', () => { isPanning = false; });
canvas.addEventListener('dblclick', () => { camera.autoFollow = true; camera.targetZoom = 0.5; });

// Click on character for speech bubble (Phase 5)
canvas.addEventListener('click', (e) => {
  if (wasDragging) { wasDragging = false; return; }
  if (!state) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const groundY = canvas.height * GROUND_Y_RATIO;

  // 0. Check HUD click first (screen-space, not world-space)
  for (const hr of hudEntryRects) {
    if (mx >= hr.x && mx <= hr.x + hr.w && my >= hr.y && my <= hr.y + hr.h) {
      focusOnCharacter(hr.charId);
      return;
    }
  }

  // 1. Check boss click first
  if (state.boss) {
    const b = state.boss;
    const ip = interpPositions[b.id];
    const bsx = (ip ? ip.x : b.x) * camera.zoom - camera.x;
    const bsy = groundY + entityScreenY(ip?.y ?? b.y ?? 0);
    const bDist = Math.sqrt((mx - bsx) ** 2 + (my - (bsy - BOSS_SIZE / 2)) ** 2);
    if (bDist < BOSS_SIZE) {
      if (selectedBossInfo?.bossId === b.id) {
        selectedBossInfo = null;
      } else {
        selectedBossInfo = { bossId: b.id, timer: 20 };
        selectedCharInfo = null;
        activeBubble = null;
      }
      return;
    }
  }

  // 2. Check character click (alive AND dead)
  let closest = null, closestDist = Infinity;
  for (const char of (state.characters || [])) {
    const ip = interpPositions[char.id];
    const sx = (ip ? ip.x : char.x) * camera.zoom - camera.x;
    const charY = entityScreenY(char.y);
    const sy = groundY + charY;
    const dist = Math.sqrt((mx - sx) ** 2 + (my - (sy - 20)) ** 2);
    if (dist < 30 && dist < closestDist) {
      closestDist = dist;
      closest = char;
    }
  }

  if (closest) {
    if (selectedCharInfo?.charId === closest.id) {
      selectedCharInfo = null;
    } else {
      selectedCharInfo = { charId: closest.id, timer: 15 };
      selectedBossInfo = null;
      showBubble(closest);
    }
  } else {
    activeBubble = null;
    selectedCharInfo = null;
    selectedBossInfo = null;
  }
});

function showBubble(char) {
  const pool = DIALOGUES[char.role];
  if (!pool) return;
  const hpRatio = char.hp / char.maxHp;
  let category = state?.status === 'campfire' ? 'idle' : 'combat';
  if (hpRatio < 0.3) category = 'low_hp';
  const lines = pool[category] || pool.idle;
  if (!lines || !lines.length) return;
  activeBubble = {
    charId: char.id,
    text: lines[Math.floor(Math.random() * lines.length)],
    timer: 4.0,
    charIndex: 0,
  };
}

function maybeAutoQuip(evType, charId) {
  if (Math.random() > 0.03) return;
  if (activeBubble && activeBubble.timer > 1) return;
  const char = findEntity(charId);
  if (!char || !char.role) return;
  showBubble(char);
}

let ws = null;
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('connection-status').className = 'connected';
    document.getElementById('connection-status').textContent = 'Connecte';
    addLogEntry('info', 'Connecte au serveur');
  };
  ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch(err) {} };
  ws.onclose = () => {
    document.getElementById('connection-status').className = 'disconnected';
    document.getElementById('connection-status').textContent = 'Deconnecte';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'expedition_state':
      state = msg;
      updateHeader(msg);
      for (const c of msg.characters || []) {
        if (c.hunterId) preloadSprite(c.hunterId);
        updateInterpPosition(c.id, c.x, c.y || 0);
        if (combatStats[c.id]) {
          combatStats[c.id].name = c.name;
          combatStats[c.id].hunterId = c.hunterId;
          combatStats[c.id].element = c.element;
          combatStats[c.id].username = c.username || '';
        }
      }
      for (const m of msg.mobs || []) {
        updateInterpPosition(m.id, m.x, m.y || 0);
      }
      if (msg.boss) {
        updateInterpPosition(msg.boss.id, msg.boss.x, msg.boss.y || 0);
        const bossIdx = msg.boss.index ?? BOSS_ID_TO_INDEX[msg.boss.id];
        if (bossIdx != null) preloadBossSprite(bossIdx);
      }
      if (msg.status === 'combat') {
        if (!combatStartTime) combatStartTime = msg.elapsedTime;
        takeDpsSnapshot(msg.elapsedTime);
      }
      // Sync combat time from server (for late-joining spectators)
      if (msg.totalCombatTime && combatElapsedTime < 1) {
        combatElapsedTime = msg.totalCombatTime;
        serverTotalCombatTime = msg.totalCombatTime;
      }
      // Hydrate boss encounter history from server (for late joiners or reconnects)
      if (msg.encounterHistory && bossEncounterHistory.length < msg.encounterHistory.length) {
        bossEncounterHistory.length = 0; // Clear and resync
        for (const e of msg.encounterHistory) {
          bossEncounterHistory.push({
            bossName: e.bossName, bossIndex: e.bossIndex,
            combatTime: e.combatTime, totalDmg: e.totalDmg,
            totalHeals: e.totalHeals, totalDeaths: e.totalDeaths,
            charStats: e.charStats || {},
          });
        }
        updateBossSelector();
      }
      // Update DPS summary
      updateDpsSummary();
      if (msg.status === 'campfire' && !campfireLayout) setupCampfireLayout();
      if (msg.status !== 'campfire') campfireLayout = null;
      break;

    case 'events_batch':
      for (const ev of msg.events) handleEvent(ev);
      break;

    case 'combat_start':
      combatStartTime = 0;
      currentEncounterType = msg.encounterType;
      currentEncounterIndex = msg.encounterIndex;
      currentEncounterCombatTime = 0;
      // Snapshot current stats as baseline for per-encounter delta
      currentEncounterBaseline = {};
      for (const [id, s] of Object.entries(combatStats)) {
        currentEncounterBaseline[id] = { ...s };
      }
      if (msg.encounterType === 'boss') {
        currentEncounterBossName = msg.bossName;
        addLogEntry('boss', `BOSS: ${msg.bossName} apparait!`);
        startBossIntro(msg.bossName);
        showTvCommentary('boss_appear');
        addTimelineEvent('boss', null, { text: `Boss: ${msg.bossName}` });
      } else {
        currentEncounterBossName = null;
        addLogEntry('info', `Vague de mobs! (${msg.mobCount} ennemis)`);
        showTvCommentary('combat_start');
        addTimelineEvent('phase', null, { text: `Combat — ${msg.mobCount} mobs` });
      }
      break;

    case 'boss_killed': {
      addLogEntry('boss', `BOSS VAINCU: ${msg.bossName}!`);
      showTvCommentary('victory');
      addTimelineEvent('kill', null, { killer: 'Equipe', target: msg.bossName });
      // Save per-boss encounter stats
      const bossEntry = {
        bossName: msg.bossName,
        bossIndex: msg.bossIndex,
        combatTime: msg.combatTime || Math.floor(currentEncounterCombatTime),
        charStats: {},
        totalDmg: 0, totalHeals: 0, totalDeaths: 0,
      };
      // Use server charStats if available, otherwise compute from client events
      if (msg.charStats && Object.keys(msg.charStats).length > 0) {
        bossEntry.charStats = msg.charStats;
        bossEntry.totalDmg = msg.totalDmg || 0;
        bossEntry.totalHeals = msg.totalHeals || 0;
        bossEntry.totalDeaths = msg.totalDeaths || 0;
      } else {
        for (const [id, s] of Object.entries(combatStats)) {
          if (id.startsWith('mob_') || id.startsWith('boss_')) continue;
          const bl = currentEncounterBaseline[id] || { dmgDealt: 0, healsGiven: 0, dmgReceived: 0, kills: 0, deaths: 0, crits: 0, totalHits: 0, totalCritDmg: 0 };
          const delta = {
            name: s.name, hunterId: s.hunterId, element: s.element, username: s.username,
            dmg: s.dmgDealt - (bl.dmgDealt || 0),
            heals: s.healsGiven - (bl.healsGiven || 0),
            dmgReceived: s.dmgReceived - (bl.dmgReceived || 0),
            kills: s.kills - (bl.kills || 0),
            deaths: s.deaths - (bl.deaths || 0),
            crits: s.crits - (bl.crits || 0),
            totalHits: s.totalHits - (bl.totalHits || 0),
            totalCritDmg: s.totalCritDmg - (bl.totalCritDmg || 0),
            maxCrit: s.maxCrit,
          };
          if (delta.dmg > 0 || delta.heals > 0 || delta.deaths > 0) {
            bossEntry.charStats[id] = delta;
            bossEntry.totalDmg += delta.dmg;
            bossEntry.totalHeals += delta.heals;
            bossEntry.totalDeaths += delta.deaths;
          }
        }
      }
      bossEncounterHistory.push(bossEntry);
      updateBossSelector();
      break;
    }

    case 'march_start':
      addLogEntry('info', `En marche... prochain: ${msg.nextEncounter}`);
      marchNarrative = { text: MARCH_NARRATIVES[Math.floor(Math.random() * MARCH_NARRATIVES.length)], timer: 8 };
      break;

    case 'campfire_start':
      addLogEntry('info', `Campfire! Repos ${msg.duration}s...`);
      campfireDialogueTimer = 3;
      break;

    case 'rest_decision': {
      addLogEntry('info', `${msg.charName} decide de se reposer au camp.`);
      const restPool = REST_DIALOGUES[msg.reason] || REST_DIALOGUES.cautious;
      const restLine = restPool[Math.floor(Math.random() * restPool.length)];
      // Show bubble from the resting character
      setTimeout(() => {
        activeBubble = { charId: msg.charId, text: restLine, timer: 6.0, charIndex: 0 };
        campfireDialogueTimer = 10;
      }, 1000 + Math.random() * 2000);
      break;
    }

    case 'wipe_recovery':
      addLogEntry('boss', `SAUVETAGE! ${msg.message}`);
      addTimelineEvent('phase', null, { text: 'Sauvetage par les reserves!' });
      break;

    case 'loot_roll_start':
      lootRollState = { results: msg.results || [], currentIndex: -1, revealTimer: 2.5, phase: 'waiting', narrativeTimer: 0 };
      for (const r of msg.results || []) {
        const RARITY_COLORS = { common: '#9ca3af', uncommon: '#22c55e', rare: '#3b82f6', epic: '#a855f7', legendary: '#eab308', mythique: '#ff4500' };
        const rc = RARITY_COLORS[r.rarity] || '#9ca3af';
        // Build stats string
        const STAT_LABELS = { hp_flat:'PV', atk_flat:'ATK', def_flat:'DEF', spd_flat:'SPD', crit_rate:'CRIT', res_flat:'RES', hp_pct:'PV%', atk_pct:'ATK%', def_pct:'DEF%', spd_pct:'SPD%', heal_pct:'Soin%', lifesteal_pct:'VieVol%', crit_dmg_pct:'CritDMG%', all_dmg_pct:'DMG%' };
        let statsStr = '';
        if (r.stats && typeof r.stats === 'object') {
          const parts = Object.entries(r.stats).filter(([,v]) => v).map(([k,v]) => `${STAT_LABELS[k]||k} +${v}`);
          if (parts.length) statsStr = ` <span style="color:#888;font-size:11px">[${parts.join(', ')}]</span>`;
        }
        const setStr = r.setName ? ` <span style="color:#c084fc;font-size:11px">(Set: ${r.setName})</span>` : '';
        if (r.stolen) {
          const narrativeText = r.narrative?.text || `Les monstres ont vole <span style="color:${rc};font-weight:bold">${r.itemName}</span>!`;
          addLogEntry('death', narrativeText);
          addTimelineEvent('loot', null, { itemName: r.itemName, winner: 'Monstres', stolen: true, rarityColor: rc });
        } else if (r.winnerUsername) {
          const itemHtml = `<span style="color:${rc};font-weight:bold">${r.itemName}</span>${setStr}${statsStr}`;
          const logText = `${r.winnerUsername} remporte ${itemHtml} <span style="color:#888">(${r.winnerRoll}/100${r.srWinner ? ' SR' : ''})</span>`;
          addLogEntry('loot', logText);
          addTimelineEvent('loot', null, { itemName: r.itemName, winner: r.winnerUsername, stolen: false, rarityColor: rc });
          // Log jealousy / loser reactions too
          if (r.narrative?.reactions) {
            for (const reaction of r.narrative.reactions.slice(1)) {
              if (reaction.text) addLogEntry('chat', reaction.text);
            }
          }
        }
      }
      break;

    case 'rez':
      addLogEntry('rez', `${msg.healerName} ressuscite ${msg.targetName}!`);
      rezAnimations.push({ targetId: msg.target, timer: 2.5 });
      // Update campfire layout: move rezzed char from dead ring to alive ring
      if (campfireLayout?.deadIds) campfireLayout.deadIds.delete(msg.target);
      // Trigger rez dialogue from healer
      const rezLine = REZ_DIALOGUES[Math.floor(Math.random() * REZ_DIALOGUES.length)]
        .replace('{target}', msg.targetName.split(' ')[0]);
      activeBubble = { charId: msg.healer, text: rezLine, timer: 5.0, charIndex: 0 };
      campfireDialogueTimer = 8; // delay next random dialogue
      // Rebuild campfire positions after short delay (let state update)
      setTimeout(() => setupCampfireLayout(), 500);
      break;

    case 'expedition_finished':
      addLogEntry('boss', `EXPEDITION TERMINEE: ${msg.reason} | Boss: ${msg.bossesKilled} | Temps: ${formatTime(msg.elapsedTime)}`);
      break;
  }
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'damage':
    case 'skill_damage': {
      const size = ev.crit ? 22 : 16;
      const srcEntity = findEntity(ev.source);
      const elemDmgColor = ELEMENT_COLORS[srcEntity?.element] || '#ef4444';
      const color = ev.crit ? '#fbbf24' : elemDmgColor;
      const text = ev.crit ? `CRIT ${ev.amount}` : `-${ev.amount}`;
      addFloating(ev.target, text, color, size);
      triggerAnim(ev.target, 'hit', 0.15);
      triggerAnim(ev.source, 'attack', 0.2);
      // VFX
      if (ev.type === 'skill_damage') {
        spawnVFX('magic', ev.source, ev.target, { color: ELEMENT_COLORS[findEntity(ev.source)?.element] || '#a855f7' });
      } else {
        spawnVFX('projectile', ev.source, ev.target);
      }
      if (ev.crit) spawnVFX('crit_burst', ev.source, ev.target);
      const src = ensureStats(ev.source);
      src.dmgDealt += ev.amount;
      src.totalHits++;
      if (ev.crit) {
        src.crits++;
        src.totalCritDmg += ev.amount;
        if (ev.amount > src.maxCrit) src.maxCrit = ev.amount;
        if (ev.amount > 50000) showTvCommentary('crit_big');
      }
      ensureStats(ev.target).dmgReceived += ev.amount;
      maybeAutoQuip('damage', ev.source);
      break;
    }
    case 'mob_attack':
    case 'boss_attack':
    case 'pattern_damage': {
      addFloating(ev.target, `-${ev.amount}`, '#ff6b6b', 16);
      triggerAnim(ev.target, 'hit', 0.15);
      if (ev.type === 'pattern_damage') spawnVFX('boss_aoe', ev.source || '', ev.target);
      else spawnVFX('impact', ev.source || '', ev.target, { color: '#ff4444' });
      ensureStats(ev.target).dmgReceived += ev.amount;
      maybeAutoQuip('hit', ev.target);
      // Wipe check
      if (state) {
        const alive = state.characters.filter(c => c.alive).length;
        if (alive <= 3 && alive > 0) showTvCommentary('wipe_near');
      }
      break;
    }
    case 'heal': {
      addFloating(ev.target, `+${ev.amount}`, '#22c55e', 16);
      triggerAnim(ev.target, 'heal', 0.3);
      spawnVFX('heal', ev.source, ev.target);
      addLogEntry('heal', `${getName(ev.source)} soigne ${getName(ev.target)} (+${formatNumber(ev.amount)})`);
      ensureStats(ev.source).healsGiven += ev.amount;
      ensureStats(ev.target).healsReceived += ev.amount;
      break;
    }
    case 'death':
      ensureStats(ev.characterId).deaths++;
      addLogEntry('death', `${getName(ev.characterId)} est mort!`);
      triggerAnim(ev.characterId, 'death', 1.0);
      addTimelineEvent('death', null, { name: getName(ev.characterId), charId: ev.characterId });
      break;
    case 'kill':
      addLogEntry('kill', `${getName(ev.killer)} tue ${ev.targetName}!`);
      ensureStats(ev.killer).kills++;
      addTimelineEvent('kill', null, { killer: getName(ev.killer), target: ev.targetName });
      break;
    case 'boss_pattern':
      addLogEntry('boss', `[${ev.name}] telegraph ${ev.telegraphTime}s!`);
      break;
    case 'buff':
      addLogEntry('buff', `${getName(ev.source)} buff ${ev.buffType} +${ev.value}% sur ${getName(ev.target)}`);
      break;
    case 'boss_heal':
      addLogEntry('info', `Boss soigne +${formatNumber(ev.amount)} HP`);
      break;
    case 'summon':
      addLogEntry('boss', `Boss invoque ${ev.count}x ${ev.mobType}!`);
      break;
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function addFloating(targetId, text, color, size) {
  if (!state) return;
  const entity = findEntity(targetId);
  if (!entity) return;
  const ip = interpPositions[targetId];
  floatingNumbers.push({
    x: ip?.x ?? entity.x, y: -30 - Math.random() * 20,
    entityY: ip?.y ?? entity.y ?? 0,
    text, color, size: size || 16,
    life: 2.0, vy: -50,
  });
}

function findEntity(id) {
  if (!state) return null;
  const c = (state.characters || []).find(c => c.id === id);
  if (c) return c;
  const m = (state.mobs || []).find(m => m.id === id);
  if (m) return m;
  if (state.boss?.id === id) return state.boss;
  return null;
}

function getName(id) {
  if (!id) return '???';
  return id.split('_').slice(1).join(' ');
}

function updateHeader(s) {
  const badge = document.getElementById('status-badge');
  badge.textContent = s.status;
  badge.className = `status-badge status-${s.status}`;
  document.getElementById('alive-count').textContent = `${s.aliveCount}/${s.totalCount}`;
  document.getElementById('boss-count').textContent = s.bossesKilled;
  document.getElementById('encounter-count').textContent = `${s.encounterIndex + 1}/${s.totalEncounters}`;
  document.getElementById('elapsed-time').textContent = formatTime(s.elapsedTime);

  // Remaining time (max duration - elapsed)
  const remainEl = document.getElementById('remaining-time');
  if (s.maxDuration) {
    const remain = Math.max(0, s.maxDuration - s.elapsedTime);
    remainEl.textContent = formatTime(remain);
    // Color: green > 2h, amber > 30min, red < 30min
    remainEl.style.color = remain > 7200 ? '#22c55e' : remain > 1800 ? '#f59e0b' : '#ef4444';
  }
}

const LOG_ICONS = { damage: '\u2694', heal: '\u2764', kill: '\u{1F480}', death: '\u{1F480}', boss: '\u{1F451}', loot: '\u{1F381}', rez: '\u2728', info: '\u2139', buff: '\u2B06' };

function createLogElement(entry) {
  const el = document.createElement('div');
  el.className = `log-entry log-${entry.type}`;
  el.innerHTML = `<span class="log-time">${formatTime(entry.time)}</span><span class="log-icon">${LOG_ICONS[entry.type] || ''}</span><span class="log-text">${entry.text}</span>${entry.crit ? '<span class="log-crit">CRIT</span>' : ''}`;
  return el;
}

function addLogEntry(type, text, extra = {}) {
  const entry = { type, text, time: state?.elapsedTime || 0, crit: extra.crit || false };
  logEntries.push(entry);
  if (logEntries.length > 200) logEntries.shift();
  logEventCount++;
  document.getElementById('log-counter').textContent = `${logEventCount} events`;

  if (activeLogFilter !== 'all' && activeLogFilter !== type) return;
  const container = document.getElementById('log-entries');
  container.appendChild(createLogElement(entry));
  container.scrollTop = container.scrollHeight;
  while (container.children.length > 80) container.removeChild(container.firstChild);
}

function formatTime(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}h${String(m).padStart(2, '0')}m`;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function formatNumber(n) {
  if (n >= 1_000_000_000) return (n / 1_000_000_000).toFixed(1) + 'B';
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
  return String(Math.floor(n));
}

// ═══════════════════════════════════════════════════════════
// VFX SYSTEM — Projectiles, magic circles, impacts, heals
// ═══════════════════════════════════════════════════════════
function spawnVFX(type, sourceId, targetId, options = {}) {
  if (!state) return;
  const srcIp = interpPositions[sourceId];
  const tgtIp = interpPositions[targetId];
  const src = findEntity(sourceId);
  const tgt = findEntity(targetId);
  const sx = srcIp?.x ?? src?.x ?? 0;
  const sy = srcIp?.y ?? src?.y ?? 0;
  const tx = tgtIp?.x ?? tgt?.x ?? 0;
  const ty = tgtIp?.y ?? tgt?.y ?? 0;

  switch (type) {
    case 'projectile': {
      vfxParticles.push({ type: 'projectile', x: sx, y: sy, tx, ty, color: options.color || '#ef4444', size: options.size || 5, trail: [], life: 0.35, maxLife: 0.35 });
      break;
    }
    case 'magic': {
      vfxParticles.push({ type: 'magic_circle', x: tx, y: ty, color: options.color || '#a855f7', life: 0.5, maxLife: 0.5 });
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * (80 + Math.random() * 50), vy: Math.sin(a) * (50 + Math.random() * 30), color: options.color || '#a855f7', size: 2 + Math.random() * 2, life: 0.4 + Math.random() * 0.2, maxLife: 0.6 });
      }
      break;
    }
    case 'heal': {
      for (let i = 0; i < 6; i++) {
        vfxParticles.push({ type: 'rise', x: tx + (Math.random() - 0.5) * 25, y: ty, vy: -(25 + Math.random() * 35), color: '#22c55e', size: 2.5 + Math.random() * 2, life: 0.7 + Math.random() * 0.3, maxLife: 1.0 });
      }
      vfxParticles.push({ type: 'heal_ring', x: tx, y: ty, color: '#22c55e', life: 0.4, maxLife: 0.4 });
      break;
    }
    case 'impact': {
      for (let i = 0; i < 5; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 40 + Math.random() * 70;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd * 0.6, color: options.color || '#ef4444', size: 2 + Math.random() * 2, life: 0.25 + Math.random() * 0.2, maxLife: 0.45 });
      }
      break;
    }
    case 'crit_burst': {
      vfxParticles.push({ type: 'shockwave', x: tx, y: ty, color: '#fbbf24', life: 0.45, maxLife: 0.45 });
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 80 + Math.random() * 100;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd * 0.5 - 20, color: Math.random() > 0.5 ? '#fbbf24' : '#fff', size: 2.5 + Math.random() * 3, life: 0.4 + Math.random() * 0.3, maxLife: 0.7 });
      }
      break;
    }
    case 'boss_aoe': {
      vfxParticles.push({ type: 'shockwave', x: tx, y: ty, color: '#dc2626', life: 0.6, maxLife: 0.6 });
      for (let i = 0; i < 15; i++) {
        const a = Math.random() * Math.PI * 2;
        const spd = 60 + Math.random() * 120;
        vfxParticles.push({ type: 'spark', x: tx, y: ty, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd * 0.4 - 30, color: '#ff4444', size: 3 + Math.random() * 3, life: 0.4 + Math.random() * 0.3, maxLife: 0.7 });
      }
      break;
    }
  }
}

function drawVFX(dt, groundY) {
  for (let i = vfxParticles.length - 1; i >= 0; i--) {
    const p = vfxParticles[i];
    p.life -= dt;
    if (p.life <= 0) { vfxParticles.splice(i, 1); continue; }
    const alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    const progress = 1 - p.life / p.maxLife;

    switch (p.type) {
      case 'projectile': {
        const t = progress / 1;
        const px = p.x + (p.tx - p.x) * t;
        const py = p.y + (p.ty - p.y) * t;
        const sx = px * camera.zoom - camera.x;
        const sy = groundY + entityScreenY(py);
        // Trail
        p.trail.push({ x: sx, y: sy, a: 1 });
        if (p.trail.length > 6) p.trail.shift();
        ctx.save();
        for (let j = 0; j < p.trail.length; j++) {
          const tp = p.trail[j];
          tp.a *= 0.7;
          ctx.globalAlpha = tp.a * 0.5;
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(tp.x, tp.y, p.size * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(sx, sy, p.size * 0.4, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
        break;
      }
      case 'magic_circle': {
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + entityScreenY(p.y);
        const r = 20 + progress * 25;
        ctx.save(); ctx.globalAlpha = alpha * 0.5;
        ctx.strokeStyle = p.color; ctx.lineWidth = 2;
        ctx.shadowColor = p.color; ctx.shadowBlur = 12;
        ctx.beginPath(); ctx.arc(sx, sy - 15, r, 0, Math.PI * 2); ctx.stroke();
        // Inner rotating lines
        for (let j = 0; j < 4; j++) {
          const a = (j / 4) * Math.PI * 2 + progress * Math.PI * 3;
          ctx.beginPath();
          ctx.moveTo(sx + Math.cos(a) * r * 0.3, sy - 15 + Math.sin(a) * r * 0.3);
          ctx.lineTo(sx + Math.cos(a) * r * 0.9, sy - 15 + Math.sin(a) * r * 0.9);
          ctx.stroke();
        }
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'spark': {
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vy += 80 * dt; // gravity
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + entityScreenY(p.y);
        ctx.save(); ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 4;
        ctx.beginPath(); ctx.arc(sx, sy, p.size * (0.5 + alpha * 0.5), 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'rise': {
        p.y += p.vy * dt;
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + entityScreenY(p.y);
        ctx.save(); ctx.globalAlpha = alpha * 0.7;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color; ctx.shadowBlur = 6;
        ctx.beginPath(); ctx.arc(sx, sy, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'heal_ring': {
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + entityScreenY(p.y);
        const r = 10 + progress * 30;
        ctx.save(); ctx.globalAlpha = alpha * 0.4;
        ctx.strokeStyle = p.color; ctx.lineWidth = 2;
        ctx.shadowColor = p.color; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(sx, sy - 15, r, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
      case 'shockwave': {
        const sx = p.x * camera.zoom - camera.x;
        const sy = groundY + entityScreenY(p.y);
        const r = progress * 60;
        ctx.save(); ctx.globalAlpha = alpha * 0.35;
        ctx.strokeStyle = p.color; ctx.lineWidth = 3;
        ctx.shadowColor = p.color; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.arc(sx, sy - 15, r, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0; ctx.restore();
        break;
      }
    }
  }
  // Cap VFX pool
  if (vfxParticles.length > 150) vfxParticles.splice(0, vfxParticles.length - 150);
}

// ═══════════════════════════════════════════════════════════
// DEAD CHARACTER MARKER
// ═══════════════════════════════════════════════════════════
function drawDeadMarker(char, sx, sy) {
  ctx.save();
  ctx.globalAlpha = 0.3;
  drawCharacterSprite(char, sx, sy);
  ctx.globalAlpha = 0.6;
  // Red X over character
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2.5;
  const s = CHAR_SIZE * 0.35;
  ctx.beginPath();
  ctx.moveTo(sx - s, sy - CHAR_SIZE * 0.7 - s); ctx.lineTo(sx + s, sy - CHAR_SIZE * 0.7 + s);
  ctx.moveTo(sx + s, sy - CHAR_SIZE * 0.7 - s); ctx.lineTo(sx - s, sy - CHAR_SIZE * 0.7 + s);
  ctx.stroke();
  // Skull emoji
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#dc2626';
  ctx.fillText('\u{1F480}', sx, sy - CHAR_SIZE - 6);
  ctx.restore();
  // Name
  ctx.fillStyle = '#555'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(char.name, sx, sy - CHAR_SIZE - 18);
}

function drawCampfireGhost(char, sx, sy) {
  const t = Date.now() / 1000;
  const idHash = char.id.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0);

  // Ghostly floating bob
  const floatY = Math.sin(t * 1.5 + idHash * 0.5) * 6;

  ctx.save();
  ctx.globalAlpha = 0.25 + Math.sin(t * 2 + idHash) * 0.08;

  // Blue-white ethereal glow
  const glow = ctx.createRadialGradient(sx, sy + floatY - CHAR_SIZE / 2, 5, sx, sy + floatY - CHAR_SIZE / 2, CHAR_SIZE * 0.8);
  glow.addColorStop(0, 'rgba(150, 180, 255, 0.2)');
  glow.addColorStop(1, 'rgba(100, 140, 255, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(sx - CHAR_SIZE, sy + floatY - CHAR_SIZE * 1.5, CHAR_SIZE * 2, CHAR_SIZE * 2);

  // Draw sprite (ghostly)
  drawCharacterSprite(char, sx, sy + floatY);

  // Wispy particles rising
  for (let i = 0; i < 3; i++) {
    const cycle = ((t * 0.8 + i * 1.2 + idHash * 0.3) % 2) / 2;
    const px = sx + Math.sin(t + i * 2.1) * 10;
    const py = sy + floatY - CHAR_SIZE / 2 - cycle * 40;
    const alpha = (1 - cycle) * 0.3;
    ctx.fillStyle = `rgba(150, 180, 255, ${alpha})`;
    ctx.beginPath(); ctx.arc(px, py, 2 - cycle, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  // Name
  ctx.fillStyle = '#6688cc'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(100,140,255,0.4)'; ctx.shadowBlur = 4;
  ctx.fillText(char.name, sx, sy + floatY - CHAR_SIZE - 4);
  ctx.shadowBlur = 0;

  // "En attente de rez" text
  ctx.fillStyle = '#556'; ctx.font = '7px sans-serif';
  ctx.fillText('En attente de rez...', sx, sy + floatY + 8);
}

function drawRestingCharacter(char, sx, sy, dt) {
  const t = Date.now() / 1000;
  const idHash = char.id.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0);

  // Gentle breathing animation
  const breathY = Math.sin(t * 1.2 + idHash) * 2;

  ctx.save();
  ctx.globalAlpha = 0.7;

  // Draw character sprite (slightly faded, peaceful)
  drawCharacterSprite(char, sx, sy + breathY);
  ctx.restore();

  // HP bar
  drawHpBar(sx, sy + breathY + 2, 36, 4, char.hp / char.maxHp);

  // "Zzz" floating animation
  const zzz1 = ((t * 0.6 + idHash * 0.3) % 3) / 3;
  const zzz2 = ((t * 0.6 + idHash * 0.3 + 1) % 3) / 3;
  ctx.font = `${10 + zzz1 * 4}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillStyle = `rgba(150, 180, 255, ${0.6 - zzz1 * 0.5})`;
  ctx.fillText('z', sx + 12 + zzz1 * 10, sy + breathY - CHAR_SIZE - 4 - zzz1 * 20);
  ctx.font = `${8 + zzz2 * 4}px sans-serif`;
  ctx.fillStyle = `rgba(150, 180, 255, ${0.5 - zzz2 * 0.4})`;
  ctx.fillText('z', sx + 18 + zzz2 * 8, sy + breathY - CHAR_SIZE - 10 - zzz2 * 18);

  // Name + role
  const elemColor = ELEMENT_COLORS[char.element] || '#888';
  ctx.fillStyle = elemColor; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 2;
  const roleIcon = ROLE_ICONS[char.role] || '';

function drawCharacterPopup(dt) {
  if (!selectedCharInfo) return;
  const char = findEntity(selectedCharInfo.charId);
  if (!char) { selectedCharInfo = null; return; }

  selectedCharInfo.timer -= dt;
  if (selectedCharInfo.timer <= 0) { selectedCharInfo = null; return; }

  const ip = interpPositions[selectedCharInfo.charId];
  const groundY = canvas.height * GROUND_Y_RATIO;
  let sx, sy;
  if (state?.status === 'campfire' && campfireLayout?.positions[selectedCharInfo.charId]) {
    const cp = campfireLayout.positions[selectedCharInfo.charId];
    sx = cp.x; sy = cp.y;
  } else {
    sx = (ip ? ip.x : char.x) * camera.zoom - camera.x;
    sy = groundY + entityScreenY(ip?.y ?? char.y ?? 0);
  }

  const stats = combatStats[selectedCharInfo.charId];
  const popW = 190, popH = 148;
  const px = Math.max(5, Math.min(canvas.width - popW - 5, sx - popW / 2));
  const py = sy - CHAR_SIZE - popH - 25;

  const alpha = selectedCharInfo.timer < 0.5 ? selectedCharInfo.timer / 0.5 : 1;
  ctx.save(); ctx.globalAlpha = alpha * 0.95;

  // Background
  ctx.fillStyle = 'rgba(10, 10, 25, 0.93)';
  roundRect(ctx, px, py, popW, popH, 10); ctx.fill();
  const elemColor = ELEMENT_COLORS[char.element] || '#888';
  ctx.strokeStyle = elemColor; ctx.lineWidth = 1.5;
  roundRect(ctx, px, py, popW, popH, 10); ctx.stroke();

  // Header
  ctx.fillStyle = elemColor; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
  const roleLabel = { frontline: 'Tank', frontline_dps: 'Fighter', backline_dps: 'Mage', backline_heal: 'Healer' };
  ctx.fillText(`${char.name} (${roleLabel[char.role] || char.role})`, px + 8, py + 16);
  // Alive/dead + username
  const statusColor = char.alive ? '#22c55e' : '#dc2626';
  const statusText = char.alive ? 'En vie' : 'Mort';
  ctx.fillStyle = statusColor; ctx.font = 'bold 8px sans-serif';
  ctx.fillText(statusText, px + popW - 8 - ctx.measureText(statusText).width, py + 16);
  ctx.fillStyle = '#888'; ctx.font = '9px sans-serif';
  ctx.fillText(`${char.username || ''}`, px + 8, py + 28);

  // HP/Mana bars
  const barY = py + 34;
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(px + 8, barY, popW - 16, 6);
  const hpRatio = char.alive ? Math.max(0, char.hp / char.maxHp) : 0;
  ctx.fillStyle = hpRatio > 0.6 ? '#22c55e' : hpRatio > 0.3 ? '#f59e0b' : '#ef4444';
  ctx.fillRect(px + 8, barY, (popW - 16) * hpRatio, 6);
  ctx.fillStyle = '#aaa'; ctx.font = '8px sans-serif';
  ctx.fillText(`HP ${formatNumber(char.hp)}/${formatNumber(char.maxHp)}`, px + 8, barY + 14);

  if (char.maxMana) {
    ctx.fillStyle = '#1a1a2e'; ctx.fillRect(px + popW / 2, barY + 8, popW / 2 - 8, 4);
    ctx.fillStyle = '#3b82f6'; ctx.fillRect(px + popW / 2, barY + 8, (popW / 2 - 8) * Math.max(0, (char.mana || 0) / char.maxMana), 4);
    ctx.fillStyle = '#6b8fcc'; ctx.font = '8px sans-serif';
    ctx.fillText(`MP ${Math.floor(char.mana || 0)}`, px + popW / 2, barY + 22);
  }

  // Stats
  const lineY = barY + 30;
  ctx.font = '9px sans-serif';
  const dps = stats && combatElapsedTime > 0 ? (stats.dmgDealt / combatElapsedTime) : 0;
  const lines = [
    { l: 'DPS', v: formatNumber(dps) + '/s', c: '#ef4444' },
    { l: 'Degats', v: formatNumber(stats?.dmgDealt || 0), c: '#ff8888' },
    { l: 'Soins', v: formatNumber(stats?.healsGiven || 0), c: '#22c55e' },
    { l: 'Kills', v: String(stats?.kills || 0), c: '#f59e0b' },
    { l: 'Morts', v: String(stats?.deaths || 0), c: '#dc2626' },
    { l: 'Crits', v: `${stats?.crits || 0} (max: ${formatNumber(stats?.maxCrit || 0)})`, c: '#fbbf24' },
  ];
  for (let i = 0; i < lines.length; i++) {
    ctx.fillStyle = '#666'; ctx.textAlign = 'left';
    ctx.fillText(lines[i].l, px + 8, lineY + i * 13);
    ctx.fillStyle = lines[i].c; ctx.textAlign = 'right';
    ctx.fillText(lines[i].v, px + popW - 8, lineY + i * 13);
  }

  // Arrow pointing down
  ctx.fillStyle = 'rgba(10, 10, 25, 0.93)';
  ctx.beginPath();
  ctx.moveTo(sx - 6, py + popH); ctx.lineTo(sx + 6, py + popH); ctx.lineTo(sx, py + popH + 8);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

  ctx.beginPath(); ctx.roundRect(px, py, popW, popH, 10); ctx.stroke();

  // Boss name
  ctx.fillStyle = '#eab308'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(boss.name || 'Boss', px + 10, py + 18);

  // HP bar
  const barY = py + 24;
  const hpRatio = Math.max(0, (boss.hp || 0) / (boss.maxHp || 1));
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(px + 10, barY, popW - 20, 8);
  const hpColor = hpRatio > 0.5 ? '#dc2626' : hpRatio > 0.25 ? '#f59e0b' : '#7f1d1d';
  ctx.fillStyle = hpColor; ctx.fillRect(px + 10, barY, (popW - 20) * hpRatio, 8);

  // Divider
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px + 10, py + headerH - 2); ctx.lineTo(px + popW - 10, py + headerH - 2); ctx.stroke();

  // Loot table header
  ctx.fillStyle = '#a855f7'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('TABLE DE LOOT', px + 10, py + headerH + 10);
  ctx.textAlign = 'right';
  ctx.fillText('DROP %', px + popW - 10, py + headerH + 10);
  ctx.textAlign = 'left';

  // Loot rows
  for (let i = 0; i < lootTable.length; i++) {
    const item = lootTable[i];
    const ry = py + headerH + 16 + i * rowH;
    // Tag badge (SET / ARME / CURR)
    let nameX = px + 10;
    if (item.tag) {
      const tagColors = { SET: '#a855f7', ARME: '#ef4444', CURR: '#3b82f6' };
      ctx.fillStyle = tagColors[item.tag] || '#888';
      ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'left';
      const tw = ctx.measureText(item.tag).width + 6;
      ctx.globalAlpha *= 0.3;
      ctx.fillRect(nameX, ry + 2, tw, 10);
      ctx.globalAlpha /= 0.3;
      ctx.fillStyle = tagColors[item.tag];
      ctx.fillText(item.tag, nameX + 3, ry + 10);
      nameX += tw + 3;
    }
    ctx.fillStyle = RARITY_COLORS[item.rarity] || '#888';
    ctx.font = '9px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(item.name, nameX, ry + 10);
    ctx.textAlign = 'right';

    ctx.fillText(`${item.dropChance}%`, px + popW - 10, ry + 10);
    ctx.textAlign = 'left';
  }

  // Arrow
  ctx.fillStyle = 'rgba(10, 10, 25, 0.95)';
  ctx.beginPath();
  ctx.moveTo(bsx - 6, py + popH); ctx.lineTo(bsx + 6, py + popH); ctx.lineTo(bsx, py + popH + 8);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

function setupCampfireLayout() {
  if (!state) return;
  const allChars = state.characters || [];
  const aliveActive = allChars.filter(c => c.alive && !c.resting);
  const restingChars = allChars.filter(c => c.alive && c.resting);
  const deadChars = allChars.filter(c => !c.alive);
  const centerX = canvas.width / 2;
  const centerY = canvas.height * (GROUND_Y_RATIO + (1 - GROUND_Y_RATIO) * 0.4);
  const radius = Math.min(200, 50 + aliveActive.length * 5);
  campfireLayout = { positions: {}, centerX, centerY, deadIds: new Set(deadChars.map(c => c.id)) };

  // Active alive characters in inner circle
  aliveActive.forEach((c, i) => {
    const angle = (i / aliveActive.length) * Math.PI * 2 - Math.PI / 2;
    campfireLayout.positions[c.id] = {
      x: centerX + Math.cos(angle) * radius,
      y: centerY + Math.sin(angle) * radius * 0.4,
    };
  });

  // Resting characters: slightly off to the side (right of campfire, near a tent)
  const restX = centerX + radius + 60;
  restingChars.forEach((c, i) => {
    campfireLayout.positions[c.id] = {
      x: restX + (i % 3) * 35,
      y: centerY - 20 + Math.floor(i / 3) * 30,
    };
  });

  // Dead characters in outer ring (ghosts)
  const deadRadius = radius + 60;
  deadChars.forEach((c, i) => {
    const angle = (i / Math.max(1, deadChars.length)) * Math.PI * 2 - Math.PI / 2;
    campfireLayout.positions[c.id] = {
      x: centerX + Math.cos(angle) * deadRadius,
      y: centerY + Math.sin(angle) * deadRadius * 0.4 + 10,
    };
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// STATS PANEL (unchanged from original)

const TAB_COLORS = { dps: '#ef4444', heals: '#22c55e', received: '#f59e0b', crits: '#f97316' };
let statsRenderTimer = null;
function scheduleStatsRender() {
  if (statsRenderTimer) return;
  statsRenderTimer = setTimeout(() => { statsRenderTimer = null; if (activeStatsTab === 'graph') renderDpsGraph(); else if (activeStatsTab === 'timeline') renderTimeline(); else if (activeStatsTab === 'details') renderDetailsTab(); else renderStatsPanel(); }, 2000);
}

function renderStatsPanel() {
  if (!statsPanelOpen || activeStatsTab === 'graph' || activeStatsTab === 'timeline' || activeStatsTab === 'details') return;
  const list = document.getElementById('stats-list');
  const { stats: filteredStats, combatTime: filteredCombatTime } = getFilteredStats();
  const entries = Object.entries(filteredStats).filter(([id]) => !id.startsWith('mob_') && !id.startsWith('boss_'));
  const viewLabel = selectedStatsView === 'global' ? '' : selectedStatsView === 'current' ? ' (Boss actuel)' : ` (${bossEncounterHistory[selectedStatsView]?.bossName || ''})`;

  if (activeStatsTab === 'crits') {
    const sorted = entries.sort((a, b) => (b[1].crits || 0) - (a[1].crits || 0));
    let html = viewLabel ? `<div style="text-align:center;font-size:9px;color:#a855f7;padding:3px;background:rgba(168,85,247,0.08)">${viewLabel}</div>` : '';
    for (const [id, s] of sorted) {
      if ((s.crits || 0) === 0 && (s.totalHits || 0) === 0) continue;
      const thumbSrc = s.hunterId ? thumbDataUrls[s.hunterId] : null;
      const critRate = s.totalHits > 0 ? ((s.crits || 0) / s.totalHits * 100).toFixed(1) : '0.0';
      const avgCrit = s.crits > 0 ? Math.floor((s.totalCritDmg || 0) / s.crits) : 0;
      const critUserTag = s.username ? `<span style="font-size:8px;color:#666;margin-left:3px">(${s.username})</span>` : '';
      html += `<div class="crit-card" style="cursor:pointer" onclick="focusOnCharacter('${id}')"><div class="crit-card-header">${thumbSrc ? `<img src="${thumbSrc}" alt="">` : ''}<span class="name">${s.name}${critUserTag}</span></div><div class="crit-stats-grid"><span class="crit-stat-label">Coups</span><span class="crit-stat-val">${s.totalHits || 0}</span><span class="crit-stat-label">Critiques</span><span class="crit-stat-val" style="color:#f97316">${s.crits || 0}</span><span class="crit-stat-label">Taux crit</span><span class="crit-stat-val" style="color:#fb923c">${critRate}%</span><span class="crit-stat-label">Crit moyen</span><span class="crit-stat-val">${formatNumber(avgCrit)}</span><span class="crit-stat-label">Max crit</span><span class="crit-stat-val" style="color:#fbbf24">${formatNumber(s.maxCrit || 0)}</span><span class="crit-stat-label">Kills</span><span class="crit-stat-val" style="color:#22c55e">${s.kills || 0}</span></div></div>`;
    }
    list.innerHTML = html || '<div style="color:#555;text-align:center;padding:20px">Pas encore de crits</div>';
    return;
  }

  let sorted, valueKey;
  switch (activeStatsTab) {
    case 'dps': valueKey = 'dmgDealt'; sorted = entries.sort((a, b) => (b[1].dmgDealt || 0) - (a[1].dmgDealt || 0)); break;
    case 'heals': valueKey = 'healsGiven'; sorted = entries.sort((a, b) => (b[1].healsGiven || 0) - (a[1].healsGiven || 0)); break;
    case 'received': valueKey = 'dmgReceived'; sorted = entries.sort((a, b) => (b[1].dmgReceived || 0) - (a[1].dmgReceived || 0)); break;
  }
  const maxVal = sorted.length > 0 ? (sorted[0][1][valueKey] || 0) : 1;
  const barColor = TAB_COLORS[activeStatsTab];
  const combatSec = Math.max(1, filteredCombatTime);
  // Total for % contribution
  const totalVal = entries.reduce((sum, [, s]) => sum + (s[valueKey] || 0), 0);
  let html = viewLabel ? `<div style="text-align:center;font-size:9px;color:#a855f7;padding:3px;background:rgba(168,85,247,0.08)">${viewLabel}</div>` : '';
  for (let i = 0; i < sorted.length; i++) {
    const [id, s] = sorted[i];
    const val = s[valueKey] || 0;
    if (val === 0) continue;
    const pct = maxVal > 0 ? (val / maxVal * 100) : 0;
    const contribPct = totalVal > 0 ? (val / totalVal * 100).toFixed(1) : '0';
    const thumbSrc = s.hunterId ? thumbDataUrls[s.hunterId] : null;
    const elemColor = ELEMENT_COLORS[s.element] || '#888';
    const perSec = activeStatsTab === 'dps' ? ` ${formatNumber(val / combatSec)}/s` : activeStatsTab === 'heals' ? ` ${formatNumber(val / combatSec)}/s` : '';
    const charObj = state?.characters?.find(c => c.id === id);
    const isAlive = charObj?.alive !== false;
    const deathBadge = (s.deaths || 0) > 0 ? `<span style="font-size:7px;color:#dc2626;margin-left:3px">\u2620${s.deaths}</span>` : '';
    const aliveStyle = isAlive ? '' : 'opacity:0.5;';
    const userTag = s.username ? `<span style="font-size:7px;color:#666;margin-left:2px">(${s.username})</span>` : '';
    html += `<div class="stat-entry" style="${aliveStyle}cursor:pointer;" onclick="focusOnCharacter('${id}')"><span class="stat-rank">${i + 1}</span>${thumbSrc ? `<img class="stat-sprite" src="${thumbSrc}" alt="">` : `<span class="stat-sprite" style="background:${elemColor}"></span>`}<span class="stat-name" style="color:${isAlive ? elemColor : '#dc2626'}">${s.name}${userTag}${deathBadge}</span><div class="stat-bar-container"><div class="stat-bar" style="width:${pct}%;background:${barColor}"></div></div><span class="stat-value">${formatNumber(val)}<span style="font-size:8px;color:#888">${perSec} ${contribPct}%</span></span></div>`;
  }
  list.innerHTML = html || '<div style="color:#555;text-align:center;padding:20px">Pas encore de donnees</div>';
}

    html += `<span style="color:#555;font-size:9px;width:14px;text-align:right">${i + 1}.</span>`;
